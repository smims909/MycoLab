<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>MycoLab | v43.81</title>
    <style>
        :root { 
            --bg: #fff; --main: #000; --sub: #999; --grey: #eee; --danger: #ff4d4d; 
            --font: 'Inter', -apple-system, sans-serif; --nav-bg: #fff;
        }
        body.dark-mode { 
            --bg: #000; --main: #fff; --sub: #888; --grey: #222; --nav-bg: #111;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: var(--font); background: var(--bg); color: var(--main); margin: 0; padding: 20px; font-weight: 300; -webkit-user-select: none; transition: background 0.2s; overflow-x: hidden; }
        .container { max-width: 450px; margin: auto; display: flex; flex-direction: column; min-height: 95vh; }
        header { margin-bottom: 10px; border-bottom: 2px solid var(--main); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; margin: 0; }
        .header-btns { display: flex; gap: 6px; align-items: center; }
        .btn-ui { font-size: 10px; font-weight: 800; border: 1px solid var(--main); background: none; color: var(--main); padding: 4px 8px; cursor: pointer; text-transform: uppercase; min-width: 55px; }
        .lang-toggle { font-size: 10px; font-weight: 800; cursor: pointer; color: var(--sub); text-transform: uppercase; margin-right: 5px; }
        .lang-toggle span.active { color: var(--main); text-decoration: underline; }
        #timestamp { font-size: 10px; color: var(--sub); text-transform: uppercase; font-weight: 700; margin-bottom: 25px; letter-spacing: 0.5px; }
        .section-block { page-break-inside: avoid; margin-bottom: 10px; }
        .section-title { font-size: 18px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid var(--main); margin-bottom: 20px; padding-bottom: 5px; letter-spacing: 1px; cursor: pointer; }
        .vol-bar { display: flex; gap: 18px; margin-bottom: 25px; flex-wrap: wrap; align-items: center; }
        .v-chip { font-size: 13px; color: var(--sub); cursor: pointer; }
        .v-chip.active { color: var(--main); font-weight: 900; }
        .tabs-row { display: flex; gap: 18px; margin-bottom: 20px; border-bottom: 1px solid var(--grey); overflow-x: auto; padding-bottom: 10px; align-items: flex-end; scrollbar-width: none; }
        .tabs-row::-webkit-scrollbar { display: none; }
                .tab { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; white-space: nowrap; cursor: pointer; }
        .tab.active { color: var(--main); font-size: 14px; font-weight: 900; border-bottom: 2px solid var(--main); padding-bottom: 2px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 5px; }
        td { padding: 15px 0; border-bottom: 1px solid var(--grey); }
        .col-n { width: 45%; text-align: left; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
        .col-p { width: 20%; text-align: center; font-size: 11px; font-weight: 800; color: var(--sub); cursor: pointer; }
        .col-v { width: 35%; text-align: right; font-size: 17px; font-weight: 500; }
        .unit-s { font-size: 11px; font-weight: 700; color: var(--sub); margin-left: 2px; text-transform: lowercase; }
        .section-footer { display: flex; justify-content: space-between; align-items: center; padding: 15px 0 10px 0; }
        .btn-add-ing { font-size: 9px; font-weight: 800; border: none; padding: 0; text-transform: uppercase; cursor: pointer; background: none; color: var(--main); }
        .total-label { font-size: 11px; font-weight: 800; text-transform: uppercase; text-align: right; }
        .note-area { width: 100%; border: none; border-left: 1px solid var(--grey); padding: 8px 12px; font-family: var(--font); font-size: 12px; color: var(--main); resize: none; margin-bottom: 40px; background: var(--nav-bg); min-height: 40px; }
        .author-box { display: none; padding: 20px; cursor: pointer; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal { background: var(--bg); color: var(--main); border: 1px solid var(--main); width: 90%; max-width: 320px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-input { width: 100%; border: none; background: transparent; color: var(--main); border-bottom: 2px solid var(--main); font-size: 20px; padding: 10px 0; margin-bottom: 20px; border-radius: 0; }
        .modal-btn { padding: 15px; text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 1px solid var(--main); width: 100%; margin-bottom: 10px; display: block; color: var(--main); background: transparent; }
        .modal-btn.black { background: var(--main); color: var(--bg); }
        .modal-btn.danger { border-color: var(--danger); color: var(--danger); }
        #drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--bg); border-top: 2px solid var(--main); padding: 25px; transition: 0.3s ease; z-index: 1500; overflow-y: auto; max-height: 80vh; }
        #drawer.open { bottom: 0; }
        .lib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-bottom: 20px; }
        .lib-btn { padding: 10px; border: 1px solid var(--main); font-size: 9px; font-weight: 800; text-align: center; text-transform: uppercase; cursor: pointer; color: var(--main); }
        @media print { 
            body.dark-mode { --bg: #fff; --main: #000; --sub: #999; --grey: #eee; }
            @page { size: A4; margin: 1cm; }
            .container { max-width: 100%; }
            .note-area { background: #fff !important; color: #000 !important; border: none !important; border-left: 1px solid #ccc !important; padding-left: 10px; }
            .author-box { display: block !important; margin: -20px 0 30px 0 !important; padding: 0 !important; text-align: right !important; width: 100%; }
            #author-name { color: #000 !important; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
            .vol-bar, .btn-add-ing, #drawer, #modal-overlay, .tab:not(.active), .v-chip:not(.active), button, .header-btns, .lang-toggle { display: none !important; } 
        }
    </style>
</head>
<body>
<div id="modal-overlay"><div class="modal" id="modal-box"></div></div>
<div class="container">
    <header>
        <h1>MycoLab</h1>
        <div class="header-btns">
            <div class="lang-toggle" onclick="APP.toggleLang()">
                <span id="l-fr">FR</span>/<span id="l-en">EN</span>
            </div>
            <button class="btn-ui" id="dark-toggle" onclick="APP.toggleDarkMode()">Sombre</button>
            <button class="btn-ui" onclick="window.print()">PDF</button>
        </div>
    </header>
    <div id="timestamp">...</div>
    <div id="content"></div>
    <footer class="author-box" onclick="APP.prompt('Auteur:', APP.state.author || '', (v)=>APP.setAuthor(v))">
        <span id="author-name">...</span>
    </footer>
</div>
<div id="drawer">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
        <span style="font-weight:900; font-size:10px;" id="cat-label">CATALOGUE</span>
        <span onclick="APP.toggleDrawer(false)" style="cursor:pointer; font-size:28px;">&times;</span>
    </div>
    <div class="lib-grid" id="lib-list"></div>
</div>
<script>
const LANGS = {
    fr: {
        titles: ["I. Inoculations", "II. Fructification", "III. Casing"],
        total: "TOTAL", addIng: "+ COMPOSANT", notes: "Notes techniques...", cancel: "ANNULER",
        del: "SUPPRIMER", rename: "RENOMMER", equi: "EQUILIBRER", manual: "MANUEL", other: "+ AUTRE",
        dark: "SOMBRE", light: "CLAIR", authorDef: "AUTEUR NON DÉFINI",
        lib: ["Fibre de Coco", "Vermiculite", "Gypse", "Blanc de Meudon", "Chaux", "Paille hachée", "Épeautre", "Carton", "Marc de Café", "Sciure de bois", "Copeaux", "Chanvre", "Tourbe", "Perlite", "Seigle", "Millet", "Blé", "Sorgho", "Agar-Agar", "Extrait de Malt", "Composte", "Fumier"]
    },
    en: {
        titles: ["I. Inoculation", "II. Fruiting", "III. Casing"],
        total: "TOTAL", addIng: "+ INGREDIENT", notes: "Technical notes...", cancel: "CANCEL",
        del: "DELETE", rename: "RENAME", equi: "BALANCE", manual: "MANUAL", other: "+ OTHER",
        dark: "DARK", light: "LIGHT", authorDef: "AUTHOR NOT SET",
        lib: ["Coco Coir", "Vermiculite", "Gypsum", "Chalk", "Lime", "Chopped Straw", "Spelt", "Cardboard", "Coffee Grounds", "Sawdust", "Wood Chips", "Hemp", "Peat", "Perlite", "Rye", "Millet", "Wheat", "Sorghum", "Agar-Agar", "Malt Extract", "Compost", "Manure"]
    }
};
const APP = {
    data: [], state: { gIdx: [0, 0, 0], activeCat: 0, pressTimer: null, lang: 'fr', dark: false, author: '' },
    init() {
        const savedLang = localStorage.getItem('mycolab_lang'); if(savedLang) this.state.lang = savedLang;
        const savedDark = localStorage.getItem('mycolab_dark');
        if(savedDark === 'true') { this.state.dark = true; document.body.classList.add('dark-mode'); }
        const savedAuthor = localStorage.getItem('mycolab_author'); if(savedAuthor) this.state.author = savedAuthor;
        const savedData = localStorage.getItem('mycolab_v43_0');
        if(savedData) { try { this.data = JSON.parse(savedData); } catch(e) { this.loadDefaults(); } } else { this.loadDefaults(); }
        this.render();
    },
    loadDefaults() {
        const isFR = this.state.lang === 'fr';
        this.data = [
            { id: 1, t: isFR ? "I. Inoculations" : "I. Inoculation", v: 0.5, cv: [0.5, 1, 2, 5], note: "", g: [{ n: isFR ? "Bocal Carton" : "Cardboard Jar", i: [{ n: isFR ? "Carton" : "Cardboard", r: 450, u: "vol" },{ n: isFR ? "Vermiculite" : "Vermiculite", r: 400, u: "vol" },{ n: isFR ? "Épeautre" : "Spelt", r: 100, u: "vol" },{ n: isFR ? "Blanc de Meudon" : "Chalk", r: 50, u: "cs" }] }] },
            { id: 2, t: isFR ? "II. Fructification" : "II. Fruiting", v: 7, cv: [5, 7, 12, 15], note: "", g: [{ n: "Bulk 7L", i: [{ n: isFR ? "Fibre de Coco" : "Coco Coir", r: 600, u: "vol" },{ n: isFR ? "Vermiculite" : "Vermiculite", r: 200, u: "vol" },{ n: isFR ? "Paille hachée" : "Chopped Straw", r: 100, u: "vol" },{ n: isFR ? "Gypse" : "Gypsum", r: 100, u: "cs" }] }] },
            { id: 3, t: isFR ? "III. Casing" : "III. Casing", v: 1.2, cv: [0.5, 1, 1.2, 2], note: "", g: [{ n: "Casing pH+", i: [{ n: isFR ? "Vermiculite" : "Vermiculite", r: 670, u: "vol" },{ n: isFR ? "Fibre de Coco" : "Coco Coir", r: 280, u: "vol" },{ n: isFR ? "Blanc de Meudon" : "Chalk", r: 40, u: "cs" },{ n: isFR ? "Chaux" : "Lime", r: 10, u: "cc" }] }] }
        ];
    },
    setAuthor(name) { this.state.author = name; localStorage.setItem('mycolab_author', name); this.render(); },
    toggleDarkMode() { this.state.dark = !this.state.dark; document.body.classList.toggle('dark-mode', this.state.dark); localStorage.setItem('mycolab_dark', this.state.dark); this.render(); },
    toggleLang() { this.state.lang = (this.state.lang === 'fr') ? 'en' : 'fr'; localStorage.setItem('mycolab_lang', this.state.lang); this.render(); },
    save() { localStorage.setItem('mycolab_v43_0', JSON.stringify(this.data)); this.updateTime(); },
    updateTime() {
        const now = new Date(); const ts = document.getElementById('timestamp');
        if(ts) ts.innerText = now.toLocaleDateString(this.state.lang === 'fr' ? 'fr-CH' : 'en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    },
    render() {
        const l = LANGS[this.state.lang];
        document.getElementById('l-fr').className = (this.state.lang==='fr')?'active':'';
        document.getElementById('l-en').className = (this.state.lang==='en')?'active':'';
        document.getElementById('dark-toggle').innerText = this.state.dark ? l.light : l.dark;
        document.getElementById('author-name').innerText = this.state.author || l.authorDef;
        const content = document.getElementById('content');
        content.innerHTML = this.data.map((cat, ci) => {
            const gi = this.state.gIdx[ci], grp = cat.g[gi];
            const total = grp.i.reduce((s, x) => s + x.r, 0) / 10;
            return `
            <div class="section-block">
                <div class="section-title" onclick="APP.prompt('Edit:', '${cat.t}', (v)=>{APP.data[${ci}].t=v; APP.render()})">${cat.t}</div>
                <nav class="vol-bar">
                    ${cat.cv.sort((a,b)=>a-b).map(v => `<div class="v-chip ${cat.v==v?'active':''}" onmousedown="APP.startP(event, 'vol', [${ci},${v}])" ontouchstart="APP.startP(event, 'vol', [${ci},${v}])" onmouseup="APP.endP()" ontouchend="APP.endP()" onclick="APP.setV(${ci},${v})">${v}L</div>`).join('')}
                    <div onclick="APP.prompt('Vol:', '', (v)=>APP.addV(${ci},v))" style="cursor:pointer; font-weight:800; font-size:18px;">+</div>
                </nav>
                <div class="tabs-row">
                    ${cat.g.map((g,i) => `<div class="tab ${gi==i?'active':''}" onmousedown="APP.startP(event, 'tab', [${ci},${i}])" ontouchstart="APP.startP(event, 'tab', [${ci},${i}])" onmouseup="APP.endP()" ontouchend="APP.endP()" onclick="APP.setT(${ci},${i})">${g.n}</div>`).join('')}
                    <div class="tab" onclick="APP.prompt('Name:', '', (n)=>APP.addT(${ci},n))" style="color:var(--main); font-size:14px;">+</div>
                </div>
                <table>
                    ${grp.i.map((it, ii) => `
                        <tr>
                            <td class="col-n" onclick="APP.prompt('Nom:', '${it.n}', (n)=>APP.editN(${ci},${ii},n))" onmousedown="APP.startP(event, 'ing', [${ci},${ii}])" ontouchstart="APP.startP(event, 'ing', [${ci},${ii}])" onmouseup="APP.endP()" ontouchend="APP.endP()">${it.n}</td>
                            <td class="col-p" onclick="APP.openRatio(${ci},${ii})">${it.r/10}%</td>
                            ${this.calc(it, cat.v)}
                        </tr>`).join('')}
                </table>
                <div class="section-footer">
                    <button class="btn-add-ing" onclick="APP.state.activeCat=${ci}; APP.toggleDrawer(true)">${l.addIng}</button>
                    <div class="total-label" style="color:${Math.abs(total-100)<0.1?'#999':'var(--danger)'}">${l.total} : ${total.toFixed(1)}%</div>
                </div>
                <textarea class="note-area" placeholder="${l.notes}" oninput="APP.data[${ci}].note=this.value; APP.save()">${cat.note || ''}</textarea>
            </div>`;
        }).join('');
        this.save(); this.renderLib();
    },
    calc(it, vol) {
        if(it.u === 'cs' || it.u === 'cc') {
            const f = (it.u === 'cs') ? 150 : 50; 
            const val = (it.r * vol * 10) / f;
            const rounded = Math.round(val * 2) / 2;
            return `<td class="col-v">${rounded >= 5 ? (rounded * (it.u === 'cs' ? 15 : 5)) + '<span class="unit-s">g</span>' : rounded + '<span class="unit-s">' + it.u + '</span>'}</td>`;
        }
        const l = (it.r * vol) / 1000;
        let res = (l < 0.1) ? `${Math.round(l*1000)}<span class="unit-s">ml</span>` : (l < 1) ? `${(l*10).toFixed(1)}<span class="unit-s">dl</span>` : `${l.toFixed(2)}<span class="unit-s">L</span>`;
        return `<td class="col-v">${res}</td>`;
    },
    setV(ci, v) { this.data[ci].v = v; this.render(); },
    addV(ci, v) { if(v && !isNaN(v)) { this.data[ci].cv.push(parseFloat(v)); this.data[ci].v = parseFloat(v); this.render(); } },
    delV(ci, v) { this.data[ci].cv = this.data[ci].cv.filter(x=>x!==v); if(this.data[ci].v==v) this.data[ci].v = this.data[ci].cv[0]||0.5; this.render(); },
    setT(ci, i) { this.state.gIdx[ci] = i; this.render(); },
    addT(ci, n) { if(n) { this.data[ci].g.push({n, i:[]}); this.state.gIdx[ci]=this.data[ci].g.length-1; this.render(); } },
    delT(ci, i) { if(this.data[ci].g.length>1) { this.data[ci].g.splice(i,1); this.state.gIdx[ci]=0; this.render(); } },
    editN(ci, ii, n) { if(n) { this.data[ci].g[this.state.gIdx[ci]].i[ii].n = n; this.render(); } },
    delI(ci, ii) { this.data[ci].g[this.state.gIdx[ci]].i.splice(ii,1); this.render(); },
    addIng(n) { 
        if(!n) return; 
        const u = n.toLowerCase().match(/meudon|gypse|chaux|chalk|lime|gypsum|malt|agar/) ? 'cs' : 'vol'; 
        this.data[this.state.activeCat].g[this.state.gIdx[this.state.activeCat]].i.push({n, r:0, u}); 
        this.toggleDrawer(false); this.render(); 
    },
    startP(e, type, args) { this.endP(); this.state.pressTimer = setTimeout(() => { if(type === 'tab') this.openTabMenu(args[0], args[1]); else this.confirmDel(type, args); }, 450); },
    endP() { if(this.state.pressTimer) clearTimeout(this.state.pressTimer); },
    openTabMenu(ci, gi) {
        const l = LANGS[this.state.lang]; const box = document.getElementById('modal-box');
        box.innerHTML = `<div style="font-weight:900; font-size:11px; margin-bottom:15px; text-transform:uppercase;">${this.data[ci].g[gi].n}</div><div class="modal-btn black" id="m-rename">${l.rename}</div><div class="modal-btn danger" id="m-del">${l.del}</div><div class="modal-btn" onclick="APP.closeM()">${l.cancel}</div>`;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('m-rename').onclick = () => { this.closeM(); this.prompt(l.rename + ':', this.data[ci].g[gi].n, (n) => { if(n) { this.data[ci].g[gi].n=n; this.render(); } }); };
        document.getElementById('m-del').onclick = () => { this.delT(ci, gi); this.closeM(); };
    },
    confirmDel(type, args) {
        const l = LANGS[this.state.lang]; const box = document.getElementById('modal-box');
        box.innerHTML = `<div style="height:15px;"></div><div class="modal-btn black" onclick="APP.closeM()">${l.cancel}</div><div class="modal-btn danger" id="del-btn">${l.del}</div>`;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('del-btn').onclick = () => { if(type=='vol') this.delV(args[0], args[1]); if(type=='ing') this.delI(args[0], args[1]); this.closeM(); };
    },
    openRatio(ci, ii) {
        const l = LANGS[this.state.lang]; const grp = this.data[ci].g[this.state.gIdx[ci]];
        const others = grp.i.reduce((s, x, idx) => s + (idx!==ii ? x.r : 0), 0) / 10;
        const auto = Math.max(0, 100 - others); const box = document.getElementById('modal-box');
        box.innerHTML = `<div class="modal-btn black" onclick="APP.setR(${ci},${ii},${auto})">${l.equi} (${auto.toFixed(1)}%)</div><div class="modal-btn" onclick="APP.prompt('% :', ${grp.i[ii].r/10}, (v)=>APP.setR(${ci},${ii},v))">${l.manual}</div><div class="modal-btn" onclick="APP.closeM()">${l.cancel}</div>`;
        document.getElementById('modal-overlay').style.display = 'flex';
    },
    setR(ci, ii, v) { if(v!==null && !isNaN(v)) { this.data[ci].g[this.state.gIdx[ci]].i[ii].r = parseFloat(v)*10; this.render(); } this.closeM(); },
    prompt(t, d, cb) {
        const l = LANGS[this.state.lang]; const box = document.getElementById('modal-box');
        box.innerHTML = `<div style="font-size:10px; font-weight:900; margin-bottom:10px;">${t}</div><input type="text" id="p-in" class="modal-input" value="${d}"><div class="modal-btn black" id="p-ok">OK</div><div class="modal-btn" onclick="APP.closeM()">${l.cancel}</div>`;
        document.getElementById('modal-overlay').style.display = 'flex';
        const input = document.getElementById('p-in'); input.focus(); input.select();
        document.getElementById('p-ok').onclick = () => { cb(input.value); this.closeM(); };
    },
    closeM() { document.getElementById('modal-overlay').style.display = 'none'; },
    toggleDrawer(open) { document.getElementById('drawer').classList.toggle('open', open); },
    renderLib() {
        const l = LANGS[this.state.lang]; const list = document.getElementById('lib-list');
        list.innerHTML = l.lib.sort().map(n => `<div class="lib-btn" onclick="APP.addIng('${n}')">${n}</div>`).join('') + `<div class="lib-btn" style="background:var(--main); color:var(--bg)" onclick="APP.prompt('Item:', '', (n)=>APP.addIng(n))">${l.other}</div>`;
    }
};
window.onload = () => APP.init();
</script>
</body>
</html>

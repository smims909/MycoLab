<!DOCTYPE html>
<html lang="fr-CH">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>MycoLab</title>
<style>
:root{--bg:#fff;--main:#000;--sub:#999;--grey:#eee;--danger:#ff4d4d;--font:'Inter',-apple-system,sans-serif;--nav-bg:#fff}
body.dark-mode{--bg:#000;--main:#fff;--sub:#888;--grey:#222;--nav-bg:#111}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none}
body{font-family:var(--font);background:var(--bg);color:var(--main);margin:0;padding:20px;font-weight:300;-webkit-user-select:none;transition:background .2s;overflow-x:hidden}
.container{max-width:450px;margin:auto;display:flex;flex-direction:column;min-height:95vh}
header{margin-bottom:10px;border-bottom:2px solid var(--main);padding-bottom:10px;display:flex;justify-content:space-between;align-items:flex-end}
h1{font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:4px;margin:0}
.header-btns{display:flex;gap:6px;align-items:center}
.btn-ui{font-size:10px;font-weight:800;border:1px solid var(--main);background:none;color:var(--main);padding:4px 8px;cursor:pointer;text-transform:uppercase;min-width:55px}
.lang-toggle{font-size:10px;font-weight:800;cursor:pointer;color:var(--sub);text-transform:uppercase;margin-right:5px}
.lang-toggle span.active{color:var(--main);text-decoration:underline}
#timestamp{font-size:10px;color:var(--sub);text-transform:uppercase;font-weight:700;margin-bottom:25px;letter-spacing:.5px}
.section-block{page-break-inside:avoid;margin-bottom:10px}
.section-title{font-size:18px;font-weight:900;text-transform:uppercase;border-bottom:2px solid var(--main);margin-bottom:20px;padding-bottom:5px;letter-spacing:1px;cursor:pointer}
.vol-bar{display:flex;gap:18px;margin-bottom:25px;flex-wrap:wrap;align-items:center}
.v-chip{font-size:13px;color:var(--sub);cursor:pointer}
.v-chip.active{color:var(--main);font-weight:900}
.tabs-row{display:flex;gap:18px;margin-bottom:20px;border-bottom:1px solid var(--grey);overflow-x:auto;padding-bottom:10px;align-items:flex-end;scrollbar-width:none}
.tabs-row::-webkit-scrollbar{display:none}
.tab{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;white-space:nowrap;cursor:pointer}
.tab.active{color:var(--main);font-size:14px;font-weight:900;border-bottom:2px solid var(--main);padding-bottom:2px}
table{width:100%;border-collapse:collapse;table-layout:fixed;margin-top:5px}
td{padding:15px 0;border-bottom:1px solid var(--grey)}
.col-n{width:45%;text-align:left;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.col-p{width:20%;text-align:center;font-size:11px;font-weight:800;color:var(--sub);cursor:pointer}
.col-v{width:35%;text-align:right;font-size:17px;font-weight:500}
.unit-s{font-size:11px;font-weight:700;color:var(--sub);margin-left:2px;text-transform:lowercase}
.section-footer{display:flex;justify-content:space-between;align-items:center;padding:15px 0 10px 0}
.btn-add-ing{font-size:9px;font-weight:800;border:none;padding:0;text-transform:uppercase;cursor:pointer;background:none;color:var(--main)}
.total-label{font-size:11px;font-weight:800;text-transform:uppercase;text-align:right}
.note-area{width:100%;border:none;border-left:1px solid var(--grey);padding:8px 12px;font-family:var(--font);font-size:12px;color:var(--main);resize:none;margin-bottom:40px;background:var(--nav-bg);min-height:40px}
.author-box{display:none;padding:20px;cursor:pointer}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--bg);color:var(--main);border:1px solid var(--main);width:90%;max-width:320px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.modal-input{width:100%;border:none;background:transparent;color:var(--main);border-bottom:2px solid var(--main);font-size:20px;padding:10px 0;margin-bottom:20px;border-radius:0}
.modal-btn{padding:15px;text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;border:1px solid var(--main);width:100%;margin-bottom:10px;display:block;color:var(--main);background:transparent}
.modal-btn.black{background:var(--main);color:var(--bg)}
.modal-btn.danger{border-color:var(--danger);color:var(--danger)}
#drawer{position:fixed;bottom:-100%;left:0;width:100%;background:var(--bg);border-top:2px solid var(--main);padding:25px;transition:.3s ease;z-index:1500;overflow-y:auto;max-height:80vh}
#drawer.open{bottom:0}
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:20px}
.lib-btn{padding:10px;border:1px solid var(--main);font-size:9px;font-weight:800;text-align:center;text-transform:uppercase;cursor:pointer;color:var(--main)}
@media print{body.dark-mode{--bg:#fff;--main:#000;--sub:#999;--grey:#eee}@page{size:A4;margin:1cm}.container{max-width:100%}.note-area{background:#fff!important;color:#000!important;border:none!important;border-left:1px solid #ccc!important;padding-left:10px}.author-box{display:block!important;margin:-20px 0 30px 0!important;padding:0!important;text-align:right!important;width:100%}#author-name{color:#000!important;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px}.vol-bar,.btn-add-ing,#drawer,#modal-overlay,.tab:not(.active),.v-chip:not(.active),button,.header-btns,.lang-toggle{display:none!important}}
</style>
</head>
<body>
<div id="modal-overlay"><div class="modal" id="modal-box"></div></div>
<div class="container">
<header><h1>MycoLab</h1><div class="header-btns"><div class="lang-toggle" onclick="APP.toggleLang()"><span id="l-fr">FR</span>/<span id="l-en">EN</span></div><button class="btn-ui" id="dark-toggle" onclick="APP.toggleDarkMode()">Sombre</button><button class="btn-ui" onclick="window.print()">PDF</button></div></header>

<div id="drawer">

<div class="lib-grid" id="lib-list"></div>
</div>
<script>

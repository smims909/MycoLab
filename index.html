<!DOCTYPE html>
<html lang="fr-CH">
<!-- MycoLab v6.7.0 -->
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="no">
<meta name="mobile-web-app-capable" content="no">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>MycoLab</title>
<link rel="shortcut icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<style>
/* ============================================================
   MycoLab — Styles (v6.7.0)
   ============================================================ */
:root{--bg:#fff;--main:#000;--sub:#666;--grey:#eee;--border:var(--grey);--danger:#ff4d4d;--font:'Inter',-apple-system,sans-serif;--nav-bg:#fff}
body.dark-mode{--bg:#000;--main:#fff;--sub:#aaa;--grey:#222;--border:#333;--nav-bg:#111}
body.dark-mode .modal-input{background:rgba(255,255,255,.08)!important;color:#fff!important}
body.dark-mode .note-area{background:rgba(255,255,255,.06)!important;color:#fff!important}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none}
body{font-family:var(--font);background:var(--bg);color:var(--main);margin:0;padding:calc(20px + env(safe-area-inset-top)) 20px 20px 20px;font-weight:300;-webkit-user-select:none;transition:background .2s;overflow-x:hidden}
.container{max-width:450px;margin:auto;display:flex;flex-direction:column;min-height:95vh}

/* Header */
header{width:100%;margin-bottom:5px;padding-bottom:0}
.header-row{display:flex;justify-content:space-between;align-items:baseline;width:100%}
.header-row:first-child{border-bottom:2px solid var(--main);padding-bottom:10px;margin-bottom:5px}
h1{font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:4px;margin:0}
.right-group{display:flex;align-items:baseline;gap:8px}
.lang-toggle{font-size:10px;font-weight:800;cursor:pointer;color:var(--sub);text-transform:uppercase}
.lang-toggle span.active{color:var(--main);text-decoration:underline}
#timestamp{font-size:10px;color:var(--sub);text-transform:uppercase;font-weight:700;letter-spacing:.5px;cursor:pointer}
.text-btn{font-size:10px;font-weight:800;cursor:pointer;color:var(--main);text-transform:uppercase;background:none;border:none;padding:0}
.text-btn:hover{opacity:0.7}

/* Navigation onglets */
.tabs-nav{display:flex;justify-content:space-between;gap:10px;margin-top:20px;padding-bottom:5px;border-bottom:1px solid var(--grey);overflow-x:auto;scrollbar-width:none}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-view{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;cursor:pointer;white-space:nowrap;padding:4px 0;flex:1;text-align:center}
.tab-view.active{color:var(--main);border-bottom:2px solid var(--main)}

#content{margin-top:15px}

/* Fiches style "Cultures" pour les recettes */
.recipe-card{border:1px solid var(--grey);padding:12px;margin-bottom:12px;position:relative}
.recipe-title{font-weight:900;font-size:14px;color:var(--main);margin-bottom:6px;cursor:pointer}
.vol-bar{display:flex;gap:18px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.v-chip{font-size:13px;color:var(--sub);cursor:pointer}
.v-chip.active{color:var(--main);font-weight:900}
.tabs-row{display:flex;gap:18px;margin-bottom:20px;border-bottom:1px solid var(--grey);overflow-x:auto;padding-bottom:10px;align-items:flex-end;scrollbar-width:none}
.tabs-row::-webkit-scrollbar{display:none}
.tab{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;white-space:nowrap;cursor:pointer}
.tab.active{color:var(--main);font-size:14px;font-weight:900;border-bottom:2px solid var(--main);padding-bottom:2px}
table{width:100%;border-collapse:collapse;table-layout:fixed;margin-top:8px}
td{padding:12px 0;border-bottom:1px solid var(--grey)}
.col-n{width:45%;text-align:left;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.col-p{width:20%;text-align:right;font-size:11px;font-weight:800;color:var(--sub);cursor:pointer}
.col-v{width:35%;text-align:right;font-size:16px;font-weight:500}
.unit-s{font-size:11px;font-weight:700;color:var(--sub);margin-left:2px;text-transform:lowercase}
.section-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 0 6px 0}
.btn-add-ing{font-size:9px;font-weight:800;border:none;padding:0;text-transform:uppercase;cursor:pointer;background:none;color:var(--main)}
.total-label{font-size:11px;font-weight:800;text-transform:uppercase;text-align:right}
.note-area{width:100%;border:none;border-left:1px solid var(--grey);padding:8px 12px;font-family:var(--font);font-size:12px;color:var(--main);resize:none;margin-top:12px;background:var(--nav-bg);min-height:40px}
.meta-info{font-size:9px;color:var(--sub);margin-top:8px;margin-bottom:4px;display:flex;gap:12px;flex-wrap:wrap}
.meta-info span{font-weight:700}
.temp-badge{background:var(--grey);padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;color:var(--sub);display:inline-block}

/* Listes et cartes (cultures) */
.ingredients-list, .cultures-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.ingredient-item, .culture-card{border:1px solid var(--grey);padding:12px;position:relative}
.ingredient-item{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:12px}
.ing-name{font-weight:900;font-size:14px;width:100%}
.ing-details{font-size:10px;color:var(--sub);font-family:monospace;background:var(--grey);padding:2px 6px;border-radius:2px}
.culture-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;cursor:pointer}
.culture-name{font-weight:900;font-size:18px;letter-spacing:0.3px}
.culture-id{font-size:9px;color:var(--sub);font-family:monospace}
.culture-dates{font-size:10px;color:var(--sub);margin:2px 0}
.culture-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.btn-small{font-size:9px;font-weight:800;border:1px solid var(--main);padding:4px 8px;background:none;color:var(--main);cursor:pointer;text-transform:uppercase}
.btn-delete{background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:0 5px}
.btn-add{font-size:10px;font-weight:800;border:1px solid var(--main);background:none;color:var(--main);padding:8px;width:100%;text-transform:uppercase;cursor:pointer;margin-top:10px}

/* Timeline Gantt */
.gantt-outer{display:flex;overflow:hidden;margin-bottom:20px;border:1px solid var(--grey);border-radius:4px;background:var(--bg)}
.gantt-names-col{flex-shrink:0;width:100px;border-right:2px solid var(--main);display:flex;flex-direction:column;z-index:2;background:var(--bg)}
.gantt-names-header{height:52px;border-bottom:2px solid var(--main);padding:0 8px;display:flex;align-items:center;font-size:8px;font-weight:800;text-transform:uppercase;color:var(--sub);flex-shrink:0}
.gantt-name-cell{height:40px;padding:0 8px;display:flex;align-items:center;border-bottom:1px solid var(--grey);cursor:pointer;flex-shrink:0}
.gantt-name-cell:hover{background:var(--grey)}
.gantt-name-text{font-size:9px;font-weight:800;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;line-height:1.2}
.gantt-name-ir{font-size:8px;font-weight:900;color:var(--danger);flex-shrink:0;margin-left:4px}
.gantt-scroll{overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--grey) transparent}
.gantt-scroll::-webkit-scrollbar{height:3px}
.gantt-scroll::-webkit-scrollbar-thumb{background:var(--grey);border-radius:2px}
.gantt-grid{display:flex;flex-direction:column}
.gantt-months-row{display:flex;border-bottom:1px solid var(--grey);min-height:22px;background:var(--bg)}
.gantt-month-cell{flex-shrink:0;padding:3px 6px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--main);border-right:1px solid var(--grey);white-space:nowrap;overflow:hidden}
.gantt-days-row{display:flex;border-bottom:2px solid var(--main);min-height:30px;background:var(--bg);box-shadow:0 3px 8px -2px rgba(0,0,0,.12)}
.gantt-day-cell{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--grey);cursor:pointer;transition:background .1s}
.gantt-day-cell:hover{background:var(--grey)}
.gantt-day-cell.today{background:color-mix(in srgb,var(--danger) 12%,transparent);border-right-color:var(--danger)}
.gantt-day-cell.weekend{opacity:.45}
.gantt-day-name{font-size:6px;font-weight:800;text-transform:uppercase;color:var(--sub)}
.gantt-day-num{font-size:10px;font-weight:900;color:var(--main);line-height:1}
.gantt-day-cell.today .gantt-day-num{color:var(--danger)}
.gantt-body-rows{display:flex;flex-direction:column}
.gantt-body-row{position:relative;height:40px;border-bottom:1px solid var(--grey);display:flex}
.gantt-body-row:nth-child(even){background:color-mix(in srgb,var(--grey) 40%,transparent)}
.gantt-col-cell{flex-shrink:0;height:100%;border-right:1px solid transparent}
.gantt-col-cell.week-start{border-right-color:var(--grey)}
.gantt-col-cell.today-col{border-right:2px solid var(--danger)}
.gantt-bars-layer{position:absolute;inset:0;pointer-events:none}
.gantt-bar{position:absolute;height:12px;top:14px;border-radius:2px;background:var(--main);cursor:pointer;pointer-events:all;transition:opacity .15s}
.gantt-bar:hover{opacity:.7}
.gantt-bar.ev-incubation{background:#e0e0e0}
.gantt-bar.ev-observation{background:#d1d1d1}
.gantt-bar.ev-colonisation,.gantt-bar.ev-pinning{background:#666}
.gantt-bar.ev-recolte{background:#2ecc71}
.gantt-bar.ev-contamination,.gantt-bar.ev-echec{background:var(--danger)}
.gantt-bar.ev-note{background:#bbb}
.gantt-marker{width:8px;height:8px;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:5;border:none;padding:0;pointer-events:all;appearance:none;-webkit-appearance:none;transition:transform .12s,opacity .12s}
.gantt-marker:hover{transform:translate(-50%,-50%) scale(1.3);opacity:1}
.gantt-marker.inoculation,.gantt-marker.incubation{background:#fff;border:1px solid #ccc!important;box-shadow:0 0 0 .5px #ccc}
.gantt-marker.observation{background:#d1d1d1}
.gantt-marker.colonisation,.gantt-marker.pinning{background:#666}
.gantt-marker.recolte{background:#2ecc71}
.gantt-marker.contamination,.gantt-marker.echec{background:var(--danger)}
.gantt-marker.note{background:#d1d1d1}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);opacity:.7;pointer-events:none;z-index:4;transform:translateX(-50%)}
.gantt-tooltip{position:fixed;pointer-events:none;background:var(--main);color:var(--bg);font-size:9px;font-weight:700;padding:4px 8px;border-radius:2px;white-space:nowrap;z-index:9999;opacity:0;transition:opacity .1s}
.gantt-tooltip.visible{opacity:1}
.culture-code{display:inline-block;padding:4px 8px;background:var(--grey);border-radius:2px;font-size:10px;cursor:pointer;margin:2px}
.culture-code:hover{background:var(--sub);color:var(--bg)}

/* Modales */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--bg);color:var(--main);border:1px solid var(--main);width:90%;max-width:320px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.modal-input{width:100%;border:none;background:transparent;color:var(--main);border-bottom:2px solid var(--main);font-size:20px;padding:10px 0;margin-bottom:20px;border-radius:0}
.modal-input.small{font-size:16px;margin-bottom:10px}
.modal-label{font-size:9px;color:var(--sub);margin-bottom:2px;text-transform:uppercase;font-weight:700}
.modal-row{display:flex;gap:10px;margin-bottom:15px}
.modal-row .modal-input{flex:1}
.modal-btn{padding:15px;text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;border:1px solid var(--main);width:100%;margin-bottom:10px;display:block;color:var(--main);background:transparent}
.modal-btn.black{background:var(--main);color:var(--bg)}
.modal-btn.danger{border-color:var(--danger);color:var(--danger)}
#drawer{position:fixed;bottom:-100%;left:0;width:100%;background:var(--bg);border-top:2px solid var(--main);padding:25px;transition:.3s ease;z-index:1500;overflow-y:auto;max-height:80vh}
#drawer.open{bottom:0}
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:20px}
.lib-btn{padding:10px;border:1px solid var(--main);font-size:9px;font-weight:800;text-align:center;text-transform:uppercase;cursor:pointer;color:var(--main)}
.author-box{display:block;margin-top:30px;text-align:right;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--sub);cursor:pointer}
#author-name{color:var(--main)}

.recipe-pills-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.recipe-pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;cursor:pointer;color:var(--sub);background:transparent;border:none;font-family:var(--font);transition:background .1s}
.recipe-pill.active{background:#f0f0f0;color:var(--main)}
body.dark-mode .recipe-pill.active{background:#222;color:#fff}
.recipe-ctrl-bar{display:flex;justify-content:space-between;align-items:center;margin:0 0 10px 0;padding:6px 0;border-top:1px solid var(--grey);border-bottom:1px solid var(--grey)}
.recipe-ctrl-left{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px}
.recipe-ctrl-vol{font-weight:800;color:var(--main);cursor:pointer}
.recipe-ctrl-right{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:6px}
.recipe-ctrl-total{font-weight:800}

@media print{
  body.dark-mode{--bg:#fff;--main:#000;--sub:#777;--grey:#ddd}
  @page{size:A4;margin:1cm}
  body{padding:0;font-size:10px;line-height:1.3}
  .container{max-width:100%;width:100%}
  header{margin-bottom:4px;padding-bottom:4px}
  h1{font-size:16px}
  #timestamp{margin-bottom:8px;font-size:8px}
  .recipe-card{page-break-inside:avoid;margin-bottom:8px}
  .section-title{font-size:12px;margin-bottom:6px;padding-bottom:2px}
  td{padding:4px 0;font-size:10px}
  .col-v{font-size:11px}
  .note-area{background:#fff!important;color:#000!important;border:none!important;border-left:1px solid #ccc!important;padding:3px 6px;min-height:10px;margin-bottom:8px;font-size:9px}
  .author-box{display:block!important;margin-top:6px;text-align:right;color:#000!important}
  #author-name{color:#000!important}
  .vol-bar,.btn-add-ing,#drawer,#modal-overlay,.tab:not(.active),.v-chip:not(.active),.text-btn,.lang-toggle,.right-group,.tabs-nav,.btn-add,.btn-small,.btn-delete,.culture-footer,.no-print{display:none!important}
  .ingredient-item,.culture-card{border:1px solid #ccc;page-break-inside:avoid}
}
</style>
<!-- MycoLab v${APP_VERSION} -->
</head>
<body>
<div id="modal-overlay"><div class="modal" id="modal-box"></div></div>
<div class="container">
  <header>
    <div class="header-row">
      <h1>MycoLab</h1>
      <div class="right-group">
        <span class="text-btn" id="dark-toggle" onclick="APP.toggleDarkMode()" aria-label="Basculer mode sombre">Sombre</span>
        <div class="lang-toggle" onclick="APP.toggleLang()" aria-label="Changer la langue">
          <span id="l-fr">FR</span>/<span id="l-en">EN</span>
        </div>
      </div>
    </div>
    <div class="header-row bottom">
      <div id="timestamp" onclick="APP.pickDate()">...</div>
      <span class="text-btn" onclick="APP.openSaveModal()">Sauvegarde</span>
    </div>
    <div class="tabs-nav">
      <span class="tab-view" data-view="cultures">Cultures</span>
      <span class="tab-view" data-view="suivi">Suivi</span>
      <span class="tab-view" data-view="recipes">Recettes</span>
      <span class="tab-view" data-view="ingredients">Ingrédients</span>
    </div>
  </header>

  <div id="content"></div>

  <footer class="author-box" onclick="APP.prompt('Auteur:',APP.state.author||'',v=>APP.setAuthor(v))">
    <span id="author-name">...</span>
  </footer>
</div>

<div id="drawer">
  <div style="display:flex;justify-content:space-between;margin-bottom:15px;align-items:center">
    <span style="font-weight:900;font-size:10px" id="cat-label">CATALOGUE</span>
    <span onclick="APP.toggleDrawer(!1)" style="cursor:pointer;font-size:28px">&times;</span>
  </div>
  <div class="lib-grid" id="lib-list"></div>
</div>

<script>
(function () {
  'use strict';
  // ── Déregistrement du Service Worker ──────────────────────────
  // Empêche tout SW existant de servir une ancienne version en cache.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.unregister());
    });
  }
  // ──────────────────────────────────────────────────────────────


  // ============================================================
  // VERSION
  // ============================================================
  const APP_VERSION = '6.7.0';

  // ============================================================
  // DONNÉES DE RÉFÉRENCE
  // Scores des phases — utilisés pour calcIR et création de types d'événements
  // ============================================================
  const PHASE_KINDS = {
    inoculation:   { re: /inocul|incubat/i,                         score: +10, label: 'Incubation'   },
    colonisation:  { re: /colonis|myc[eé]l|mycelium|blanc/i,       score: +15, label: 'Colonisation' },
    pinning:       { re: /primordia|pins|pin\b|pinning|[eé]bauche/i,score: +20, label: 'Pinning'      },
    recolte:       { re: /r[eé]colte|harvest/i,                    score: +40, label: 'Récolte'       },
    observation:   { re: /sain|healthy|vigoureux|dense|rapide|propre|clean/i, score: +5, label: 'Observation' },
    contamination: { re: /contam|moisissure|mold|tricho|bact[eé]r/i,score: -60, label: 'Contamination'},
    echec:         { re: /[eé]chec|fail|abort|perdu|mort/i,        score: -40, label: 'Échec'         },
  };

  // ============================================================
  // FONCTIONS PURES — ÉTAT DE LA CULTURE
  // Déterministes, indépendantes de l'ordre des events
  // ============================================================

  /**
   * Calcule le statut d'une culture depuis ses événements.
   * Règle : phase la plus avancée, avec priorité aux états terminaux.
   * Appelé uniquement dans _updateState et migrateEvents (jamais au rendu).
   */
  function computeStatus(events) {
    if (!events || events.length === 0) return 'note';
    const evs = events.filter(e => e && e.kind);
    if (evs.some(e => e.kind === 'echec'))         return 'echec';
    if (evs.some(e => e.kind === 'contamination')) return 'contamination';
    if (evs.some(e => e.kind === 'recolte'))       return 'recolte';
    if (evs.some(e => e.kind === 'pinning'))       return 'pinning';
    if (evs.some(e => e.kind === 'colonisation'))  return 'colonisation';
    if (evs.some(e => e.kind === 'inoculation'))   return 'inoculation';
    // Fallback déterministe : observation > dernier event daté > note
    if (evs.some(e => e.kind === 'observation')) return 'observation';
    const dated = evs.filter(e => e.date).sort((a, b) => b.date - a.date);
    if (dated.length) return dated[0].kind || 'note';
    return evs.length ? (evs[evs.length - 1].kind || 'note') : 'note';
  }

  /**
   * Retourne la dernière température connue depuis les événements structurés.
   * Lit ev.temperature (champ actuel) avec compat ev.temp_c (legacy).
   */
  function computeCurrentTemp(events) {
    if (!events || !events.length) return null;
    const sorted = events.slice().sort((a, b) => (b.date || 0) - (a.date || 0));
    const found = sorted.find(ev => ev.temperature != null || ev.temp_c != null);
    if (!found) return null;
    return found.temperature != null ? found.temperature : found.temp_c;
  }

  /**
   * Traduit un texte libre utilisateur en kind structuré.
   * Utilisé UNIQUEMENT dans les formulaires (UI→données) et la migration.
   * Jamais dans le rendu.
   */
  function detectKind(text) {
    if (!text) return 'note';
    const lower = text.toLowerCase();
    try {
      const refs = Stores.refs.data.eventTypes;
      for (const t of refs) {
        if (lower.includes(t.label.toLowerCase())) return t.kind || t.id;
      }
    } catch (_) { /* Stores pas encore initialisé */ }
    for (const [k, def] of Object.entries(PHASE_KINDS)) {
      if (def.re.test(text)) return k;
    }
    return 'note';
  }

  // ============================================================
  // i18n
  // ============================================================
  const LANGS = {
    fr: {
      tabRecipes: 'Recettes', tabIngredients: 'Ingrédients', tabCultures: 'Cultures', tabSuivi: 'Suivi',
      noCultures: 'Aucune culture.', noCulturesToDisplay: 'Aucune culture à afficher.', createBatch: 'Créer un lot',
      titles: ['I. Incubation', 'II. Culture', 'III. Casing'],
      total: 'TOTAL', addIng: '+ INGRÉDIENT', notes: 'Notes techniques...',

  // ============================================================
  // UTILITAIRES
  // ============================================================
  const Utils = {
    /** Génère un identifiant unique stable (timestamp base36 + aléatoire). */
    uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); },
    slugify(str) {
      return str.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    },
    translateIngredientName(name, targetLang) {
      if (!name) return name;
      const srcLang = targetLang === 'en' ? 'fr' : 'en';
      const srcLib = LANGS[srcLang].lib;
      const dstLib = LANGS[targetLang].lib;
      const idx = srcLib.findIndex(item => item.name.toLowerCase() === name.toLowerCase());
      return idx !== -1 ? dstLib[idx].name : name;
    },
    formatDate(timestamp, lang) {
      const d = timestamp ? new Date(timestamp) : new Date();
      return d.toLocaleDateString(lang === 'fr' ? 'fr-CH' : 'en-GB', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    },
    toDDMMYYYY(ts) {
      const d = new Date(ts);
      return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
    },
    cleanSectionName(name) {
      return name ? name.replace(/^[IVX]+\.\s*/i, '').trim() : name;
    },
    generateCultureId(strain, gen) {
      const prefix = strain.substring(0, 4).toUpperCase().replace(/[^A-Z]/g, '') || 'LOT';
      const rand = Math.random().toString(36).slice(2, 5).toUpperCase();
      return `${prefix}-${gen || 'G1'}-${new Date().toISOString().slice(0, 10).replace(/-/g, '')}-${rand}`;
    },
    /**
     * Calcule l'affichage d'un ingrédient en L ou kg.
     * Lit la densité depuis ing.density (figée dans recette) ou le référentiel global.
     */
    calcIngredientDisplay(ing, vol, weightMode) {
      try {
        const safeDens = (raw, fb) => { const d = parseFloat(raw); return (isFinite(d) && d > 0) ? d : fb; };
        if (ing.u === 'cs' || ing.u === 'cc') {
          const mlPU = ing.u === 'cs' ? 15 : 5;
          const nU = (ing.r || 0) * vol * 10 / (ing.u === 'cs' ? 150 : 50);
          const vL = nU * mlPU / 1000;
          const fullIng = ing.ingId ? Stores.ingredients.data.find(i => i.id === ing.ingId) : null;
          const dens = safeDens(fullIng?.density ?? ing.density, 1.2);
          return `${Math.round(vL * dens * 1000)}<span class="unit-s">g</span>`;
        }
        const l = (ing.r || 0) * vol / 1000;
        if (!weightMode) return `${l.toFixed(2)}<span class="unit-s">L</span>`;
        const fullIng = ing.ingId ? Stores.ingredients.data.find(i => i.id === ing.ingId) : null;
        const dens = safeDens(fullIng?.density ?? ing.density, 1.0);
        const g = Math.round(l * dens * 1000);
        return g >= 1000 ? `${(g / 1000).toFixed(2)}<span class="unit-s">kg</span>` : `${g}<span class="unit-s">g</span>`;
      } catch (_) { return '—'; }
    },
    /**
     * Calcule l'Indice de Résultat (0-100) depuis les events.
     * Utilise uniquement ev.kind et ev.yield_g (champs structurés).
     */
    calcIR(culture) {
      try {
        if (!culture.events || culture.events.length === 0) return null;
        let score = 0;
        culture.events.forEach(ev => {
          const kind = ev.kind || 'note';
          let evScore = 0;
          try {
            const ref = Stores.refs.data.eventTypes.find(r => r.id === kind || r.kind === kind);
            evScore = ref ? ref.score : (PHASE_KINDS[kind] ? PHASE_KINDS[kind].score : 0);
          } catch (_) {
            evScore = PHASE_KINDS[kind] ? PHASE_KINDS[kind].score : 0;
          }
          score += evScore;
          if (kind === 'recolte' && typeof ev.yield_g === 'number') {
            if (ev.yield_g >= 200) score += 15;
            else if (ev.yield_g >= 100) score += 8;
            else if (ev.yield_g >= 50) score += 4;
          }
        });
        return Math.max(0, Math.min(100, Math.round(score)));
      } catch (_) { return null; }
    },
    irColor(score) {
      if (score === null) return 'var(--sub)';
      if (score >= 70) return 'var(--main)';
      if (score >= 40) return '#e07a00';
      return 'var(--danger)';
    },
    /**
     * Crée un snapshot figé et autonome d'une section de recette.
     * Toutes les données nécessaires sont copiées — la culture n'a plus besoin du référentiel.
     */
    createRecipeSnapshot(sectionIdx, recipesStore, ingredientsStore) {
      try {
        if (sectionIdx == null || sectionIdx < 0 || sectionIdx >= recipesStore.length) return null;
        const section = recipesStore[sectionIdx];
        if (!section) return null;
        const ingredients = (section.i || []).map(ing => {
          const fullIng = ing.ingId ? ingredientsStore.data.find(i => i.id === ing.ingId) : null;
          return {
            name:    ing.n,
            ingId:   ing.ingId || null,
            percent: ing.r / 10,
            unit:    ing.u,
            density: fullIng?.density ?? ing.density ?? null,
            ph:      fullIng?.ph      ?? ing.ph      ?? null,
            notes:   fullIng?.notes   ?? ''
          };
        });
        return {
          sectionId:   section.id   || null,
          sectionName: section.t,
          groupName:   section.t,
          volume:      section.v,
          temp_c:      section.temp_c || null,
          ingredients
        };
      } catch (_) { return null; }
    },
    // ── Migrations ──────────────────────────────────────────────────
    /**
     * Migration one-time des ingId manquants dans les recettes.
     * Seul endroit autorisé pour la recherche par nom dans le référentiel.
     */
    migrateRecipeIngIds() {
      // Migration one-time : seul endroit autorisé pour la recherche par nom.
      // Relie ingId + fige densité + assigne iid stable aux items + id aux sections.
      let dirty = false;
      try {
        Stores.recipes.data.forEach(section => {
          if (!section.id) { section.id = Utils.uid(); dirty = true; }
          (section.i || []).forEach(ing => {
            if (!ing.iid) { ing.iid = Utils.uid(); dirty = true; }
            const found = ing.ingId
              ? Stores.ingredients.data.find(i => i.id === ing.ingId)
              : Stores.ingredients.data.find(i => i.name.toLowerCase() === (ing.n || '').toLowerCase());
            if (found) {
              if (!ing.ingId) { ing.ingId = found.id; dirty = true; }
              if (ing.density == null && found.density != null) { ing.density = found.density; dirty = true; }
            }
          });
        });
        if (dirty) Stores.recipes.save();
      } catch (e) { console.error('[MycoLab] migrateRecipeIngIds:', e); }
    },
    /**
     * Migration one-time des cultures existantes vers le nouveau modèle.
     * Normalise les events, promeut les snapshots legacy, calcule les champs d'état.
     */
    migrateEvents() {
      let dirty = false;
      try {
        Stores.cultures.data.forEach(c => {
          // Champs obligatoires
          if (!c.created_at) { c.created_at = c.date_start || Date.now(); dirty = true; }
          if (c.notes == null) { c.notes = ''; dirty = true; }
          if (!Array.isArray(c.events)) { c.events = []; dirty = true; }

          const events = c.events || [];
          events.forEach(ev => {
            // kind manquant → détecter depuis type (migration one-time)
            if (!ev.kind) { ev.kind = detectKind(ev.type || ''); dirty = true; }
            if (!ev.eid)  { ev.eid = `ev_${ev.date || Date.now()}_${Math.random().toString(36).slice(2, 7)}`; dirty = true; }
            if (!ev.date || isNaN(ev.date)) { ev.date = Date.now(); dirty = true; }
            // Normaliser temp_c → temperature (one-time)
            if (ev.temp_c !== undefined && ev.temperature === undefined) {
              ev.temperature = ev.temp_c; delete ev.temp_c; dirty = true;
            }
            // Extraire yield_g depuis ev.type si recolte (last time le regex est autorisé)
            if (ev.kind === 'recolte' && ev.yield_g === undefined && ev.type) {
              const m = ev.type.match(/(\d+)\s*g\b/);
              if (m) { ev.yield_g = parseInt(m[1]); dirty = true; }
            }
            // Purger les snapshots stockés dans les events (legacy)
            if (ev.recipeSnapshot !== undefined) { delete ev.recipeSnapshot; dirty = true; }
          });

          c.events = events.slice().sort((a, b) => (a.date || 0) - (b.date || 0));

          // Promouvoir le snapshot legacy s'il est encore dans un event
          if (!c.recipeSnapshot) {
            const legacyEv = c.events.find(e => e && e._legacySnapshot);
            if (legacyEv) { c.recipeSnapshot = legacyEv._legacySnapshot; delete legacyEv._legacySnapshot; dirty = true; }
          }

          // Champs d'état — toujours recalculés en migration pour cohérence
          Stores.cultures._updateState(c);
          dirty = true;
        });
        if (dirty) Stores.cultures.save();
      } catch (e) { console.error('[MycoLab] migrateEvents:', e); }
    }
  };

  // ============================================================
  // VALIDATION
  // ============================================================
  const Validate = {
    _strip(s) { return String(s).replace(/[<>&"'`]/g, ''); },
    name(val) {
      const v = this._strip(val || '').trim();
      if (v.length < 2) return { valid: false, error: State.lang === 'fr' ? 'Nom trop court (min 2 car.)' : 'Name too short (min 2 chars)' };
      if (v.length > 50) return { valid: false, error: State.lang === 'fr' ? 'Nom trop long (max 50 car.)' : 'Name too long (max 50 chars)' };
      return { valid: true, value: v };
    },
    density(val) {
      const n = parseFloat(String(val).replace(',', '.'));
      if (isNaN(n) || n <= 0) return { valid: false, error: State.lang === 'fr' ? 'Densité invalide (> 0)' : 'Invalid density (> 0)' };
      if (n > 5) return { valid: false, error: State.lang === 'fr' ? 'Densité trop élevée (max 5)' : 'Density too high (max 5)' };
      return { valid: true, value: n };
    },
    ph(val) {
      const n = parseFloat(String(val).replace(',', '.'));
      if (isNaN(n) || n < 0 || n > 14) return { valid: false, error: State.lang === 'fr' ? 'pH invalide (0–14)' : 'Invalid pH (0–14)' };
      return { valid: true, value: n };
    }
  };

  // ============================================================
  // TOAST
  // ============================================================
  const Toast = {
    _el: null,
    _init() {
      if (this._el) return;
      this._el = document.createElement('div');
      this._el.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none';
      document.body.appendChild(this._el);
    },
    show(message, type = 'info', duration = 3000) {
      this._init();
      const bg = type === 'success' ? '#2ecc71' : type === 'error' ? '#ff4d4d' : '#666';
      const el = document.createElement('div');
      el.textContent = message;
      el.style.cssText = `background:${bg};color:#fff;padding:10px 16px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:260px;box-shadow:0 4px 12px rgba(0,0,0,.2)`;
      this._el.appendChild(el);
      requestAnimationFrame(() => el.style.opacity = '1');
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }, duration);
    },
    success(msg, d) { this.show(msg, 'success', d); },
    error(msg, d)   { this.show(msg, 'error', d); },
    info(msg, d)    { this.show(msg, 'info', d); }
  };

  function safeSet(key, value) {
    try { localStorage.setItem(key, value); return true; }
    catch (e) {
      if (e.name === 'QuotaExceededError' || e.code === 22)
        Toast.error(State.lang === 'fr' ? 'Stockage plein — exporte tes données' : 'Storage full — export your data');
      return false;
    }
  }

  // ============================================================
  // ANALYTICS
  // Module optionnel — l'app fonctionne même si ces fonctions échouent.
  // Ne lit JAMAIS depuis les recettes ou ingrédients globaux.
  // Lit uniquement depuis culture.events (historique) et culture.recipeSnapshot.
  // ============================================================
  const Analytics = {
    /**
     * Calcule les durées de phases depuis l'historique d'événements.
     * Analytique uniquement — ne met pas à jour l'état de la culture.
     */
    getPhaseDurations(events) {
      try {
        if (!events || events.length < 2) return { phases: [], dTotal: null };
        const D = 86400000;
        const find     = (...kinds) => events.find(e => kinds.includes(e.kind));
        const findLast = (...kinds) => events.slice().reverse().find(e => kinds.includes(e.kind));
        const days = (a, b) => (a && b && b.date > a.date) ? Math.round((b.date - a.date) / D) : null;
        const evInoc  = find('inoculation');
        const evColon = find('colonisation');
        const evPrimo = find('pinning');
        const evRecol = findLast('recolte');
        const d1 = days(evInoc, evColon);
        const d2 = days(evColon || evInoc, evPrimo);
        const d3 = days(evPrimo || evColon || evInoc, evRecol);
        const dTotal = days(evInoc, evRecol) ?? (events.length >= 2 ? Math.round((events[events.length - 1].date - events[0].date) / D) : null);
        const phases = [];
        if (d1 !== null) phases.push(`Incub. ${d1}j`);
        if (d2 !== null) phases.push(`Culture ${d2}j`);
        if (d3 !== null) phases.push(`Culture ${d3}j`);
        return { phases, dTotal };
      } catch (_) { return { phases: [], dTotal: null }; }
    },
    getCultureAge(culture, referenceDate) {
      try {
        if (!culture.date_start) return 0;
        return Math.max(0, Math.round((referenceDate - culture.date_start) / 86400000));
      } catch (_) { return 0; }
    },
    /**
     * Résumé analytique d'une culture.
     * Lit status et current_temp DIRECTEMENT depuis la culture (jamais recalculé ici).
     * Retourne un objet safe même en cas d'erreur.
     */
    getSummary(culture) {
      const SAFE = { ir: null, phases: [], dTotal: null, status: 'note', current_temp: null };
      try {
        if (!culture) return SAFE;
        const ir           = Utils.calcIR(culture);
        const { phases, dTotal } = this.getPhaseDurations(culture.events || []);
        const status       = culture.status || 'note';
        const current_temp = culture.current_temp != null ? culture.current_temp : null;
        return { ir, phases, dTotal, status, current_temp };
      } catch (e) {
        console.error('[MycoLab] Analytics.getSummary:', e);
        return SAFE;
      }
    }
  };

  // ============================================================
  // STORES
  // ============================================================
  const Stores = {

    // ── Recettes ────────────────────────────────────────────────
    recipes: {
      data: [],
      save() { try { safeSet('mycolab_recipes_v1', JSON.stringify(this.data)); } catch (_) {} },
      load() {
        try {
          const raw = localStorage.getItem('mycolab_recipes_v1');
          if (raw) {
            this.data = JSON.parse(raw);
            let dirty = false;
            const RENAME = {
              'I. Inoculations': 'I. Incubation', 'I. Inoculation': 'I. Incubation',
              'II. Fructification': 'II. Culture', 'II. Fruiting': 'II. Culture',
              'II. Substrats': 'II. Culture', 'II. Substrates': 'II. Culture'
            };
            this.data.forEach(s => { if (RENAME[s.t]) { s.t = RENAME[s.t]; dirty = true; } });
            // Migration g[] → i[] flat (legacy)
            this.data = this.data.map(s => {
              if (s.g && !s.i) {
                dirty = true;
                return { id: s.id, t: s.t, v: s.v, cv: s.cv, note: s.note || '', temp_c: s.temp_c || null, i: (s.g || []).flatMap(g => g.i || []) };
              }
              if (!s.i) { s.i = []; dirty = true; }
              if (s.g) { delete s.g; dirty = true; }
              return s;
            });
            if (dirty) this.save();
            return;
          }
          // Ancien format v43
          const old = localStorage.getItem('mycolab_v43_0');
          if (old) {
            this.data = JSON.parse(old).map(s => {
              if (s.g && !s.i) return { id: s.id, t: s.t, v: s.v, cv: s.cv, note: s.note || '', temp_c: s.temp_c || null, i: (s.g || []).flatMap(g => g.i || []) };
              if (!s.i) s.i = [];
              if (s.g) delete s.g;
              return s;
            });
            this.save(); return;
          }
        } catch (e) { console.error('[MycoLab] recipes.load:', e); }
        this.data = this.defaultData();
      },
      defaultData() {
        const fr = State.lang === 'fr';
        const mkI = (nfr, nen, r, u) => ({ n: fr ? nfr : nen, ingId: Utils.slugify(nen), r, u });
        // UIDs stables dès la création — pas d'index numérique
        return [
          { id: 'rec-bocal', t: fr ? 'Bocal Carton' : 'Cardboard Jar', v: 0.5, cv: [0.5, 1, 2, 5], note: fr ? 'Incubation' : 'Incubation', temp_c: 23, i: [
            mkI('Carton', 'Cardboard', 450, 'vol'), mkI('Vermiculite', 'Vermiculite', 400, 'vol'),
            mkI('Épeautre', 'Spelt', 100, 'vol'), mkI('Blanc de Meudon', 'Chalk', 50, 'cs')
          ]},
          { id: 'rec-bulk7l', t: fr ? 'Bulk 7L' : 'Bulk 7L', v: 7, cv: [5, 7, 12, 15], note: fr ? 'Culture' : 'Culture', temp_c: 23, i: [
            mkI('Fibre de Coco', 'Coco Coir', 600, 'vol'), mkI('Vermiculite', 'Vermiculite', 200, 'vol'),
            mkI('Paille hachée', 'Chopped Straw', 100, 'vol'), mkI('Gypse', 'Gypsum', 100, 'cs')
          ]},
          { id: 'rec-casing', t: fr ? 'Casing pH+' : 'Casing pH+', v: 1.2, cv: [0.5, 1, 1.2, 2], note: fr ? 'Casing' : 'Casing', temp_c: 20, i: [
            mkI('Vermiculite', 'Vermiculite', 670, 'vol'), mkI('Fibre de Coco', 'Coco Coir', 280, 'vol'),
            mkI('Blanc de Meudon', 'Chalk', 40, 'cs'), mkI('Chaux', 'Lime', 10, 'cc')
          ]}
        ];
      }
    },

    // ── Ingrédients ─────────────────────────────────────────────
    ingredients: {
      data: [],
      save() { safeSet('mycolab_ingredients_v1', JSON.stringify(this.data)); },
      load() {
        try {
          const raw = localStorage.getItem('mycolab_ingredients_v1');
          if (raw) { this.data = JSON.parse(raw); return; }
        } catch (_) {}
        this.data = LANGS[State.lang].lib.map(item => ({
          id: Utils.slugify(item.name), name: item.name,
          density: item.density != null ? item.density : null,
          ph: item.ph != null ? item.ph : null,
          notes: item.notes || ''
        }));
        this.save();
      },
      add(ing) { this.data.push(ing); this.save(); State.notify(); },
      update(id, newData) {
        const idx = this.data.findIndex(i => i.id === id);
        if (idx !== -1) { this.data[idx] = { ...this.data[idx], ...newData }; this.save(); State.notify(); }
      },
      delete(id) { this.data = this.data.filter(i => i.id !== id); this.save(); State.notify(); },
      findByName(name) { return this.data.find(i => i.name.toLowerCase() === name.toLowerCase()); }
    },

    // ── Cultures ────────────────────────────────────────────────
    cultures: {
      data: [],
      save() {
        try {
          const json = JSON.stringify(this.data);
          safeSet('mycolab_cultures_v1', json);
          safeSet('mycolab_snapshot', json);
        } catch (_) {}
      },
      load() {
        try {
          const raw = localStorage.getItem('mycolab_cultures_v1');
          if (raw) { this.data = JSON.parse(raw); return; }
        } catch (_) {}
        this.data = [];
      },
      /**
       * Met à jour les champs d'état calculés depuis les events.
       * Appelé UNIQUEMENT après mutation de c.events.
       * Status, current_temp, last_event_date sont stockés — jamais recalculés au rendu.
       */
      _updateState(c) {
        const evs = c.events || [];
        c.status          = computeStatus(evs);
        c.current_temp    = computeCurrentTemp(evs);
        const sorted      = evs.slice().sort((a, b) => (b.date || 0) - (a.date || 0));
        c.last_event_date = sorted.length ? sorted[0].date : null;
      },
      add(c) { this.data.push(c); this.save(); State.notify(); },
      update(id, newData) {
        const idx = this.data.findIndex(c => c.id === id);
        if (idx !== -1) { this.data[idx] = { ...this.data[idx], ...newData }; this.save(); State.notify(); }
      },
      delete(id) { this.data = this.data.filter(c => c.id !== id); this.save(); State.notify(); },
      addEvent(id, event) {
        const c = this.data.find(c => c.id === id);
        if (!c) return;
        if (!Array.isArray(c.events)) c.events = [];
        if (!event.eid) event.eid = `ev_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
        // Normaliser temp_c → temperature (compat legacy)
        if (event.temp_c !== undefined && event.temperature === undefined) {
          event.temperature = event.temp_c; delete event.temp_c;
        }
        // Les events ne portent jamais de recipeSnapshot
        delete event.recipeSnapshot;
        c.events.push(event);
        c.events.sort((a, b) => (a.date || 0) - (b.date || 0));
        this._updateState(c);
        this.save();
        State.notify();
      },
      updateEvent(id, eid, newEv) {
        // Recherche par eid stable — jamais par index numérique
        const c = this.data.find(c => c.id === id);
        if (!c || !Array.isArray(c.events)) return;
        const idx = c.events.findIndex(e => e.eid === eid);
        if (idx < 0) return;
        newEv.eid = eid; // conserver l'eid original
        if (newEv.temp_c !== undefined && newEv.temperature === undefined) {
          newEv.temperature = newEv.temp_c; delete newEv.temp_c;
        }
        delete newEv.recipeSnapshot;
        c.events[idx] = newEv;
        c.events.sort((a, b) => (a.date || 0) - (b.date || 0));
        this._updateState(c);
        this.save();
        State.notify();
      },
      deleteEvent(id, eid) {
        // Recherche par eid stable — jamais par index numérique
        const c = this.data.find(c => c.id === id);
        if (!c || !Array.isArray(c.events)) return;
        const idx = c.events.findIndex(e => e.eid === eid);
        if (idx < 0) return;
        c.events.splice(idx, 1);
        c.events.sort((a, b) => (a.date || 0) - (b.date || 0));
        this._updateState(c);
        this.save();
        State.notify();
      },
      /**
       * Point d'entrée centralisé et atomique pour toute mutation d'une culture.
       * Garantit : culture existante par ID, _updateState appelé, save atomique.
       * Interdit de créer un event sans culture existante.
       * @param {string} cultureId  - ID stable de la culture (jamais un index)
       * @param {'addEvent'|'updateEvent'|'deleteEvent'} actionType
       * @param {object|number} payload - event object | {idx, ev} | event index
       * @returns {boolean} succès
       */
      updateCulture(cultureId, actionType, payload) {
        const c = this.data.find(c => c.id === cultureId);
        if (!c) {
          console.warn('[MycoLab] updateCulture: culture introuvable', cultureId);
          return false;
        }
        switch (actionType) {
          case 'addEvent':    this.addEvent(cultureId, payload);                        break;
          case 'updateEvent': this.updateEvent(cultureId, payload.eid, payload.ev);     break;
          case 'deleteEvent': this.deleteEvent(cultureId, payload);                     break;
          // payload pour updateEvent = {eid, ev}  — jamais un index numérique
          default: console.warn('[MycoLab] updateCulture: action inconnue', actionType); return false;
        }
        return true;
      }
    },

    // ── Références événements ────────────────────────────────────
    refs: {
      data: { eventTypes: [] },
      save() { safeSet('mycolab_refs_v1', JSON.stringify(this.data)); },
      load() {
        try {
          const raw = localStorage.getItem('mycolab_refs_v1');
          if (raw) { this.data = JSON.parse(raw); return; }
        } catch (_) {}
        this.data = this.defaultData();
        this.save();
      },
      defaultData() {
        return {
          eventTypes: Object.entries(PHASE_KINDS).map(([kind, def]) => ({ id: kind, label: def.label, kind, score: def.score }))
        };
      },
      addEventType(label) {
        const id = label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        if (this.data.eventTypes.find(t => t.id === id)) return id;
        const kind = detectKind(label);
        const score = PHASE_KINDS[kind] ? PHASE_KINDS[kind].score : 0;
        this.data.eventTypes.push({ id, label, kind, score });
        this.save();
        return id;
      },
      deleteEventType(id) {
        if (PHASE_KINDS[id]) return; // Protéger les types système
        this.data.eventTypes = this.data.eventTypes.filter(t => t.id !== id);
        this.save();
        State.notify();
      }
    }
  };

  const State = {
    view: 'cultures',
    lang: 'fr',
    dark: false,
    author: '',
    customDate: null,
    activeCat: 0,
    pressTimer: null,
    unitMode: 'L',
    _listeners: [],
    subscribe(fn) { this._listeners.push(fn); },
    notify() { this._listeners.forEach(fn => { try { fn(); } catch (e) { console.error('[MycoLab] notify:', e); } }); },
    setView(v) { this.view = v; this.notify(); },
    toggleLang() {
      const newLang = this.lang === 'fr' ? 'en' : 'fr';
      Stores.ingredients.data.forEach(ing => {
        const translated = Utils.translateIngredientName(ing.name, newLang);
        if (translated !== ing.name) {
          const newId = Utils.slugify(translated);
          Stores.recipes.data.forEach(section => {
            (section.i || []).forEach(ri => {
              if (ri.ingId === ing.id) { ri.n = translated; ri.ingId = newId; }
            });
          });
          ing.name = translated;
          ing.id   = newId;
        }
      });
      Stores.ingredients.save();
      Stores.recipes.save();
      this.lang = newLang;
      safeSet('mycolab_lang', newLang);
      this.notify();
    },
    toggleDarkMode() {
      this.dark = !this.dark;
      document.body.classList.toggle('dark-mode', this.dark);
      safeSet('mycolab_dark', this.dark);
      this.notify();
    },
    setAuthor(a) { this.author = a; safeSet('mycolab_author', a); this.notify(); },
    setCustomDate(ts) {
      this.customDate = ts;
      if (ts) safeSet('mycolab_customDate', ts);
      else localStorage.removeItem('mycolab_customDate');
      this.notify();
    },
    getEffectiveDate() { return this.customDate ? new Date(this.customDate) : new Date(); },
    load() {
      const l = localStorage.getItem('mycolab_lang');     if (l) this.lang = l;
      const d = localStorage.getItem('mycolab_dark');     if (d === 'true') this.dark = true;
      const a = localStorage.getItem('mycolab_author');   if (a) this.author = a;

  };

  // ============================================================
  // MODAL MANAGER
  // ============================================================
  const Modal = {
    show(html) {
      document.getElementById('modal-box').innerHTML = html;
      document.getElementById('modal-overlay').style.display = 'flex';
    },
    close() { document.getElementById('modal-overlay').style.display = 'none'; },
    confirm(title, message, onConfirm, onCancel) {

      this.show(`
        <div style="font-size:13px;font-weight:900;margin-bottom:8px">${title}</div>

        <div class="modal-btn" id="confirm-cancel">${L.cancel}</div>
      `);
      document.getElementById('confirm-ok').onclick     = () => { Modal.close(); onConfirm && onConfirm(); };
      document.getElementById('confirm-cancel').onclick = () => { Modal.close(); onCancel && onCancel(); };
    },
    prompt(title, defaultValue, callback) {
      const L = LANGS[State.lang];
      this.show(`
        <div style="font-size:10px;font-weight:900;margin-bottom:10px">${title}</div>
        <input type="text" id="p-in" class="modal-input" value="${defaultValue}">

    },

        <textarea id="modal-ing-notes" class="modal-input small" rows="2" placeholder="${L.placeholderNotes}">${ing ? (ing.notes || '') : ''}</textarea>

    eventForm(event, callback) {

        Stores.recipes.data.map(s => {
          const val = String(s.id);
          return `<option value="${val}" ${currentRecipe === val ? 'selected' : ''}>${s.t}</option>`;
        }).join('');

          return;

        const recipeRef   = document.getElementById('modal-event-recipe').value || null;
        const kind        = detectKind(t); // Traduction UI→données (seul usage légitime)
        const tempInput   = parseFloat(document.getElementById('modal-event-temp').value);
        const temperature = !isNaN(tempInput) ? tempInput : null;
        let yield_g = null;
        if (kind === 'recolte') { const m = t.match(/(\d+)\s*g\b/); if (m) yield_g = parseInt(m[1]); }
        // L'event ne porte JAMAIS de recipeSnapshot — snapshot = culture uniquement
        callback({ date: new Date(d + 'T12:00:00').getTime(), type: t, kind, temperature, yield_g, recipeRef });
        Modal.close();
      };

  // Règle absolue : le rendu lit uniquement depuis c.* (culture autonome).
  // Aucun calcul d'état, aucun accès au référentiel global pour afficher une culture.
  // ============================================================
  const Renderer = {
    render() {
      const L = LANGS[State.lang];
      document.getElementById('l-fr').className = State.lang === 'fr' ? 'active' : '';
      document.getElementById('l-en').className = State.lang === 'en' ? 'active' : '';
      document.getElementById('dark-toggle').innerText = State.dark ? L.light : L.dark;
      document.getElementById('author-name').innerText = State.author || L.authorDef;
      document.getElementById('timestamp').innerText = Utils.formatDate(State.getEffectiveDate(), State.lang);
      document.querySelectorAll('.tab-view').forEach(tab => {
        const v = tab.dataset.view;
        tab.innerText = v === 'recipes' ? L.tabRecipes : v === 'ingredients' ? L.tabIngredients : v === 'cultures' ? L.tabCultures : L.tabSuivi;
        tab.classList.toggle('active', v === State.view);
      });
      try {
        if (State.view === 'recipes')     this.renderRecipes();
        else if (State.view === 'ingredients') this.renderIngredients();
        else if (State.view === 'cultures')    this.renderCultures();
        else if (State.view === 'suivi')       this.renderSuivi();
      } catch (e) {
        console.error('[MycoLab] render error:', e);
        document.getElementById('content').innerHTML = `<div style="padding:20px;text-align:center;color:var(--danger);font-size:11px">Erreur d'affichage — ${e.message}</div>`;
      }
    },

    // ── Recettes ─────────────────────────────────────────────────
    renderRecipes() {
      const L = LANGS[State.lang];
      const isWeight = State.unitMode === 'kg';
      let html = '<div class="cultures-list">';
      Stores.recipes.data.forEach(section => {
        // sid = section.id UID stable — jamais un index numérique
        const sid     = String(section.id);
        const ings    = section.i || [];
        const total   = ings.reduce((a, ing) => a + ing.r, 0) / 10;
        const totalOk = Math.abs(total - 100) < 0.1;
        const volChips = (section.cv || []).slice().sort((a, b) => a - b).map(v =>
          `<span style="font-size:11px;font-weight:${section.v == v ? '900' : '400'};color:${section.v == v ? 'var(--main)' : 'var(--sub)'};cursor:pointer"
            onmousedown="APP.startP(event,'vol',['${sid}',${v}])" ontouchstart="APP.startP(event,'vol',['${sid}',${v}])"
            onmouseup="APP.endP()" ontouchend="APP.endP()"
            onclick="APP.setV('${sid}',${v})">${v}L</span>`
        ).join(' ');
        html += `<div class="culture-card">
          <div class="culture-header">
            <div style="flex:1;cursor:pointer" onclick="APP.editSectionTitle('${sid}','${section.t.replace(/'/g, "\'")}')">
              <span class="culture-name">${Utils.cleanSectionName(section.t)}</span>
            </div>
            <button class="btn-delete" onclick="APP.confirmDelSection('${sid}')" style="color:var(--danger);font-size:18px;line-height:1;flex-shrink:0">×</button>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--grey)">
            ${volChips}
            <span style="font-size:11px;cursor:pointer;color:var(--sub);font-weight:800" onclick="APP.prompt('Vol (L):','',v=>APP.addV('${sid}',v))">+</span>
          </div>
          <div style="border-left:2px solid var(--grey);padding-left:12px;margin-bottom:8px">
            <table>${ings.map(ing => { const iid = String(ing.iid || ''); return `
              <tr>
                <td class="col-n" onmousedown="APP.startP(event,'ing',['${sid}','${iid}'])" ontouchstart="APP.startP(event,'ing',['${sid}','${iid}'])" onmouseup="APP.endP()" ontouchend="APP.endP()" onclick="APP.pickIngredient('${sid}','${iid}')">${ing.n}</td>
                <td class="col-p" onclick="APP.openRatio('${sid}','${iid}')">${(ing.r / 10).toFixed(1)}%</td>
                <td class="col-v">${Utils.calcIngredientDisplay(ing, section.v, isWeight)}</td>
              </tr>`; }).join('')}
            </table>
            <table style="width:100%;border-collapse:collapse;margin-top:0">
              <tr>
                <td style="width:45%;padding:6px 0 2px;border-bottom:none"><button class="btn-add-ing" onclick="APP.openDrawer('${sid}')">${L.addIng}</button></td>
                <td style="width:20%;text-align:right;padding:6px 0 2px;border-bottom:none;font-size:12px;font-weight:800;color:${totalOk ? 'var(--sub)' : 'var(--danger)'}">${total.toFixed(1)}%</td>
                <td style="width:35%;text-align:right;padding:6px 0 2px;border-bottom:none">
                  <span style="font-size:11px;font-weight:700;cursor:pointer;color:${isWeight ? 'var(--main)' : 'var(--sub)'}" onclick="APP.setUnit('kg')">kg</span>
                  <span style="font-size:11px;color:var(--grey)"> / </span>
                  <span style="font-size:11px;font-weight:700;cursor:pointer;color:${!isWeight ? 'var(--main)' : 'var(--sub)'}" onclick="APP.setUnit('L')">L</span>
                </td>
              </tr>
            </table>
          </div>
          <textarea class="note-area" style="margin-top:0" placeholder="${L.notes}" oninput="APP.updateSectionNote('${sid}',this.value)">${section.note || ''}</textarea>
        </div>`;
      });
      html += `<button class="btn-add" onclick="APP.addRecipeSection()">+ ${State.lang === 'fr' ? 'Nouvelle recette' : 'New recipe'}</button></div>`;
      document.getElementById('content').innerHTML = html;
      this.renderLib();
    },

    // ── Ingrédients ──────────────────────────────────────────────
    renderIngredients() {
      const L = LANGS[State.lang];
      let html = '<div class="ingredients-list">';
      const usage = {};
      Stores.recipes.data.forEach(section => {
        (section.i || []).forEach(ing => { const id = ing.ingId || Utils.slugify(ing.n); usage[id] = (usage[id] || 0) + 1; });
      });
      const sorted = Stores.ingredients.data.slice().sort((a, b) => (usage[b.id] || 0) - (usage[a.id] || 0));
      sorted.forEach(ing => {
        html += `<div class="ingredient-item" style="position:relative;padding-right:80px">
          <span class="ing-name">${ing.name}</span>
          <span class="ing-details">ρ=${ing.density || '?'} kg/L | pH=${ing.ph || '?'}</span>
          <span style="font-size:9px;color:var(--sub);width:100%">${ing.notes || ''}</span>
          <div style="position:absolute;top:10px;right:10px;display:flex;gap:10px;align-items:center">
            <button style="background:none;border:none;padding:0;font-size:9px;font-weight:800;text-transform:uppercase;color:var(--sub);cursor:pointer;text-decoration:underline" onclick="APP.editIngredient('${ing.id}')">éditer</button>
            <button class="btn-delete" onclick="APP.deleteIngredient('${ing.id}')">×</button>
          </div>
        </div>`;
      });
      html += `<button class="btn-add" onclick="APP.addIngredientPrompt()">${L.addIngredient}</button></div>`;
      document.getElementById('content').innerHTML = html;
    },

    // ── Cultures ─────────────────────────────────────────────────
    // Lit UNIQUEMENT depuis c.* — aucun accès au référentiel global.
    // Analytics appelé en try/catch : si absent, l'affichage continue.
    renderCultures() {
      const L = LANGS[State.lang];
      if (Stores.cultures.data.length === 0) {
        document.getElementById('content').innerHTML = `<div style="text-align:center;padding:40px;color:var(--sub)">${L.noCultures}<button class="btn-add" onclick="APP.addCulturePrompt()">${L.createBatch}</button></div>`;
        return;
      }
      let html = '<div class="cultures-list">';
      Stores.cultures.data.forEach(c => {
        // Données analytiques (optionnelles — try/catch)
        let ir = null, phases = [], dTotal = null;
        try { if(typeof Analytics!=='undefined' && Analytics.getSummary) ({ ir, phases, dTotal } = Analytics.getSummary(c)); } catch (_) {}
        const irLabel = ir === null ? '—' : `${ir}%`;

        // Données de base de la culture — lues directement depuis c.*
        const snap = c.recipeSnapshot || null;
        let recipeTag = '';
        if (snap) {
          const vol  = snap.volume != null ? ` · ${snap.volume}L` : '';
          const temp = snap.temp_c != null ? ` · ${snap.temp_c}°C` : '';
          recipeTag = `<div style="margin:4px 0"><div style="font-size:9px;color:var(--sub);font-family:monospace">↳ ${Utils.cleanSectionName(snap.sectionName)}${vol}${temp}</div>` +
            (snap.volume > 0 ? `<div style="font-size:9px;color:var(--sub);font-weight:800;margin-top:2px">VOL : ${parseFloat(snap.volume).toFixed(1)}L</div>` : '') + '</div>';
        }
        let dureeHtml = '';
        if (dTotal !== null) {
          const phaseStr = phases.length ? phases.join(' · ') + ' — ' : '';
          dureeHtml = `<div style="font-size:9px;color:var(--sub);font-style:italic;margin-bottom:4px">⏱ ${phaseStr}Total : ${dTotal}j</div>`;
        }
        let evHtml = '';
        if (c.events && c.events.length) {
          evHtml = '<div style="margin:8px 0 4px 0;border-left:1px solid var(--grey);padding-left:8px">' + dureeHtml +
            c.events.map((ev, evi) => {
              const evTemp = ev.temperature != null ? ev.temperature : ev.temp_c;
              return `<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;line-height:1.6">
                <span style="font-size:10px;color:var(--sub)">${Utils.toDDMMYYYY(ev.date)} : ${ev.type}${evTemp != null ? `<span style="font-size:9px;font-family:monospace;margin-left:5px">(${evTemp}°C)</span>` : ''}</span>
                <span style="display:flex;gap:8px;flex-shrink:0;margin-left:8px">
                  <button style="background:none;border:none;padding:0;font-size:9px;font-weight:800;text-transform:uppercase;color:var(--sub);cursor:pointer;text-decoration:underline" onclick="APP.editEventPrompt('${c.id}','${ev.eid}')">éditer</button>
                  <button class="btn-delete" style="font-size:12px" onclick="APP.confirmDeleteEvent('${c.id}','${ev.eid}')">×</button>
                </span>
              </div>`;
            }).join('') + '</div>';
        }
        const ageDays = (typeof Analytics!=='undefined' && Analytics.getCultureAge) ? Analytics.getCultureAge(c, State.getEffectiveDate()) : 0;
        html += `<div class="culture-card" data-culture-id="${c.id}">
          <div class="culture-header">
            <div style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1" onclick="APP.editCulture('${c.id}')">
              <span class="culture-name">${c.strain} (${c.generation})</span>
              <span class="culture-id">${c.id}</span>
              ${irLabel !== '—' ? `<span style="font-size:11px;font-weight:900;color:var(--danger)">${irLabel}</span>` : ''}
            </div>
            <button class="btn-delete" onclick="APP.deleteCulture('${c.id}')" style="color:var(--danger);font-size:18px;line-height:1;flex-shrink:0" aria-label="Supprimer ${c.id}">×</button>
          </div>
          <div class="culture-dates">${L.startDate} : ${Utils.toDDMMYYYY(c.date_start)}</div>
          <div style="font-size:9px;color:var(--sub);margin:1px 0 4px 0;display:flex;gap:10px;flex-wrap:wrap">
            <span>Inoculé il y a ${ageDays} jour(s)</span>
            ${c.status && c.status !== 'note' ? `<span style="font-weight:700;text-transform:uppercase;letter-spacing:.3px">${c.status}</span>` : ''}
            ${c.current_temp != null ? `<span style="font-family:monospace">${c.current_temp}°C</span>` : ''}
          </div>
          ${recipeTag}
          ${evHtml}
          <div class="culture-footer">
            <button class="btn-small" onclick="APP.addQuickEvent('${c.id}')">+ EVENT</button>
            <button class="btn-small" onclick="APP.printCulture('${c.id}')">PDF</button>
          </div>
        </div>`;
      });
      html += `<button class="btn-add" onclick="APP.addCulturePrompt()">${L.addCulture}</button></div>`;
      document.getElementById('content').innerHTML = html;
    },

    // ── Suivi (Gantt) ────────────────────────────────────────────
    renderSuivi() {
      const L = LANGS[State.lang];
      if (Stores.cultures.data.length === 0) {
        document.getElementById('content').innerHTML = `<div style="text-align:center;padding:40px;color:var(--sub)">${L.noCulturesToDisplay}<button class="btn-add" onclick="APP.setView('cultures')">${L.createBatch}</button></div>`;
        return;
      }
      const D = 86400000, PX = 20;
      const todayTs = new Date().setHours(0, 0, 0, 0);
      const sorted = Stores.cultures.data.slice().sort((a, b) => a.date_start - b.date_start);

      // Calcul de l'étendue — lit c.last_event_date (stocké, jamais calculé au rendu)
      let startTs = Infinity, endTs = -Infinity;
      sorted.forEach(c => {
        const s = new Date(c.date_start).setHours(0, 0, 0, 0);
        const led = c.last_event_date ? new Date(c.last_event_date).setHours(0, 0, 0, 0) : s;
        startTs = Math.min(startTs, s);
        endTs   = Math.max(endTs, led, todayTs);
      });
      startTs -= 7 * D; endTs += 90 * D;
      if ((endTs - startTs) / D < 365) endTs = startTs + 365 * D;

      const totalDays  = Math.ceil((endTs - startTs) / D);
      const totalWidth = totalDays * PX;
      const days = Array.from({ length: totalDays }, (_, i) => ({ ts: startTs + i * D, dt: new Date(startTs + i * D) }));

      const MONTH_ABBR = State.lang === 'fr'
        ? ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc']
        : ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const monthMap = [];
      days.forEach(({ dt }) => {
        const mk = `${dt.getFullYear()}-${dt.getMonth()}`;
        if (!monthMap.length || monthMap[monthMap.length - 1].key !== mk)
          monthMap.push({ key: mk, count: 1, year: dt.getFullYear(), month: dt.getMonth() });
        else monthMap[monthMap.length - 1].count++;
      });
      const monthsHTML = monthMap.map(m => `<div class="gantt-month-cell" style="width:${m.count * PX}px;min-width:${m.count * PX}px">${MONTH_ABBR[m.month]} ${m.year}</div>`).join('');

      const DAY_NAMES = State.lang === 'fr' ? ['Di', 'Lu', 'Ma', 'Me', 'Je', 'Ve', 'Sa'] : ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
      const daysHTML = days.map(({ ts, dt }) => {
        const isToday   = ts === todayTs;
        const isWeekend = dt.getDay() === 0 || dt.getDay() === 6;
        return `<button class="gantt-day-cell${isToday ? ' today' : ''}${isWeekend ? ' weekend' : ''}" style="width:${PX}px;min-width:${PX}px" onclick="APP.showDayLog('${dt.getFullYear()}','${dt.getMonth()}','${dt.getDate()}')"><span class="gantt-day-name">${DAY_NAMES[dt.getDay()]}</span><span class="gantt-day-num">${dt.getDate()}</span></button>`;
      }).join('');

      let namesCells = '';
      sorted.forEach(c => {
        let ir = null;
        try { ir = Utils.calcIR(c); } catch (_) {}
        namesCells += `<div class="gantt-name-cell" onclick="APP.navigateToCulture('${c.id}')">
          <div class="gantt-name-text">${c.strain}<br><span style="font-weight:400;color:var(--sub);font-size:7px">${c.generation}</span></div>
          ${ir !== null ? `<div class="gantt-name-ir">${ir}%</div>` : ''}
        </div>`;
      });

      const colGrid = days.map(({ ts, dt }) => {
        const cls = dt.getDay() === 1 ? ' week-start' : ts === todayTs ? ' today-col' : '';
        return `<div class="gantt-col-cell${cls}" style="width:${PX}px;min-width:${PX}px"></div>`;
      }).join('');

      let bodyHTML = '';
      sorted.forEach(c => {
        // Lire c.status directement (stocké — jamais recalculé ici)
        const barClass = `ev-${c.status || 'note'}`;
        const barStart = new Date(c.date_start).setHours(0, 0, 0, 0);
        const ledTs    = c.last_event_date ? new Date(c.last_event_date).setHours(0, 0, 0, 0) : barStart;
        const barEnd   = Math.min(ledTs, todayTs);
        const barLeft  = ((barStart - startTs) / D) * PX;
        const barW     = Math.max(((barEnd - barStart) / D) * PX + PX, PX);
        const markers  = c.events.map(ev => {
          const evX   = ((new Date(ev.date).setHours(0, 0, 0, 0) - startTs) / D) * PX + PX / 2;
          const kind  = ev.kind || 'note';
          const eTemp = ev.temperature != null ? ev.temperature : ev.temp_c;
          const tip   = `${Utils.toDDMMYYYY(ev.date)} · ${ev.type}${eTemp != null ? ' (' + eTemp + '°C)' : ''}`;
          return `<button class="gantt-marker ${kind}" style="left:${evX}px" data-tip="${tip.replace(/"/g, '&quot;')}" aria-label="${tip.replace(/"/g, '')}" onclick="event.stopPropagation();APP.editEventPrompt('${c.id}','${ev.eid}')"></button>`;
        }).join('');
        bodyHTML += `<div class="gantt-body-row">
          ${colGrid}
          <div class="gantt-bars-layer">
            ${barStart <= todayTs && todayTs <= endTs ? `<div class="gantt-today-line" style="left:${((todayTs - startTs) / D) * PX + PX / 2}px"></div>` : ''}
            <div class="gantt-bar ${barClass}" style="left:${barLeft}px;width:${barW}px" onclick="APP.navigateToCulture('${c.id}')"></div>
            ${markers}
          </div>
        </div>`;
      });

      // Mini-calendrier 28j — activeDays depuis les events (affichage uniquement)
      const activeDays = new Set();
      Stores.cultures.data.forEach(c => (c.events || []).forEach(ev => {
        const d = new Date(ev.date);
        activeDays.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
      }));
      let calCells = '';
      for (let i = 27; i >= 0; i--) {
        const d   = new Date(todayTs - i * D);
        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        const active  = activeDays.has(key);
        const isToday = i === 0;
        const lbl = d.getDate() === 1
          ? `<span style="font-size:7px;display:block;font-weight:900">${d.toLocaleString(State.lang === 'fr' ? 'fr-CH' : 'en-GB', { month: 'short' }).toUpperCase()}</span>${d.getDate()}`
          : d.getDate();
        calCells += `<button style="border:${isToday ? '2px solid var(--main)' : '1px solid var(--grey)'};padding:4px 2px;text-align:center;font-size:10px;font-weight:700;background:${active ? 'var(--main)' : 'transparent'};color:${active ? 'var(--bg)' : 'var(--sub)'};line-height:1.3;cursor:${active ? 'pointer' : 'default'};width:100%;font-family:inherit" onclick="APP.showDayLog('${d.getFullYear()}','${d.getMonth()}','${d.getDate()}')" ${!active ? 'tabindex="-1"' : ''}>${lbl}</button>`;
      }

      document.getElementById('content').innerHTML = `
        <div class="gantt-tooltip" id="gantt-tip"></div>
        <div class="gantt-outer">
          <div class="gantt-names-col"><div class="gantt-names-header">Lots</div>${namesCells}</div>
          <div class="gantt-scroll" id="gantt-scroll">
            <div class="gantt-grid" style="min-width:${totalWidth}px">
              <div class="gantt-months-row">${monthsHTML}</div>
              <div class="gantt-days-row">${daysHTML}</div>
              <div class="gantt-body-rows">${bodyHTML}</div>
            </div>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--sub)">
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#fff;border:1px solid #ccc;display:inline-block"></span>Incubation</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#d1d1d1;display:inline-block"></span>Observation</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#666;display:inline-block"></span>Colonisation</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#2ecc71;display:inline-block"></span>Récolte</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block"></span>Contamination</span>
        </div>
        <div style="padding-top:15px;border-top:1px solid var(--grey)">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--sub);margin-bottom:10px;letter-spacing:.5px">Activité — 28 jours</div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">${['L','M','M','J','V','S','D'].map(x => `<div style="text-align:center;font-size:8px;font-weight:800;color:var(--sub)">${x}</div>`).join('')}</div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${calCells}</div>
        </div>
        <div id="day-log" style="margin-top:12px"></div>
      `;
      setTimeout(() => {
        const gs = document.getElementById('gantt-scroll');
        if (gs) gs.scrollLeft = Math.max(0, ((todayTs - startTs) / D) * PX - 80);
      }, 60);
      const tip = document.getElementById('gantt-tip');
      if (tip) {
        document.querySelectorAll('.gantt-marker').forEach(el => {
          el.addEventListener('mouseenter', () => { tip.textContent = el.dataset.tip; tip.classList.add('visible'); });
          el.addEventListener('mousemove', e => { tip.style.left = (e.clientX + 12) + 'px'; tip.style.top = (e.clientY - 28) + 'px'; });
          el.addEventListener('mouseleave', () => tip.classList.remove('visible'));
        });
      }
    },

    renderLib() {
      const L = LANGS[State.lang];
      const libDiv = document.getElementById('lib-list');
      if (!libDiv) return;
      const usage = {};
      Stores.recipes.data.forEach(s => { (s.i || []).forEach(ing => { const id = ing.ingId || Utils.slugify(ing.n); usage[id] = (usage[id] || 0) + 1; }); });
      const sorted = Stores.ingredients.data.slice().sort((a, b) => (usage[b.id] || 0) - (usage[a.id] || 0));
      libDiv.innerHTML = sorted.map(ing => `<div class="lib-btn" onclick="APP.addIng('${ing.name.replace(/'/g, "\\'")}')">${ing.name}</div>`).join('') +
        `<div class="lib-btn" style="background:var(--main);color:var(--bg)" onclick="APP.prompt('Item:','',e=>APP.addIng(e))">${L.other}</div>`;
    }
  };

  // ============================================================
  // HANDLERS
  // ============================================================
  // Helpers : trouver section/item par ID stable (jamais par index tableau)
  function _section(sid) { return Stores.recipes.data.find(s => String(s.id) === String(sid)) || null; }
  function _sectionIdx(sid) { return Stores.recipes.data.findIndex(s => String(s.id) === String(sid)); }
  function _itemByIid(section, iid) { return (section && section.i) ? section.i.find(x => x.iid === iid) : null; }
  function _itemIdxByIid(section, iid) { return (section && section.i) ? section.i.findIndex(x => x.iid === iid) : -1; }

  const Handlers = {
    // ── Recettes — opérations par section.id + ing.iid (jamais par index) ──
    setV(sid, v) { const s=_section(sid); if(!s) return; s.v=v; Stores.recipes.save(); State.notify(); },
    addV(sid, v) {
      const s=_section(sid); if(!s||isNaN(v)) return;

    setTemp(sid) {
      const s=_section(sid); if(!s) return;
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">Température cible (°C)</div>

        <div class="modal-label">Pourcentage (%)</div>

    startP(e,type,data){ if(State.pressTimer) clearTimeout(State.pressTimer); State.pressTimer=setTimeout(()=>Handlers.confirmDel(type,data),450); },
    endP(){ if(State.pressTimer) clearTimeout(State.pressTimer); },
    confirmDel(type,data){

      Modal.show(`<div style="height:15px"></div><div class="modal-btn black" onclick="Modal.close()">${L.cancel}</div><div class="modal-btn danger" id="del-btn">${L.del}</div>`);
      document.getElementById('del-btn').onclick=()=>{ if(type==='vol') Handlers.delV(data[0],data[1]); if(type==='ing') Handlers.delI(data[0],data[1]); Modal.close(); };

    // ── Ingrédients ──────────────────────────────────────────────
    addIngredientPrompt() {
      Modal.ingredientForm(null, ing => {
        const id = Utils.slugify(ing.name);
        if (Stores.ingredients.data.find(i => i.id === id)) { Modal.show(`<div style="font-weight:900;margin-bottom:10px">Déjà existant</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">Un ingrédient avec ce nom existe déjà.</div><div class="modal-btn" onclick="Modal.close()">OK</div>`); return; }

        State.lang === 'fr' ? `Supprimer "${name}" définitivement ?` : `Delete "${name}" permanently?`,
        () => { Stores.ingredients.delete(id); Toast.success(State.lang === 'fr' ? 'Ingrédient supprimé' : 'Ingredient deleted'); }
      );
    },

        Stores.cultures.add({

          status:         'note',
          current_temp:   null,
          last_event_date:null,
          recipeSnapshot         // figé dès la création, null si pas de recette
        });
        setTimeout(() => { Modal.eventForm(null, ev => Stores.cultures.addEvent(id, ev)); }, 100);
      });
    },
    editCulture(id) {
      const c = Stores.cultures.data.find(c => c.id === id);

        () => { Stores.cultures.delete(id); Toast.success(State.lang === 'fr' ? 'Lot supprimé' : 'Batch deleted'); }
      );
    },
    addQuickEvent(id)       { Modal.eventForm(null, ev => Stores.cultures.addEvent(id, ev)); },
    addEventToCulture(id)   { Modal.eventForm(null, ev => Stores.cultures.addEvent(id, ev)); },
    editEventPrompt(id, eid) {
      // eid = identifiant stable de l'événement — jamais un index
      const c = Stores.cultures.data.find(c => c.id === id);
      if (!c || !Array.isArray(c.events)) return;

    deleteEvent(id, eid) {
      // eid = identifiant stable — jamais un index

      const evLabel = ev ? (ev.type || '') : '';
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:5px">Supprimer l'événement ?</div>

    },
    confirmDeleteEvent(id, eid) { Handlers.deleteEvent(id, eid); },
    addRefEventType() { Modal.prompt('Nouveau type :', '', label => { const trimmed = label.trim(); if (trimmed) { Stores.refs.addEventType(trimmed); State.notify(); } }); },
    promptAddEvent() {
      const L = LANGS[State.lang];
      const opts = Stores.cultures.data.map(c => `<option value="${c.id}">${c.id} - ${c.strain}</option>`).join('');
      const todayISO = new Date().toISOString().split('T')[0];
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">${L.addEvent}</div>

      document.getElementById('global-event-ok').onclick = () => {
        const id   = document.getElementById('modal-culture-select').value;

        if (date > todayISO) { Modal.show(`<div style="font-weight:900;margin-bottom:10px">Date invalide</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">Un événement ne peut pas être dans le futur.</div><div class="modal-btn" onclick="Modal.close()">OK</div>`); return; }
        let temperature = null;
        const rawTemp = document.getElementById('modal-event-temp-global').value.trim().replace(',', '.');
        if (rawTemp !== '') { const t = parseFloat(rawTemp); if (isNaN(t) || t < 0 || t > 50) { Modal.show(`<div style="font-weight:900;margin-bottom:10px">Température invalide</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">Plage acceptée : 0 à 50 °C.</div><div class="modal-btn" onclick="Modal.close()">OK</div>`); return; } temperature = t; }

    showDayLog(year, month, day) {

          const d = new Date(ev.date);

    printCulture(id) {
      const c = Stores.cultures.data.find(c => c.id === id);

      const ir       = Utils.calcIR(c);

      let ingRows = '';

        const vol = snap.volume || 0;
        const volDisplay = isWeight
          ? (() => { const g = Math.round(vol * 1000); return g >= 1000 ? `${(g / 1000).toFixed(2)} kg` : `${g} g`; })()
          : `${vol.toFixed(2)} L`;
        ingRows += `<tr><td colspan="3" style="padding:8px 0 2px"><div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px">${Utils.cleanSectionName(snap.sectionName)}</div><div style="font-size:13px;font-weight:900;margin:3px 0 4px;border-bottom:1px solid #000;padding-bottom:4px">OBJECTIF : <span style="font-size:16px">${volDisplay}</span></div></td></tr>`;
        (snap.ingredients || []).forEach(ing => {
          const volIng = (ing.percent || 0) * (snap.volume || 1) / 100;
          let valStr = '';

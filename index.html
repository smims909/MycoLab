<!DOCTYPE html>
<html lang="fr-CH">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>MycoLab</title>

<link rel="shortcut icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">

<style>
/* ========== STYLES ORIGINAUX (inchangés) ========== */
:root{--bg:#fff;--main:#000;--sub:#999;--grey:#eee;--danger:#ff4d4d;--font:'Inter',-apple-system,sans-serif;--nav-bg:#fff}
body.dark-mode{--bg:#000;--main:#fff;--sub:#888;--grey:#222;--nav-bg:#111}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none}
body{font-family:var(--font);background:var(--bg);color:var(--main);margin:0;padding:calc(20px + env(safe-area-inset-top)) 20px 20px 20px;font-weight:300;-webkit-user-select:none;transition:background .2s;overflow-x:hidden}
.container{max-width:450px;margin:auto;display:flex;flex-direction:column;min-height:95vh}

/* Header */
header{width:100%;margin-bottom:5px;padding-bottom:0}
.header-row{display:flex;justify-content:space-between;align-items:baseline;width:100%}
.header-row:first-child{border-bottom:2px solid var(--main);padding-bottom:10px;margin-bottom:5px}
h1{font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:4px;margin:0}
.right-group{display:flex;align-items:baseline;gap:8px}
.lang-toggle{font-size:10px;font-weight:800;cursor:pointer;color:var(--sub);text-transform:uppercase}
.lang-toggle span.active{color:var(--main);text-decoration:underline}
#timestamp{font-size:10px;color:var(--sub);text-transform:uppercase;font-weight:700;letter-spacing:.5px;cursor:pointer}
.text-btn{font-size:10px;font-weight:800;cursor:pointer;color:var(--main);text-transform:uppercase;background:none;border:none;padding:0}
.text-btn:hover{opacity:0.7}

/* Navigation onglets */
.tabs-nav{display:flex;justify-content:space-between;gap:10px;margin-top:20px;padding-bottom:5px;border-bottom:1px solid var(--grey);overflow-x:auto;scrollbar-width:none}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-view{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;cursor:pointer;white-space:nowrap;padding:4px 0;flex:1;text-align:center}
.tab-view.active{color:var(--main);border-bottom:2px solid var(--main)}

#content{margin-top:15px}
.section-block{page-break-inside:avoid;margin-bottom:10px}
.section-title{font-size:18px;font-weight:900;text-transform:uppercase;border-bottom:2px solid var(--main);margin-bottom:20px;padding-bottom:5px;letter-spacing:1px;cursor:pointer}
.vol-bar{display:flex;gap:18px;margin-bottom:25px;flex-wrap:wrap;align-items:center}
.v-chip{font-size:13px;color:var(--sub);cursor:pointer}
.v-chip.active{color:var(--main);font-weight:900}
.tabs-row{display:flex;gap:18px;margin-bottom:20px;border-bottom:1px solid var(--grey);overflow-x:auto;padding-bottom:10px;align-items:flex-end;scrollbar-width:none}
.tabs-row::-webkit-scrollbar{display:none}
.tab{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;white-space:nowrap;cursor:pointer}
.tab.active{color:var(--main);font-size:14px;font-weight:900;border-bottom:2px solid var(--main);padding-bottom:2px}
table{width:100%;border-collapse:collapse;table-layout:fixed;margin-top:5px}
td{padding:15px 0;border-bottom:1px solid var(--grey)}
.col-n{width:45%;text-align:left;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.col-p{width:20%;text-align:center;font-size:11px;font-weight:800;color:var(--sub);cursor:pointer}
.col-v{width:35%;text-align:right;font-size:17px;font-weight:500}
.unit-s{font-size:11px;font-weight:700;color:var(--sub);margin-left:2px;text-transform:lowercase}
.section-footer{display:flex;justify-content:space-between;align-items:center;padding:15px 0 10px 0}
.btn-add-ing{font-size:9px;font-weight:800;border:none;padding:0;text-transform:uppercase;cursor:pointer;background:none;color:var(--main)}
.total-label{font-size:11px;font-weight:800;text-transform:uppercase;text-align:right}
.note-area{width:100%;border:none;border-left:1px solid var(--grey);padding:8px 12px;font-family:var(--font);font-size:12px;color:var(--main);resize:none;margin-bottom:40px;background:var(--nav-bg);min-height:40px}

/* Listes et cartes */
.ingredients-list, .cultures-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.ingredient-item, .culture-card{border:1px solid var(--grey);padding:12px;position:relative}
.ingredient-item{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:12px}
.ing-name{font-weight:900;font-size:14px;width:100%}
.ing-details{font-size:10px;color:var(--sub);font-family:monospace;background:var(--grey);padding:2px 6px;border-radius:2px}
.ingredient-item .actions{
  display:flex;
  align-items:center;
  gap:12px;
  margin-left:auto;
}
.ingredient-item .btn-small{
  border:none;
  background:none;
  padding:0;
  font-size:9px;
  font-weight:800;
  text-transform:uppercase;
  color:var(--main);
  cursor:pointer;
}
.ingredient-item .btn-small:hover{
  text-decoration:underline;
  opacity:0.7;
}
.ingredient-item .btn-delete{
  background:none;
  border:none;
  color:var(--danger);
  font-size:16px;
  cursor:pointer;
  padding:0;
  line-height:1;
}
.culture-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;cursor:pointer}
.culture-name{font-weight:900;font-size:14px}
.culture-id{font-size:9px;color:var(--sub);font-family:monospace}
.culture-dates, .culture-last{font-size:10px;color:var(--sub);margin:2px 0}
.culture-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.btn-small{font-size:9px;font-weight:800;border:1px solid var(--main);padding:4px 8px;background:none;color:var(--main);cursor:pointer;text-transform:uppercase}
.btn-delete{background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:0 5px}
.btn-add{font-size:10px;font-weight:800;border:1px solid var(--main);background:none;color:var(--main);padding:8px;width:100%;text-transform:uppercase;cursor:pointer;margin-top:10px}

/* Timeline */
.timeline-wrapper{overflow-x:auto;margin-bottom:20px;background:var(--bg);border-radius:4px;}
.timeline-scale{position:relative;height:30px;background:var(--bg);border-bottom:1px solid var(--grey);}
.timeline-bars{position:relative;}
.scale-marker{position:absolute;bottom:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none;}
.scale-marker div:first-child{width:1px;height:8px;background:var(--sub);}
.scale-marker.week div:first-child{width:2px;height:15px;background:var(--main);}
.scale-marker .day-num{font-size:8px;color:var(--sub);margin-top:2px;}
.scale-marker.week .week-num{font-size:8px;font-weight:800;color:var(--main);margin-top:2px;}
.culture-bar{position:absolute;height:30px;border-radius:4px;cursor:pointer;transition:opacity 0.2s;}
.culture-bar:hover{opacity:0.8;}
.event-marker{position:absolute;width:8px;height:8px;background:var(--main);border-radius:50%;transform:translateX(-50%);top:11px;cursor:pointer;z-index:5;}
.event-marker:hover{transform:translateX(-50%) scale(1.2);}
.culture-code{display:inline-block;padding:4px 8px;background:var(--grey);border-radius:2px;font-size:10px;cursor:pointer;margin:2px;}
.culture-code:hover{background:var(--sub);color:var(--bg);}

/* Modales */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--bg);color:var(--main);border:1px solid var(--main);width:90%;max-width:320px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.modal-input{width:100%;border:none;background:transparent;color:var(--main);border-bottom:2px solid var(--main);font-size:20px;padding:10px 0;margin-bottom:20px;border-radius:0}
.modal-input.small{font-size:16px;margin-bottom:10px}
.modal-label{font-size:9px;color:var(--sub);margin-bottom:2px;text-transform:uppercase;font-weight:700}
.modal-row{display:flex;gap:10px;margin-bottom:15px}
.modal-row .modal-input{flex:1}
.modal-btn{padding:15px;text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;border:1px solid var(--main);width:100%;margin-bottom:10px;display:block;color:var(--main);background:transparent}
.modal-btn.black{background:var(--main);color:var(--bg)}
.modal-btn.danger{border-color:var(--danger);color:var(--danger)}
#drawer{position:fixed;bottom:-100%;left:0;width:100%;background:var(--bg);border-top:2px solid var(--main);padding:25px;transition:.3s ease;z-index:1500;overflow-y:auto;max-height:80vh}
#drawer.open{bottom:0}
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:20px}
.lib-btn{padding:10px;border:1px solid var(--main);font-size:9px;font-weight:800;text-align:center;text-transform:uppercase;cursor:pointer;color:var(--main)}

/* Auteur */
.author-box{display:block;margin-top:30px;text-align:right;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--sub);cursor:pointer}
#author-name{color:var(--main)}

@media print{
  body.dark-mode{--bg:#fff;--main:#000;--sub:#777;--grey:#ddd}
  @page{size:A4;margin:0.5cm}
  body{padding:0;font-size:12px}
  .container{max-width:100%;width:100%}
  header{margin-bottom:5px;padding-bottom:5px}
  h1{font-size:20px}
  #timestamp{margin-bottom:15px;font-size:9px}
  .section-block{margin-bottom:15px;page-break-inside:avoid}
  .section-title{font-size:14px;margin-bottom:10px;padding-bottom:3px}
  td{padding:8px 0;font-size:13px}
  .col-v{font-size:14px}
  .note-area{background:#fff!important;color:#000!important;border:none!important;border-left:1px solid #ccc!important;padding:5px 10px;min-height:30px;margin-bottom:20px;font-size:11px}
  .author-box{display:block!important;margin-top:10px;text-align:right;color:#000!important}
  #author-name{color:#000!important}
  .vol-bar, .btn-add-ing, #drawer, #modal-overlay, .tab:not(.active), .v-chip:not(.active), .text-btn, .lang-toggle, .right-group, .tabs-nav, .btn-add, .btn-small, .btn-delete{display:none!important}
  .ingredient-item, .culture-card{border:1px solid #ccc;page-break-inside:avoid}
}
</style>
</head>
<body>
<div id="modal-overlay"><div class="modal" id="modal-box"></div></div>
<div class="container">
  <header>
    <div class="header-row">
      <h1>MycoLab</h1>
      <div class="right-group">
        <span class="text-btn" id="dark-toggle" onclick="APP.toggleDarkMode()">Sombre</span>
        <div class="lang-toggle" onclick="APP.toggleLang()">
          <span id="l-fr">FR</span>/<span id="l-en">EN</span>
        </div>
      </div>
    </div>
    <div class="header-row bottom">
      <div id="timestamp" onclick="APP.pickDate()">...</div>
      <span class="text-btn" onclick="APP.openSaveModal()">Sauvegarde</span>
    </div>
    <div class="tabs-nav">
      <span class="tab-view" data-view="recipes" onclick="APP.setView('recipes')">Recettes</span>
      <span class="tab-view" data-view="ingredients" onclick="APP.setView('ingredients')">Ingrédients</span>
      <span class="tab-view" data-view="cultures" onclick="APP.setView('cultures')">Cultures</span>
      <span class="tab-view" data-view="suivi" onclick="APP.setView('suivi')">Suivi</span>
    </div>
  </header>

  <div id="content"></div>

  <footer class="author-box" onclick="APP.prompt('Auteur:',APP.state.author||'',v=>APP.setAuthor(v))">
    <span id="author-name">...</span>
  </footer>
</div>

<div id="drawer">
  <div style="display:flex;justify-content:space-between;margin-bottom:15px;align-items:center">
    <span style="font-weight:900;font-size:10px" id="cat-label">CATALOGUE</span>
    <span onclick="APP.toggleDrawer(!1)" style="cursor:pointer;font-size:28px">&times;</span>
  </div>
  <div class="lib-grid" id="lib-list"></div>
</div>

<script>
(function() {
  // ---------- 1. CONSTANTES avec valeurs détaillées des ingrédients ----------
  const LANGS = {

      titles: ["I. Inoculations","II. Fructification","III. Casing"],

      dark:"SOMBRE", light:"CLAIR", authorDef:"AUTEUR NON DÉFINI", pdf:"PDF", save:"SAUVEGARDER", restore:"RESTAURER",

      lib: [
        { name:"Fibre de Coco", density:0.12, ph:6.5, notes:"Idéal pour la rétention d'eau. Pasteuriser avant utilisation." },
        { name:"Vermiculite", density:0.15, ph:7.0, notes:"Améliore l'aération et la rétention d'eau. Stériliser ou pasteuriser." },
        { name:"Gypse", density:1.50, ph:7.5, notes:"Source de calcium et sulfate. À utiliser en petite quantité (5-10%)." },
        { name:"Blanc de Meudon", density:0.80, ph:8.0, notes:"Augmente le pH. Utiliser avec parcimonie (1-5%)." },
        { name:"Chaux", density:0.60, ph:12.0, notes:"Très alcalin. À utiliser en traces pour ajuster le pH (0.5-2%)." },

        { name:"Carton", density:0.25, ph:7.0, notes:"Source de cellulose. Découper finement et pasteuriser." },
        { name:"Marc de Café", density:0.30, ph:6.2, notes:"Riche en azote. Sécher légèrement avant utilisation pour éviter les moisissures." },
        { name:"Sciure de bois", density:0.20, ph:5.5, notes:"Préférer les bois feuillus (chêne, peuplier). Pasteuriser." },
        { name:"Copeaux", density:0.15, ph:5.8, notes:"Taille moyenne idéale : 1-3 cm. Pasteuriser." },
        { name:"Chanvre", density:0.10, ph:7.0, notes:"Excellente rétention d'eau. Pasteuriser." },

        { name:"Perlite", density:0.10, ph:7.0, notes:"Inerte. Améliore l'aération. Stériliser ou rincer avant utilisation." },
        { name:"Seigle", density:0.75, ph:6.0, notes:"Céréale riche. Cuire ou pasteuriser pour éviter les contaminations." },
        { name:"Millet", density:0.80, ph:6.5, notes:"Alternative au seigle. Cuire avant utilisation." },
        { name:"Blé", density:0.80, ph:6.5, notes:"Classique pour les substrats à grains. Cuire 20-30 min." },
        { name:"Sorgho", density:0.75, ph:6.5, notes:"Résistant aux moisissures. Cuire avant utilisation." },
        { name:"Agar-Agar", density:0.50, ph:7.0, notes:"Utilisé en milieu gélosé pour l'isolement. Stériliser." },
        { name:"Extrait de Malt", density:1.20, ph:5.5, notes:"Source de nutriments pour les milieux liquides ou gélosés. Stériliser." },
        { name:"Composte", density:0.40, ph:7.5, notes:"Riche en nutriments. Pasteuriser pour éliminer les pathogènes." },
        { name:"Fumier", density:0.50, ph:8.0, notes:"À composter longuement avant utilisation. Pasteuriser." }
      ]
    },
    en: {
      tabRecipes: "Recipes", tabIngredients: "Ingredients", tabCultures: "Batches", tabSuivi: "Tracking",
      noCultures: "No batches.", noCulturesToDisplay: "No batches to display.", createBatch: "Create a batch",
      titles: ["I. Inoculation","II. Fruiting","III. Casing"],
      total:"TOTAL", addIng:"+ INGREDIENT", notes:"Technical notes...",
      cancel:"CANCEL", del:"DELETE", rename:"RENAME", equi:"BALANCE", manual:"MANUAL", other:"+ OTHER",
      dark:"DARK", light:"LIGHT", authorDef:"AUTHOR NOT SET", pdf:"PDF", save:"BACKUP", restore:"RESTORE",
      setDate:"Pick a date", today:"Today", addIngredient:"+ INGREDIENT", editIngredient:"Edit ingredient",
      density:"Density (kg/L)", ph:"pH", notes:"Notes", addCulture:"+ NEW BATCH", strain:"Strain",
      generation:"Generation", startDate:"Start date", event:"Event", type:"Type", date:"Date", recipe:"Recipe",
      events:"Events", addEvent:"+ Event", editEvent:"Edit event", deleteEvent:"Delete", noRecipe:"None",
      labelName:"Name", labelDensity:"Density (kg/L)", labelPh:"pH", labelNotes:"Notes",
      placeholderName:"e.g., Coco coir", placeholderDensity:"e.g., 0.12", placeholderPh:"e.g., 6.5", placeholderNotes:"Observations...",
      lib: [
        { name:"Coco Coir", density:0.12, ph:6.5, notes:"Ideal for water retention. Pasteurize before use." },
        { name:"Vermiculite", density:0.15, ph:7.0, notes:"Improves aeration and water retention. Sterilize or pasteurize." },
        { name:"Gypsum", density:1.50, ph:7.5, notes:"Calcium and sulfate source. Use in small amounts (5-10%)." },
        { name:"Chalk", density:0.80, ph:8.0, notes:"Raises pH. Use sparingly (1-5%)." },
        { name:"Lime", density:0.60, ph:12.0, notes:"Very alkaline. Use traces to adjust pH (0.5-2%)." },
        { name:"Chopped Straw", density:0.08, ph:6.0, notes:"Rich in lignin. Pasteurize before use." },
        { name:"Spelt", density:0.70, ph:6.5, notes:"Nutritious grain. Cook or pasteurize." },
        { name:"Cardboard", density:0.25, ph:7.0, notes:"Cellulose source. Chop finely and pasteurize." },
        { name:"Coffee Grounds", density:0.30, ph:6.2, notes:"Nitrogen rich. Dry slightly to prevent mold." },
        { name:"Sawdust", density:0.20, ph:5.5, notes:"Prefer hardwoods (oak, poplar). Pasteurize." },
        { name:"Wood Chips", density:0.15, ph:5.8, notes:"Ideal size 1-3 cm. Pasteurize." },
        { name:"Hemp", density:0.10, ph:7.0, notes:"Excellent water retention. Pasteurize." },
        { name:"Peat", density:0.20, ph:4.0, notes:"Acidic: mix with lime to adjust pH. Pasteurize." },
        { name:"Perlite", density:0.10, ph:7.0, notes:"Inert. Improves aeration. Sterilize or rinse." },
        { name:"Rye", density:0.75, ph:6.0, notes:"Rich grain. Cook or pasteurize to avoid contamination." },
        { name:"Millet", density:0.80, ph:6.5, notes:"Alternative to rye. Cook before use." },
        { name:"Wheat", density:0.80, ph:6.5, notes:"Classic grain substrate. Cook 20-30 min." },
        { name:"Sorghum", density:0.75, ph:6.5, notes:"Resistant to mold. Cook before use." },
        { name:"Agar-Agar", density:0.50, ph:7.0, notes:"Used in gelled media for isolation. Sterilize." },
        { name:"Malt Extract", density:1.20, ph:5.5, notes:"Nutrient source for liquid or gelled media. Sterilize." },
        { name:"Compost", density:0.40, ph:7.5, notes:"Nutrient rich. Pasteurize to eliminate pathogens." },
        { name:"Manure", density:0.50, ph:8.0, notes:"Compost thoroughly before use. Pasteurize." }
      ]
    }
  };

  // ---------- 2. UTILITAIRES ----------
  const Utils = {
    slugify(str) {
      return str.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '');
    },
    formatDate(timestamp, lang) {
      const d = timestamp ? new Date(timestamp) : new Date();
      return d.toLocaleDateString(lang === 'fr' ? 'fr-CH' : 'en-GB', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    },
    calcIngredientValue(ing, vol) {
      if (ing.u === 'cs' || ing.u === 'cc') {
        const base = ing.u === 'cs' ? 150 : 50;
        const val = ing.r * vol * 10 / base;
        const r = Math.round(val*2)/2;
        return `${r>=5 ? r*(ing.u==='cs'?15:5)+'<span class="unit-s">g</span>' : r+'<span class="unit-s">'+ing.u+'</span>'}`;
      }
      const l = ing.r * vol / 1000;
      if (l<0.1) return `${Math.round(1000*l)}<span class="unit-s">ml</span>`;
      if (l<1) return `${(10*l).toFixed(1)}<span class="unit-s">dl</span>`;
      return `${l.toFixed(2)}<span class="unit-s">L</span>`;
    },
    generateCultureId(strain, gen) {
      const prefix = strain.substring(0,4).toUpperCase().replace(/[^A-Z]/g,'')||'LOT';
      const g = gen||'G1';
      const d = new Date().toISOString().slice(0,10).replace(/-/g,'');
      return `${prefix}-${g}-${d}`;
    },
    // Crée un snapshot de la recette à un instant T
    createRecipeSnapshot(sectionIdx, groupIdx, recipesStore, ingredientsStore) {
      const section = recipesStore[sectionIdx];
      if (!section) return null;
      const group = section.g[groupIdx];
      if (!group) return null;
      const snapshotIngredients = group.i.map(ing => {
        const fullIng = ingredientsStore.data.find(i => i.name.toLowerCase() === ing.n.toLowerCase());
        return {
          name: ing.n,
          percent: ing.r/10,
          unit: ing.u,
          density: fullIng ? fullIng.density : null,
          ph: fullIng ? fullIng.ph : null,
          notes: fullIng ? fullIng.notes : ''
        };
      });
      return {
        sectionName: section.t,
        groupName: group.n,
        ingredients: snapshotIngredients
      };
    }
  };

  // ---------- 3. STORES ----------
  const Stores = {
    recipes: {
      data: [],
      save() { localStorage.setItem('mycolab_recipes_v1', JSON.stringify(this.data)); },
      load() {
        const newRec = localStorage.getItem('mycolab_recipes_v1');
        if (newRec) {
          this.data = JSON.parse(newRec);
          return;
        }
        const old = localStorage.getItem('mycolab_v43_0');
        if (old) {

          localStorage.setItem('mycolab_recipes_v1', old);
          return;

      },

          {id:2, t:e?"II. Fructification":"II. Fruiting", v:7, cv:[5,7,12,15], note:"", g:[{n:"Bulk 7L", i:[{n:e?"Fibre de Coco":"Coco Coir", r:600, u:"vol"}, {n:e?"Vermiculite":"Vermiculite", r:200, u:"vol"}, {n:e?"Paille hachée":"Chopped Straw", r:100, u:"vol"}, {n:e?"Gypse":"Gypsum", r:100, u:"cs"}]}]},
          {id:3, t:e?"III. Casing":"III. Casing", v:1.2, cv:[.5,1,1.2,2], note:"", g:[{n:"Casing pH+", i:[{n:e?"Vermiculite":"Vermiculite", r:670, u:"vol"}, {n:e?"Fibre de Coco":"Coco Coir", r:280, u:"vol"}, {n:e?"Blanc de Meudon":"Chalk", r:40, u:"cs"}, {n:e?"Chaux":"Lime", r:10, u:"cc"}]}]}
        ];
      }
    },
    ingredients: {
      data: [],
      save() { localStorage.setItem('mycolab_ingredients_v1', JSON.stringify(this.data)); },
      load() {
        const ing = localStorage.getItem('mycolab_ingredients_v1');
        if (ing) {
          this.data = JSON.parse(ing);
        } else {
          this.data = LANGS[State.lang].lib.map(item => ({
            id: Utils.slugify(item.name),
            name: item.name,
            density: item.density !== undefined ? item.density : null,
            ph: item.ph !== undefined ? item.ph : null,
            notes: item.notes || ''
          }));
          this.save();
        }
      },
      add(ing) { this.data.push(ing); this.save(); State.notify(); },
      update(id, newData) {
        const idx = this.data.findIndex(i=>i.id===id);
        if(idx!==-1){ this.data[idx] = {...this.data[idx], ...newData}; this.save(); State.notify(); }
      },
      delete(id) { this.data = this.data.filter(i=>i.id!==id); this.save(); State.notify(); },
      findByName(name) { return this.data.find(i=>i.name.toLowerCase()===name.toLowerCase()); }
    },
    cultures: {
      data: [],
      save() { localStorage.setItem('mycolab_cultures_v1', JSON.stringify(this.data)); },
      load() {
        const cult = localStorage.getItem('mycolab_cultures_v1');
        this.data = cult ? JSON.parse(cult) : [];
      },
      add(c) { this.data.push(c); this.save(); State.notify(); },
      update(id, newData) {
        const idx = this.data.findIndex(c=>c.id===id);
        if(idx!==-1){ this.data[idx] = {...this.data[idx], ...newData}; this.save(); State.notify(); }
      },
      delete(id) { this.data = this.data.filter(c=>c.id!==id); this.save(); State.notify(); },
      addEvent(id, event) {
        const c = this.data.find(c=>c.id===id);
        if(c){ c.events.push(event); c.events.sort((a,b)=>a.date-b.date); this.save(); State.notify(); }
      },
      updateEvent(id, idx, newEv) {
        const c = this.data.find(c=>c.id===id);
        if(c && c.events[idx]){ c.events[idx] = newEv; c.events.sort((a,b)=>a.date-b.date); this.save(); State.notify(); }
      },
      deleteEvent(id, idx) {
        const c = this.data.find(c=>c.id===id);
        if(c && c.events[idx]){ c.events.splice(idx,1); this.save(); State.notify(); }
      }
    }
  };

  // ---------- 4. ÉTAT ----------
  const State = {
    view: 'recipes',
    lang: 'fr',
    dark: false,
    author: '',
    customDate: null,
    gIdx: [0,0,0],
    activeCat: 0,
    pressTimer: null,

    subscribe(fn) { this.listeners.push(fn); },
    notify() { this.listeners.forEach(fn => fn()); },
    setView(v) { this.view = v; this.notify(); },
    toggleLang() { this.lang = this.lang === 'fr' ? 'en' : 'fr'; localStorage.setItem('mycolab_lang', this.lang); this.notify(); },
    toggleDarkMode() { this.dark = !this.dark; document.body.classList.toggle('dark-mode', this.dark); localStorage.setItem('mycolab_dark', this.dark); this.notify(); },
    setAuthor(a) { this.author = a; localStorage.setItem('mycolab_author', a); this.notify(); },
    setCustomDate(ts) { this.customDate = ts; if(ts) localStorage.setItem('mycolab_customDate', ts); else localStorage.removeItem('mycolab_customDate'); this.notify(); },

  // ---------- 5. MODAL MANAGER ----------
  const Modal = {
    show(html) {
      document.getElementById('modal-box').innerHTML = html;

    },
    close() { document.getElementById('modal-overlay').style.display = 'none'; },
    prompt(title, defaultValue, callback) {
      const L = LANGS[State.lang];
      this.show(`
        <div style="font-size:10px;font-weight:900;margin-bottom:10px">${title}</div>
        <input type="text" id="p-in" class="modal-input" value="${defaultValue}">

        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);

      document.getElementById('p-ok').onclick = () => { callback(inp.value); Modal.close(); };
    },
    datePicker(defaultDate, callback) {
      const L = LANGS[State.lang];

      this.show(`

        <div class="modal-btn black" id="date-ok">OK</div>

    },
    ingredientForm(ing, callback) {
      const L = LANGS[State.lang];
      const isNew = !ing;
      const name = ing ? ing.name : '';
      const density = ing ? (ing.density||'') : '';
      const ph = ing ? (ing.ph||'') : '';
      const notes = ing ? (ing.notes||'') : '';
      this.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">${isNew ? L.addIngredient : L.editIngredient}</div>
        <div class="modal-label">${L.labelName}</div><input type="text" id="modal-ing-name" class="modal-input" value="${name}" placeholder="${L.placeholderName}">
        <div class="modal-label">${L.labelDensity}</div><input type="number" id="modal-ing-density" class="modal-input small" value="${density}" step="0.01" placeholder="${L.placeholderDensity}">

        <div class="modal-btn black" id="ing-ok">OK</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);
      document.getElementById('ing-ok').onclick = () => {
        const newName = document.getElementById('modal-ing-name').value.trim();
        if(!newName) return alert('Nom requis');
        callback({
          name: newName,
          density: parseFloat(document.getElementById('modal-ing-density').value) || null,

        Modal.close();
      };
    },
    cultureForm(culture, callback) {
      const L = LANGS[State.lang];
      const isNew = !culture;
      const strain = culture ? culture.strain : '';
      const generation = culture ? culture.generation : 'G1';
      const startDate = culture ? new Date(culture.date_start).toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
      const notes = culture ? (culture.notes||'') : '';
      this.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">${isNew ? L.addCulture : 'Modifier le lot'}</div>
        <input type="text" id="modal-strain" class="modal-input" value="${strain}" placeholder="${L.strain}">
        <input type="text" id="modal-generation" class="modal-input" value="${generation}" placeholder="${L.generation} (ex: G1)">
        <input type="date" id="modal-start" class="modal-input" value="${startDate}">
        <textarea id="modal-notes" class="modal-input" placeholder="${L.notes}">${notes}</textarea>
        <div class="modal-btn black" id="cult-ok">OK</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);
      document.getElementById('cult-ok').onclick = () => {
        const s = document.getElementById('modal-strain').value.trim();
        const g = document.getElementById('modal-generation').value.trim()||'G1';
        const d = document.getElementById('modal-start').value;
        if(!s || !d) return alert('Champs requis');
        callback({
          strain: s,
          generation: g,
          date_start: new Date(d+'T12:00:00').getTime(),
          notes: document.getElementById('modal-notes').value
        });
        Modal.close();
      };
    },
    eventForm(event, callback) {
      const L = LANGS[State.lang];
      const isNew = !event;
      const date = event ? new Date(event.date).toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
      const type = event ? event.type : '';
      this.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">${isNew ? L.addEvent : L.editEvent}</div>
        <input type="date" id="modal-event-date" class="modal-input" value="${date}">
        <input type="text" id="modal-event-type" class="modal-input" placeholder="${L.type}" value="${type}">
        <div class="modal-btn black" id="ev-ok">OK</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);
      document.getElementById('ev-ok').onclick = () => {
        const d = document.getElementById('modal-event-date').value;
        const t = document.getElementById('modal-event-type').value.trim();
        if(!d || !t) return alert('Date et type requis');
        callback({ date: new Date(d+'T12:00:00').getTime(), type: t });
        Modal.close();
      };
    }
  };
  window.Modal = Modal;

  // ---------- 6. RENDU ----------
  const Renderer = {
    render() {
      const L = LANGS[State.lang];
      document.getElementById('l-fr').className = State.lang === 'fr' ? 'active' : '';
      document.getElementById('l-en').className = State.lang === 'en' ? 'active' : '';
      document.getElementById('dark-toggle').innerText = State.dark ? L.light : L.dark;
      document.getElementById('author-name').innerText = State.author || L.authorDef;
      document.getElementById('timestamp').innerText = Utils.formatDate(State.getEffectiveDate(), State.lang);
      document.querySelectorAll('.tab-view').forEach(tab => {
        const view = tab.dataset.view;
        if (view === 'recipes') tab.innerText = L.tabRecipes;
        else if (view === 'ingredients') tab.innerText = L.tabIngredients;
        else if (view === 'cultures') tab.innerText = L.tabCultures;
        else if (view === 'suivi') tab.innerText = L.tabSuivi;
        tab.classList.toggle('active', view === State.view);
      });

      if (State.view === 'recipes') this.renderRecipes();
      else if (State.view === 'ingredients') this.renderIngredients();
      else if (State.view === 'cultures') this.renderCultures();
      else if (State.view === 'suivi') this.renderSuivi();
    },
    renderRecipes() {
      const L = LANGS[State.lang];
      let html = '';
      Stores.recipes.data.forEach((section, idx) => {
        const gIdx = State.gIdx[idx];
        const group = section.g[gIdx];
        const total = group.i.reduce((a,ing)=>a+ing.r,0)/10;
        html += `<div class="section-block">
          <div class="section-title" onclick="APP.prompt('Edit:','${section.t}',v=>{APP.recipes[${idx}].t=v;APP.saveRecipes();APP.render()})">${section.t}</div>
          <nav class="vol-bar">
            ${section.cv.sort((a,b)=>a-b).map(v => `<div class="v-chip ${section.v==v?'active':''}" onmousedown="APP.startP(event,'vol',[${idx},${v}])" ontouchstart="APP.startP(event,'vol',[${idx},${v}])" onmouseup="APP.endP()" ontouchend="APP.endP()" onclick="APP.setV(${idx},${v})">${v}L</div>`).join('')}
            <div onclick="APP.prompt('Vol:','',v=>APP.addV(${idx},v))" style="cursor:pointer;font-weight:800;font-size:18px">+</div>
          </nav>
          <div class="tabs-row">
            ${section.g.map((g,i)=>`<div class="tab ${gIdx==i?'active':''}" onmousedown="APP.startP(event,'tab',[${idx},${i}])" ontouchstart="APP.startP(event,'tab',[${idx},${i}])" onmouseup="APP.endP()" ontouchend="APP.endP()" onclick="APP.setT(${idx},${i})">${g.n}</div>`).join('')}
            <div class="tab" onclick="APP.prompt('Name:','',e=>APP.addT(${idx},e))" style="color:var(--main);font-size:14px">+</div>
          </div>
          <table>
            ${group.i.map((ing,i)=>`
              <tr>
                <td class="col-n" onclick="APP.prompt('Nom:','${ing.n}',v=>APP.editN(${idx},${i},v))" onmousedown="APP.startP(event,'ing',[${idx},${i}])" ontouchstart="APP.startP(event,'ing',[${idx},${i}])" onmouseup="APP.endP()" ontouchend="APP.endP()">${ing.n}${' '}${' '}</td>
                <td class="col-p" onclick="APP.openRatio(${idx},${i})">${ing.r/10}%${' '}</td>
                <td class="col-v">${Utils.calcIngredientValue(ing, section.v)}${' '}</td>
               </tr>
            `).join('')}
           </table>
          <div class="section-footer"><button class="btn-add-ing" onclick="APP.state.activeCat=${idx};APP.toggleDrawer(true)">${L.addIng}</button><div class="total-label" style="color:${Math.abs(total-100)<0.1?'#999':'var(--danger)'}">${L.total} : ${total.toFixed(1)}%</div></div>
          <textarea class="note-area" placeholder="${L.notes}" oninput="APP.recipes[${idx}].note=this.value;APP.saveRecipes()">${section.note||''}</textarea>
        </div>`;
      });
      document.getElementById('content').innerHTML = html;
      this.renderLib();
    },
    renderIngredients() {
      const L = LANGS[State.lang];
      let html = '<div class="ingredients-list">';
      const usage = this.getIngredientUsage();
      const sorted = [...Stores.ingredients.data].sort((a,b) => {
        const ua = usage[a.id] || 0;
        const ub = usage[b.id] || 0;
        return ub - ua;
      });
      sorted.forEach(ing => {
        html += `<div class="ingredient-item">
          <span class="ing-name">${ing.name}</span>
          <span class="ing-details">ρ=${ing.density||'?'} kg/L | pH=${ing.ph||'?'}</span>
          <span class="ing-notes" style="font-size:9px;color:var(--sub);width:100%">${ing.notes||''}</span>
          <div class="actions">
            <button class="btn-small" onclick="APP.editIngredient('${ing.id}')">éditer</button>
            <button class="btn-delete" onclick="APP.deleteIngredient('${ing.id}')">×</button>
          </div>
        </div>`;
      });
      html += `<button class="btn-add" onclick="APP.addIngredientPrompt()">${L.addIngredient}</button></div>`;
      document.getElementById('content').innerHTML = html;
    },
    renderCultures() {
      const L = LANGS[State.lang];
      if(Stores.cultures.data.length===0){
        document.getElementById('content').innerHTML = `<div style="text-align:center;padding:40px;color:var(--sub)">${L.noCultures}<button class="btn-add" onclick="APP.addCulturePrompt()">${L.createBatch}</button></div>`;
        return;
      }
      let html = '<div class="cultures-list">';
      Stores.cultures.data.forEach(c=>{
        const last = c.events.length ? c.events[c.events.length-1] : null;
        const lastDate = last ? new Date(last.date).toLocaleDateString() : '';
        html += `<div class="culture-card"><div class="culture-header" onclick="APP.editCulture('${c.id}')"><span class="culture-name">${c.strain} (${c.generation})</span><span class="culture-id">${c.id}</span></div><div class="culture-dates">${L.startDate} : ${new Date(c.date_start).toLocaleDateString()}</div><div class="culture-last">Dernier : ${last ? last.type+' le '+lastDate : 'aucun'}</div><div class="culture-footer"><button class="btn-small" onclick="APP.addEventToCulture('${c.id}')">+ ${L.event}</button><button class="btn-delete" onclick="APP.deleteCulture('${c.id}')">×</button></div></div>`;
      });
      html += `<button class="btn-add" onclick="APP.addCulturePrompt()">${L.addCulture}</button></div>`;
      document.getElementById('content').innerHTML = html;
    },
    renderSuivi() {
      const L = LANGS[State.lang];
      if(Stores.cultures.data.length===0){
        document.getElementById('content').innerHTML = `<div style="text-align:center;padding:40px;color:var(--sub)">${L.noCulturesToDisplay}<button class="btn-add" onclick="APP.setView('cultures')">${L.createBatch}</button></div>`;
        return;
      }
      let startAll = Infinity, endAll = -Infinity;
      Stores.cultures.data.forEach(c=>{ const s=c.date_start; const e=c.events.length?c.events[c.events.length-1].date:s; startAll=Math.min(startAll,s); endAll=Math.max(endAll,e); });
      endAll += 86400000;
      const totalDays = Math.ceil((endAll-startAll)/86400000);
      const pxPerDay = 20;
      const width = totalDays * pxPerDay;
      const sorted = [...Stores.cultures.data].sort((a,b)=>a.date_start-b.date_start);
      let scale = `<div class="timeline-scale" style="width:${width}px;">`;
      for(let d=0; d<=totalDays; d++){
        const pos = d*pxPerDay;
        const date = new Date(startAll + d*86400000);
        scale += `<div class="scale-marker" style="left:${pos}px;"><div style="width:1px;height:8px;background:var(--sub);"></div>${d%5===0?`<div class="day-num">${date.getDate()}</div>`:''}</div>`;
        if(d%7===0 && d>0){
          scale += `<div class="scale-marker week" style="left:${pos}px;"><div style="width:2px;height:15px;background:var(--main);"></div><div class="week-num">S${Math.floor(d/7)}</div></div>`;
        }
      }
      scale += '</div>';
      let bars = `<div class="timeline-bars" style="width:${width}px;height:${sorted.length*40}px;">`;
      sorted.forEach((c,idx)=>{
        const left = ((c.date_start-startAll)/86400000)*pxPerDay;
        const lastEv = c.events.length ? c.events[c.events.length-1].date : c.date_start;
        const w = ((lastEv - c.date_start)/86400000)*pxPerDay;
        const barW = Math.max(w,2);
        const y = idx*40+5;
        const bg = idx%2===0 ? '#ddd' : '#ccc';
        let markers = '';
        c.events.forEach((ev,evi)=>{
          const evPos = ((ev.date-c.date_start)/86400000)*pxPerDay;
          if(evPos>=0 && evPos<=barW){
            markers += `<div class="event-marker" style="left:${evPos}px;" onclick="APP.editEventPrompt('${c.id}',${evi})" title="${ev.type}"></div>`;
          }
        });
        bars += `<div class="culture-bar" data-id="${c.id}" onclick="APP.showCultureDetails('${c.id}')" style="left:${left}px;top:${y}px;width:${barW}px;background:${bg};">${markers}</div>`;
      });
      bars += '</div>';
      const timelineHtml = `<div class="timeline-wrapper" style="overflow-x:auto;">${scale}${bars}</div>`;
      let codes = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin:20px 0;">';
      sorted.forEach(c=>{ codes += `<span class="culture-code" data-id="${c.id}" onclick="APP.showCultureDetails('${c.id}')">${c.id}</span>`; });
      codes += `</div><button class="btn-add" onclick="APP.promptAddEvent()">${L.addEvent}</button>`;
      document.getElementById('content').innerHTML = timelineHtml + codes;
    },
    renderLib() {
      const L = LANGS[State.lang];
      const libDiv = document.getElementById('lib-list');
      const usage = this.getIngredientUsage();
      const sorted = [...Stores.ingredients.data].sort((a,b) => {
        const ua = usage[a.id] || 0;
        const ub = usage[b.id] || 0;
        return ub - ua;
      });
      libDiv.innerHTML = sorted.map(ing => `<div class="lib-btn" onclick="APP.addIng('${ing.name}')">${ing.name}</div>`).join('') +
        `<div class="lib-btn" style="background:var(--main);color:var(--bg)" onclick="APP.prompt('Item:','',e=>APP.addIng(e))">${L.other}</div>`;
    },
    getIngredientUsage() {
      const usage = {};
      Stores.recipes.data.forEach(section => {
        section.g.forEach(group => {
          group.i.forEach(ing => {
            const id = Utils.slugify(ing.n);
            usage[id] = (usage[id] || 0) + 1;
          });
        });
      });
      return usage;
    }
  };

  // ---------- 7. HANDLERS (appelés depuis le HTML) ----------
  const Handlers = {
    setV(s, v) { Stores.recipes.data[s].v = v; Stores.recipes.save(); State.notify(); },
    addV(s, v) { if(v && !isNaN(v)){ Stores.recipes.data[s].cv.push(parseFloat(v)); Stores.recipes.data[s].v=parseFloat(v); Stores.recipes.save(); State.notify(); } },
    setT(s, g) { State.gIdx[s] = g; State.notify(); },
    addT(s, name) { if(name){ Stores.recipes.data[s].g.push({n:name,i:[]}); State.gIdx[s]=Stores.recipes.data[s].g.length-1; Stores.recipes.save(); State.notify(); } },
    delT(s, g) { if(Stores.recipes.data[s].g.length>1){ Stores.recipes.data[s].g.splice(g,1); State.gIdx[s]=0; Stores.recipes.save(); State.notify(); } },
    editN(s, i, name) { if(name){ Stores.recipes.data[s].g[State.gIdx[s]].i[i].n = name; Stores.recipes.save(); State.notify(); } },
    delI(s, i) { Stores.recipes.data[s].g[State.gIdx[s]].i.splice(i,1); Stores.recipes.save(); State.notify(); },
    openRatio(s, i) {
      const L = LANGS[State.lang];
      const group = Stores.recipes.data[s].g[State.gIdx[s]];
      const others = group.i.reduce((a,ing,idx)=>a+(idx!==i?ing.r:0),0)/10;
      const avail = Math.max(0,100-others);
      Modal.show(`
        <div class="modal-btn black" onclick="APP.setR(${s},${i},${avail}); Modal.close();">${L.equi} (${avail.toFixed(1)}%)</div>
        <div class="modal-btn" onclick="APP.prompt('% :',${group.i[i].r/10},v=>APP.setR(${s},${i},v)); Modal.close();">${L.manual}</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);
    },
    setR(s, i, percent) { if(percent!=null && !isNaN(percent)){ Stores.recipes.data[s].g[State.gIdx[s]].i[i].r = 10*percent; Stores.recipes.save(); State.notify(); } Modal.close(); },
    addIng(name) {
      if(!name) return;
      let ing = Stores.ingredients.findByName(name);
      if(!ing){
        const id = Utils.slugify(name);
        Stores.ingredients.add({ id, name, density:null, ph:null, notes:'' });
      }
      const type = name.toLowerCase().match(/meudon|gypse|chaux|chalk|lime|gypsum|malt|agar/) ? "cs" : "vol";
      Stores.recipes.data[State.activeCat].g[State.gIdx[State.activeCat]].i.push({n:name, r:0, u:type});
      Stores.recipes.save();
      State.notify();
      document.getElementById('drawer').classList.remove('open');
    },
    startP(e, type, data) {
      if(State.pressTimer) clearTimeout(State.pressTimer);
      State.pressTimer = setTimeout(() => {
        if(type === 'tab') Handlers.openTabMenu(data[0], data[1]);
        else Handlers.confirmDel(type, data);
      }, 450);
    },
    endP() { if(State.pressTimer) clearTimeout(State.pressTimer); },
    openTabMenu(s, g) {
      const L = LANGS[State.lang];
      Modal.show(`
        <div style="font-weight:900;font-size:11px;margin-bottom:15px;text-transform:uppercase">${Stores.recipes.data[s].g[g].n}</div>
        <div class="modal-btn black" id="m-rename">${L.rename}</div>
        <div class="modal-btn danger" id="m-del">${L.del}</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);
      document.getElementById('m-rename').onclick = () => {
        Modal.close();
        Modal.prompt(L.rename+':', Stores.recipes.data[s].g[g].n, n => { if(n){ Stores.recipes.data[s].g[g].n = n; Stores.recipes.save(); State.notify(); } });
      };
      document.getElementById('m-del').onclick = () => { Handlers.delT(s,g); Modal.close(); };
    },
    confirmDel(type, data) {
      const L = LANGS[State.lang];
      Modal.show(`
        <div style="height:15px"></div>
        <div class="modal-btn black" onclick="Modal.close()">${L.cancel}</div>
        <div class="modal-btn danger" id="del-btn">${L.del}</div>
      `);
      document.getElementById('del-btn').onclick = () => {
        if(type === 'vol') Handlers.delV(data[0], data[1]);
        if(type === 'ing') Handlers.delI(data[0], data[1]);
        Modal.close();
      };
    },
    delV(s, v) {
      Stores.recipes.data[s].cv = Stores.recipes.data[s].cv.filter(x=>x!==v);
      if(Stores.recipes.data[s].v == v) Stores.recipes.data[s].v = Stores.recipes.data[s].cv[0]||0.5;
      Stores.recipes.save();
      State.notify();
    },
    addIngredientPrompt() {
      Modal.ingredientForm(null, ing => {
        const id = Utils.slugify(ing.name);
        if(Stores.ingredients.data.find(i=>i.id===id)) return alert('Cet ingrédient existe déjà');
        Stores.ingredients.add({id, ...ing});
      });
    },
    editIngredient(id) {
      const ing = Stores.ingredients.data.find(i=>i.id===id);
      if(ing) Modal.ingredientForm(ing, newData => {
        const newId = Utils.slugify(newData.name);
        if(newId !== id && Stores.ingredients.data.find(i=>i.id===newId)) return alert('Un ingrédient avec ce nom existe déjà');
        Stores.ingredients.update(id, {...newData, id: newId});
      });
    },
    deleteIngredient(id) {
      if(confirm('Supprimer cet ingrédient ?')) Stores.ingredients.delete(id);
    },
    addCulturePrompt() {
      Modal.cultureForm(null, data => {
        const id = Utils.generateCultureId(data.strain, data.generation);
        // Créer un snapshot de la recette actuellement sélectionnée (section et groupe)
        const sectionIdx = State.activeCat;
        const groupIdx = State.gIdx[sectionIdx];
        const recipeSnapshot = Utils.createRecipeSnapshot(sectionIdx, groupIdx, Stores.recipes.data, Stores.ingredients);
        Stores.cultures.add({
          id,
          strain: data.strain,
          generation: data.generation,
          date_start: data.date_start,
          events: [],
          notes: data.notes,
          recipeSnapshot: recipeSnapshot  // snapshot figé
        });
        setTimeout(() => {
          Modal.eventForm(null, ev => {
            Stores.cultures.addEvent(id, ev);
          });
        }, 100);
      });
    },
    editCulture(id) {
      const c = Stores.cultures.data.find(c=>c.id===id);
      if(c) Modal.cultureForm(c, data => Stores.cultures.update(id, data));
    },
    deleteCulture(id) {
      if(confirm('Supprimer ce lot ?')) Stores.cultures.delete(id);
    },
    addEventToCulture(id) {
      Modal.eventForm(null, ev => Stores.cultures.addEvent(id, ev));
    },
    editEventPrompt(id, idx) {
      const c = Stores.cultures.data.find(c=>c.id===id);
      if(c && c.events[idx]) {
        Modal.eventForm(c.events[idx], newEv => Stores.cultures.updateEvent(id, idx, newEv));
      }
    },
    deleteEvent(id, idx) {
      if(confirm('Supprimer cet événement ?')) Stores.cultures.deleteEvent(id, idx);
    },
    promptAddEvent() {
      const opts = Stores.cultures.data.map(c=>`<option value="${c.id}">${c.id} - ${c.strain}</option>`).join('');
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">${LANGS[State.lang].addEvent}</div>
        <select id="modal-culture-select" class="modal-input">${opts}</select>
        <input type="date" id="modal-event-date" class="modal-input" value="${new Date().toISOString().split('T')[0]}">
        <input type="text" id="modal-event-type" class="modal-input" placeholder="${LANGS[State.lang].type}">
        <div class="modal-btn black" id="global-event-ok">OK</div>
        <div class="modal-btn" onclick="Modal.close()">${LANGS[State.lang].cancel}</div>
      `);
      document.getElementById('global-event-ok').onclick = () => {
        const id = document.getElementById('modal-culture-select').value;
        const date = document.getElementById('modal-event-date').value;
        const type = document.getElementById('modal-event-type').value.trim();
        if(!id || !date || !type) return alert('Tous les champs requis');
        Stores.cultures.addEvent(id, { date: new Date(date+'T12:00:00').getTime(), type });
        Modal.close();
      };
    },
    showCultureDetails(id) {
      const c = Stores.cultures.data.find(c=>c.id===id);
      if(!c) return;
      const L = LANGS[State.lang];
      let evHtml = '';
      c.events.forEach((ev,idx)=>{
        evHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--grey);"><span><strong>${ev.type}</strong> - ${new Date(ev.date).toLocaleDateString()}</span><div><button class="btn-small" onclick="APP.editEventPrompt('${id}',${idx})">éditer</button><button class="btn-delete" onclick="APP.deleteEvent('${id}',${idx})">×</button></div></div>`;
      });
      if(!evHtml) evHtml = '<p>Aucun événement</p>';
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:5px">${c.id} - ${c.strain}</div>
        <div style="max-height:200px;overflow-y:auto;margin-bottom:15px;">${evHtml}</div>
        <div class="modal-btn black" onclick="APP.addEventToCulture('${id}'); Modal.close();">${L.addEvent}</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);
    },
    setView(view) { State.setView(view); },
    toggleDarkMode() { State.toggleDarkMode(); },
    toggleLang() { State.toggleLang(); },
    setAuthor(author) { State.setAuthor(author); },
    pickDate() {
      const current = State.getEffectiveDate();
      const def = current.toISOString().split('T')[0];
      Modal.datePicker(def, newDate => State.setCustomDate(newDate ? new Date(newDate+'T12:00:00').getTime() : null));
    },
    openSaveModal() {
      const L = LANGS[State.lang];
      Modal.show(`
        <div class="modal-btn black" onclick="APP.downloadBackup()">${L.save}</div>
        <div class="modal-btn" onclick="APP.uploadBackup()">${L.restore}</div>
        <div class="modal-btn" onclick="window.print()">${L.pdf}</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);
    },
    downloadBackup() {
      const backup = {
        recipes: Stores.recipes.data,
        ingredients: Stores.ingredients.data,
        cultures: Stores.cultures.data
      };
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(backup,null,2)], {type:'application/json'}));
      a.download = `mycolab_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      Modal.close();
    },
    uploadBackup() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            if(data.recipes) { Stores.recipes.data = data.recipes; Stores.recipes.save(); }
            if(data.ingredients) { Stores.ingredients.data = data.ingredients; Stores.ingredients.save(); }
            if(data.cultures) { Stores.cultures.data = data.cultures; Stores.cultures.save(); }
            State.notify();
          } catch(e) { alert('Fichier invalide'); }
          Modal.close();
        };
        reader.readAsText(file);
      };
      input.click();
    },
    toggleDrawer(show) { document.getElementById('drawer').classList.toggle('open', show); },
    prompt(title, defaultValue, callback) { Modal.prompt(title, defaultValue, callback); },
    saveRecipes() { Stores.recipes.save(); }
  };

  // Exposer l'objet APP global (inchangé)
  window.APP = {
    setV: Handlers.setV,
    addV: Handlers.addV,
    setT: Handlers.setT,
    addT: Handlers.addT,
    delT: Handlers.delT,
    editN: Handlers.editN,
    delI: Handlers.delI,
    openRatio: Handlers.openRatio,
    setR: Handlers.setR,
    addIng: Handlers.addIng,
    startP: Handlers.startP,
    endP: Handlers.endP,
    openTabMenu: Handlers.openTabMenu,
    confirmDel: Handlers.confirmDel,
    delV: Handlers.delV,
    addIngredientPrompt: Handlers.addIngredientPrompt,
    editIngredient: Handlers.editIngredient,
    deleteIngredient: Handlers.deleteIngredient,
    addCulturePrompt: Handlers.addCulturePrompt,
    editCulture: Handlers.editCulture,
    deleteCulture: Handlers.deleteCulture,
    addEventToCulture: Handlers.addEventToCulture,
    editEventPrompt: Handlers.editEventPrompt,
    deleteEvent: Handlers.deleteEvent,
    promptAddEvent: Handlers.promptAddEvent,
    showCultureDetails: Handlers.showCultureDetails,
    setView: Handlers.setView,
    toggleDarkMode: Handlers.toggleDarkMode,
    toggleLang: Handlers.toggleLang,
    setAuthor: Handlers.setAuthor,
    pickDate: Handlers.pickDate,
    openSaveModal: Handlers.openSaveModal,
    downloadBackup: Handlers.downloadBackup,
    uploadBackup: Handlers.uploadBackup,
    toggleDrawer: Handlers.toggleDrawer,
    prompt: Handlers.prompt,
    saveRecipes: Handlers.saveRecipes,
    render: () => { Renderer.render(); },
    recipes: Stores.recipes.data,
    state: {
      gIdx: State.gIdx,
      activeCat: State.activeCat,
      author: State.author
    }
  };

  // ---------- 8. INITIALISATION ----------
  function init() {
    State.load();
    Stores.recipes.load();
    Stores.ingredients.load();
    Stores.cultures.load();
    State.subscribe(() => Renderer.render());
    Renderer.render();
  }
  init();
})();
</script>
</body>
</html>

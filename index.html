<!DOCTYPE html>
<html lang="fr-CH">
<!-- MycoLab v6.8.0 -->
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="no">
<meta name="mobile-web-app-capable" content="no">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>MycoLab</title>
<meta name="description" content="MycoLab — application de suivi de cultures mycologiques. Recettes de substrat, journal d'événements, Gantt de suivi.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🍄</text></svg>">

<style>
/* ============================================================
   MycoLab — Styles (v6.8.0)
   ============================================================ */
:root{--bg:#fff;--main:#000;--sub:#666;--grey:#eee;--border:var(--grey);--danger:#ff4d4d;--font:'Inter',-apple-system,sans-serif;--nav-bg:#fff}
body.dark-mode{--bg:#000;--main:#fff;--sub:#aaa;--grey:#222;--border:#333;--nav-bg:#111}
body.dark-mode .modal-input{background:rgba(255,255,255,.08)!important;color:#fff!important}
body.dark-mode .note-area{background:rgba(255,255,255,.06)!important;color:#fff!important}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none}
body{font-family:var(--font);background:var(--bg);color:var(--main);margin:0;padding:calc(20px + env(safe-area-inset-top)) 20px 20px 20px;font-weight:300;-webkit-user-select:none;transition:background .2s;overflow-x:hidden}
.container{max-width:450px;margin:auto;display:flex;flex-direction:column;min-height:95vh}

/* Header */
header{width:100%;margin-bottom:5px;padding-bottom:0}
.header-row{display:flex;justify-content:space-between;align-items:baseline;width:100%}
.header-row:first-child{border-bottom:2px solid var(--main);padding-bottom:10px;margin-bottom:5px}
h1{font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:4px;margin:0}
.right-group{display:flex;align-items:baseline;gap:8px}
.lang-toggle{font-size:10px;font-weight:800;cursor:pointer;color:var(--sub);text-transform:uppercase}
.lang-toggle span.active{color:var(--main);text-decoration:underline}
#timestamp{font-size:10px;color:var(--sub);text-transform:uppercase;font-weight:700;letter-spacing:.5px;cursor:pointer}
.text-btn{font-size:10px;font-weight:800;cursor:pointer;color:var(--main);text-transform:uppercase;background:none;border:none;padding:0}
.text-btn:hover{opacity:0.7}

/* Navigation onglets */
.tabs-nav{display:flex;justify-content:space-between;gap:10px;margin-top:20px;padding-bottom:5px;border-bottom:1px solid var(--grey);overflow-x:auto;scrollbar-width:none}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-view{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;cursor:pointer;white-space:nowrap;padding:4px 0;flex:1;text-align:center}
.tab-view.active{color:var(--main);border-bottom:2px solid var(--main)}

#content{margin-top:15px}

/* Fiches style "Cultures" pour les recettes */
.recipe-card{border:1px solid var(--grey);padding:12px;margin-bottom:12px;position:relative}
.recipe-title{font-weight:900;font-size:14px;color:var(--main);margin-bottom:6px;cursor:pointer}
.vol-bar{display:flex;gap:18px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.v-chip{font-size:13px;color:var(--sub);cursor:pointer}
.v-chip.active{color:var(--main);font-weight:900}
.tabs-row{display:flex;gap:18px;margin-bottom:20px;border-bottom:1px solid var(--grey);overflow-x:auto;padding-bottom:10px;align-items:flex-end;scrollbar-width:none}
.tabs-row::-webkit-scrollbar{display:none}
.tab{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;white-space:nowrap;cursor:pointer}
.tab.active{color:var(--main);font-size:14px;font-weight:900;border-bottom:2px solid var(--main);padding-bottom:2px}
table{width:100%;border-collapse:collapse;table-layout:fixed;margin-top:8px}
td{padding:12px 0;border-bottom:1px solid var(--grey)}
.col-n{width:45%;text-align:left;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.col-p{width:20%;text-align:right;font-size:11px;font-weight:800;color:var(--sub);cursor:pointer}
.col-v{width:35%;text-align:right;font-size:16px;font-weight:500}
.unit-s{font-size:11px;font-weight:700;color:var(--sub);margin-left:2px;text-transform:lowercase}
.section-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 0 6px 0}
.btn-add-ing{font-size:9px;font-weight:800;border:none;padding:0;text-transform:uppercase;cursor:pointer;background:none;color:var(--main)}
.total-label{font-size:11px;font-weight:800;text-transform:uppercase;text-align:right}
.note-area{width:100%;border:none;border-left:1px solid var(--grey);padding:8px 12px;font-family:var(--font);font-size:12px;color:var(--main);resize:none;margin-top:12px;background:var(--nav-bg);min-height:40px}
.meta-info{font-size:9px;color:var(--sub);margin-top:8px;margin-bottom:4px;display:flex;gap:12px;flex-wrap:wrap}
.meta-info span{font-weight:700}
.temp-badge{background:var(--grey);padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;color:var(--sub);display:inline-block}

/* Listes et cartes (cultures) */
.ingredients-list, .cultures-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.ingredient-item, .culture-card{border:1px solid var(--grey);padding:12px;position:relative}
.ingredient-item{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:12px}
.ing-name{font-weight:900;font-size:14px;width:100%}
.ing-details{font-size:10px;color:var(--sub);font-family:monospace;background:var(--grey);padding:2px 6px;border-radius:2px}
.culture-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;cursor:pointer}
.culture-name{font-weight:900;font-size:18px;letter-spacing:0.3px}
.culture-id{font-size:9px;color:var(--sub);font-family:monospace}
.culture-dates{font-size:10px;color:var(--sub);margin:2px 0}
.culture-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.btn-small{font-size:9px;font-weight:800;border:1px solid var(--main);padding:4px 8px;background:none;color:var(--main);cursor:pointer;text-transform:uppercase}
.btn-delete{background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:0 5px}
.btn-add{font-size:10px;font-weight:800;border:1px solid var(--main);background:none;color:var(--main);padding:8px;width:100%;text-transform:uppercase;cursor:pointer;margin-top:10px}

/* Timeline Gantt */
.gantt-outer{display:flex;overflow:hidden;margin-bottom:20px;border:1px solid var(--grey);border-radius:4px;background:var(--bg)}
.gantt-names-col{flex-shrink:0;width:100px;border-right:2px solid var(--main);display:flex;flex-direction:column;z-index:2;background:var(--bg)}
.gantt-names-header{height:52px;border-bottom:2px solid var(--main);padding:0 8px;display:flex;align-items:center;font-size:8px;font-weight:800;text-transform:uppercase;color:var(--sub);flex-shrink:0}
.gantt-name-cell{height:40px;padding:0 8px;display:flex;align-items:center;border-bottom:1px solid var(--grey);cursor:pointer;flex-shrink:0}
.gantt-name-cell:hover{background:var(--grey)}
.gantt-name-text{font-size:9px;font-weight:800;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;line-height:1.2}
.gantt-name-ir{font-size:8px;font-weight:900;color:var(--danger);flex-shrink:0;margin-left:4px}
.gantt-scroll{overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--grey) transparent}
.gantt-scroll::-webkit-scrollbar{height:3px}
.gantt-scroll::-webkit-scrollbar-thumb{background:var(--grey);border-radius:2px}
.gantt-grid{display:flex;flex-direction:column}
.gantt-months-row{display:flex;border-bottom:1px solid var(--grey);min-height:22px;background:var(--bg)}
.gantt-month-cell{flex-shrink:0;padding:3px 6px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--main);border-right:1px solid var(--grey);white-space:nowrap;overflow:hidden}
.gantt-days-row{display:flex;border-bottom:2px solid var(--main);min-height:30px;background:var(--bg);box-shadow:0 3px 8px -2px rgba(0,0,0,.12)}
.gantt-day-cell{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--grey);cursor:pointer;transition:background .1s}
.gantt-day-cell:hover{background:var(--grey)}
.gantt-day-cell.today{background:color-mix(in srgb,var(--danger) 12%,transparent);border-right-color:var(--danger)}
.gantt-day-cell.weekend{opacity:.45}
.gantt-day-name{font-size:6px;font-weight:800;text-transform:uppercase;color:var(--sub)}
.gantt-day-num{font-size:10px;font-weight:900;color:var(--main);line-height:1}
.gantt-day-cell.today .gantt-day-num{color:var(--danger)}
.gantt-body-rows{display:flex;flex-direction:column}
.gantt-body-row{position:relative;height:40px;border-bottom:1px solid var(--grey);display:flex}
.gantt-body-row:nth-child(even){background:color-mix(in srgb,var(--grey) 40%,transparent)}
.gantt-col-cell{flex-shrink:0;height:100%;border-right:1px solid transparent}
.gantt-col-cell.week-start{border-right-color:var(--grey)}
.gantt-col-cell.today-col{border-right:2px solid var(--danger)}
.gantt-bars-layer{position:absolute;inset:0;pointer-events:none}
.gantt-bar{position:absolute;height:12px;top:14px;border-radius:2px;background:var(--main);cursor:pointer;pointer-events:all;transition:opacity .15s}
.gantt-bar:hover{opacity:.7}
.gantt-bar.ev-incubation{background:#e0e0e0}
.gantt-bar.ev-observation{background:#d1d1d1}
.gantt-bar.ev-colonisation,.gantt-bar.ev-pinning{background:#666}
.gantt-bar.ev-recolte{background:#2ecc71}
.gantt-bar.ev-contamination,.gantt-bar.ev-echec{background:var(--danger)}
.gantt-bar.ev-note{background:#bbb}
.gantt-marker{width:8px;height:8px;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:5;border:none;padding:0;pointer-events:all;appearance:none;-webkit-appearance:none;transition:transform .12s,opacity .12s}
.gantt-marker:hover{transform:translate(-50%,-50%) scale(1.3);opacity:1}
.gantt-marker.inoculation,.gantt-marker.incubation{background:#fff;border:1px solid #ccc!important;box-shadow:0 0 0 .5px #ccc}
.gantt-marker.observation{background:#d1d1d1}
.gantt-marker.colonisation,.gantt-marker.pinning{background:#666}
.gantt-marker.recolte{background:#2ecc71}
.gantt-marker.contamination,.gantt-marker.echec{background:var(--danger)}
.gantt-marker.note{background:#d1d1d1}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);opacity:.7;pointer-events:none;z-index:4;transform:translateX(-50%)}
.gantt-tooltip{position:fixed;pointer-events:none;background:var(--main);color:var(--bg);font-size:9px;font-weight:700;padding:4px 8px;border-radius:2px;white-space:nowrap;z-index:9999;opacity:0;transition:opacity .1s}
.gantt-tooltip.visible{opacity:1}
.culture-code{display:inline-block;padding:4px 8px;background:var(--grey);border-radius:2px;font-size:10px;cursor:pointer;margin:2px}
.culture-code:hover{background:var(--sub);color:var(--bg)}

/* Modales */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--bg);color:var(--main);border:1px solid var(--main);width:90%;max-width:320px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.modal-input{width:100%;border:none;background:transparent;color:var(--main);border-bottom:2px solid var(--main);font-size:20px;padding:10px 0;margin-bottom:20px;border-radius:0}
.modal-input.small{font-size:16px;margin-bottom:10px}
.modal-label{font-size:9px;color:var(--sub);margin-bottom:2px;text-transform:uppercase;font-weight:700}
.modal-row{display:flex;gap:10px;margin-bottom:15px}
.modal-row .modal-input{flex:1}
.modal-btn{padding:15px;text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;border:1px solid var(--main);width:100%;margin-bottom:10px;display:block;color:var(--main);background:transparent}
.modal-btn.black{background:var(--main);color:var(--bg)}
.modal-btn.danger{border-color:var(--danger);color:var(--danger)}
#drawer{position:fixed;bottom:-100%;left:0;width:100%;background:var(--bg);border-top:2px solid var(--main);padding:25px;transition:.3s ease;z-index:1500;overflow-y:auto;max-height:80vh}
#drawer.open{bottom:0}
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:20px}
.lib-btn{padding:10px;border:1px solid var(--main);font-size:9px;font-weight:800;text-align:center;text-transform:uppercase;cursor:pointer;color:var(--main)}
.author-box{display:block;margin-top:30px;text-align:right;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--sub);cursor:pointer}
#author-name{color:var(--main)}

.recipe-pills-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.recipe-pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;cursor:pointer;color:var(--sub);background:transparent;border:none;font-family:var(--font);transition:background .1s}
.recipe-pill.active{background:#f0f0f0;color:var(--main)}
body.dark-mode .recipe-pill.active{background:#222;color:#fff}
.recipe-ctrl-bar{display:flex;justify-content:space-between;align-items:center;margin:0 0 10px 0;padding:6px 0;border-top:1px solid var(--grey);border-bottom:1px solid var(--grey)}
.recipe-ctrl-left{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px}
.recipe-ctrl-vol{font-weight:800;color:var(--main);cursor:pointer}
.recipe-ctrl-right{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:6px}
.recipe-ctrl-total{font-weight:800}

@media print{
  body.dark-mode{--bg:#fff;--main:#000;--sub:#777;--grey:#ddd}
  @page{size:A4;margin:1cm}
  body{padding:0;font-size:10px;line-height:1.3}
  .container{max-width:100%;width:100%}
  header{margin-bottom:4px;padding-bottom:4px}
  h1{font-size:16px}
  #timestamp{margin-bottom:8px;font-size:8px}
  .recipe-card{page-break-inside:avoid;margin-bottom:8px}
  .section-title{font-size:12px;margin-bottom:6px;padding-bottom:2px}
  td{padding:4px 0;font-size:10px}
  .col-v{font-size:11px}
  .note-area{background:#fff!important;color:#000!important;border:none!important;border-left:1px solid #ccc!important;padding:3px 6px;min-height:10px;margin-bottom:8px;font-size:9px}
  .author-box{display:block!important;margin-top:6px;text-align:right;color:#000!important}
  #author-name{color:#000!important}
  .vol-bar,.btn-add-ing,#drawer,#modal-overlay,.tab:not(.active),.v-chip:not(.active),.text-btn,.lang-toggle,.right-group,.tabs-nav,.btn-add,.btn-small,.btn-delete,.culture-footer,.no-print{display:none!important}
  .ingredient-item,.culture-card{border:1px solid #ccc;page-break-inside:avoid}
}
</style>
<!-- MycoLab v${APP_VERSION} -->
</head>
<body>
<div id="modal-overlay"><div class="modal" id="modal-box"></div></div>
<div class="container">
  <header>
    <div class="header-row">
      <h1>MycoLab</h1>
      <div class="right-group">
        <span class="text-btn" id="dark-toggle" onclick="APP.toggleDarkMode()" aria-label="Basculer mode sombre">Sombre</span>
        <div class="lang-toggle" onclick="APP.toggleLang()" aria-label="Changer la langue">
          <span id="l-fr">FR</span>/<span id="l-en">EN</span>
        </div>
      </div>
    </div>
    <div class="header-row bottom">
      <div id="timestamp" onclick="APP.pickDate()">...</div>
      <span class="text-btn" onclick="APP.openSaveModal()">Sauvegarde</span>
    </div>
    <div class="tabs-nav">
      <span class="tab-view" data-view="cultures">Cultures</span>
      <span class="tab-view" data-view="suivi">Suivi</span>
      <span class="tab-view" data-view="recipes">Recettes</span>
      <span class="tab-view" data-view="ingredients">Ingrédients</span>
    </div>
  </header>

  <div id="content"></div>

  <footer class="author-box" onclick="APP.prompt('Auteur:',APP.state.author||'',v=>APP.setAuthor(v))">
    <span id="author-name">...</span>
  </footer>
</div>

<div id="drawer">
  <div style="display:flex;justify-content:space-between;margin-bottom:15px;align-items:center">
    <span style="font-weight:900;font-size:10px" id="cat-label">CATALOGUE</span>
    <span onclick="APP.toggleDrawer(!1)" style="cursor:pointer;font-size:28px">&times;</span>
  </div>
  <div class="lib-grid" id="lib-list"></div>
</div>

<script>
(function () {
  'use strict';

  // ── Déregistrement Service Worker (anti-cache) ────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.unregister());
    });
  }

  // ============================================================
  // VERSION
  // ============================================================
  const APP_VERSION = '6.8.0';

  // ============================================================
  // PHASE_KINDS — référence des états de culture
  // ============================================================
  const PHASE_KINDS = {
    inoculation:   { re: /inocul|incubat/i,                          score: +10, label: 'Incubation'   },
    colonisation:  { re: /colonis|myc[eé]l|mycelium|blanc/i,        score: +15, label: 'Colonisation' },
    pinning:       { re: /primordia|pins|pin\b|pinning|[eé]bauche/i, score: +20, label: 'Pinning'      },
    recolte:       { re: /r[eé]colte|harvest/i,                     score: +40, label: 'Récolte'       },
    observation:   { re: /sain|healthy|vigoureux|dense|rapide|propre|clean/i, score: +5, label: 'Observation' },
    contamination: { re: /contam|moisissure|mold|tricho|bact[eé]r/i, score: -60, label: 'Contamination'},
    echec:         { re: /[eé]chec|fail|abort|perdu|mort/i,         score: -40, label: 'Échec'         },
  };

  // ============================================================
  // FONCTIONS PURES — jamais appelées au rendu
  // ============================================================

  /** Statut déterministe depuis les events. Priorité : échec > contamination > phases > note */
  function computeStatus(events) {
    if (!events || events.length === 0) return 'note';
    const evs = events.filter(e => e && e.kind);
    if (evs.some(e => e.kind === 'echec'))         return 'echec';
    if (evs.some(e => e.kind === 'contamination')) return 'contamination';
    if (evs.some(e => e.kind === 'recolte'))       return 'recolte';
    if (evs.some(e => e.kind === 'pinning'))       return 'pinning';
    if (evs.some(e => e.kind === 'colonisation'))  return 'colonisation';
    if (evs.some(e => e.kind === 'inoculation'))   return 'inoculation';
    if (evs.some(e => e.kind === 'observation'))   return 'observation';
    const dated = evs.filter(e => e.date).sort((a, b) => b.date - a.date);
    if (dated.length) return dated[0].kind || 'note';
    return evs.length ? (evs[evs.length - 1].kind || 'note') : 'note';
  }

  /** Dernière température connue (ev.temperature > ev.temp_c legacy) */
  function computeCurrentTemp(events) {
    if (!events || !events.length) return null;
    const sorted = events.slice().sort((a, b) => (b.date || 0) - (a.date || 0));
    const found = sorted.find(ev => {
      const t = ev.temperature != null ? ev.temperature : ev.temp_c;
      return t != null && !isNaN(t);
    });
    if (!found) return null;
    const t = found.temperature != null ? found.temperature : found.temp_c;
    return !isNaN(t) ? t : null;
  }

  /** Traduction texte libre → kind structuré. Usage : formulaires + migration uniquement. */
  function detectKind(text) {
    if (!text) return 'note';
    const lower = text.toLowerCase();
    try {
      for (const t of Stores.refs.data.eventTypes)
        if (lower.includes(t.label.toLowerCase())) return t.kind || t.id;
    } catch (_) {}
    for (const [k, def] of Object.entries(PHASE_KINDS))
      if (def.re.test(text)) return k;
    return 'note';
  }

  // ============================================================
  // i18n
  // ============================================================
  const LANGS = {
    fr: {
      tabRecipes:'Recettes', tabIngredients:'Ingrédients', tabCultures:'Cultures', tabSuivi:'Suivi',
      noCultures:'Aucune culture.', noCulturesToDisplay:'Aucune culture à afficher.', createBatch:'Créer un lot',
      total:'TOTAL', addIng:'+ INGRÉDIENT', notes:'Notes techniques...',
      cancel:'ANNULER', del:'SUPPRIMER', equi:'EQUILIBRER', other:'+ AUTRE',
      dark:'SOMBRE', light:'CLAIR', authorDef:'AUTEUR NON DÉFINI', pdf:'PDF', save:'SAUVEGARDER', restore:'RESTAURER',
      setDate:'Choisir une date', addIngredient:'+ INGRÉDIENT', editIngredient:'Modifier ingrédient',
      density:'Masse vol. (g/ml)', ph:'pH', addCulture:'+ NOUVEAU LOT', strain:'Variété',
      generation:'Génération', startDate:'Date début', type:'Type', date:'Date',

  // ============================================================
  // UTILITAIRES
  // ============================================================
  const Utils = {
    uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); },
    slugify(str) {
      return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    },
    translateIngredientName(name, targetLang) {
      if (!name) return name;
      const src = LANGS[targetLang === 'en' ? 'fr' : 'en'].lib;
      const dst = LANGS[targetLang].lib;
      const i = src.findIndex(x => x.name.toLowerCase() === name.toLowerCase());
      return i !== -1 ? dst[i].name : name;
    },
    formatDate(ts, lang) {
      return (ts ? new Date(ts) : new Date()).toLocaleDateString(
        lang === 'fr' ? 'fr-CH' : 'en-GB',
        {weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'}
      );
    },
    toDDMMYYYY(ts) {
      const d = new Date(ts);
      return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
    },
    cleanSectionName(name) { return name ? name.replace(/^[IVX]+\.\s*/i,'').trim() : name; },
    generateCultureId(strain, gen) {
      const prefix = (strain || '').substring(0,4).toUpperCase().replace(/[^A-Z]/g,'') || 'LOT';
      const rand = Math.random().toString(36).slice(2,5).toUpperCase();
      return `${prefix}-${gen||'G1'}-${new Date().toISOString().slice(0,10).replace(/-/g,'')}-${rand}`;
    },
    /** Affichage d'un ingrédient en L ou kg — lit densité figée dans ing ou référentiel */
    calcIngredientDisplay(ing, vol, weightMode) {
      try {
        const sd = (raw, fb) => { const d=parseFloat(raw); return isFinite(d)&&d>0 ? d : fb; };
        if (ing.u === 'cs' || ing.u === 'cc') {
          const mlPU = ing.u==='cs' ? 15 : 5;
          const nU = (ing.r||0)*vol*10 / (ing.u==='cs' ? 150 : 50);
          const vL = nU*mlPU/1000;
          const fi = ing.ingId ? Stores.ingredients.data.find(i=>i.id===ing.ingId) : null;
          return `${Math.round(vL*sd(fi?.density??ing.density,1.2)*1000)}<span class="unit-s">g</span>`;
        }
        const l = (ing.r||0)*vol/1000;
        if (!weightMode) return `${l.toFixed(2)}<span class="unit-s">L</span>`;
        const fi = ing.ingId ? Stores.ingredients.data.find(i=>i.id===ing.ingId) : null;
        const g = Math.round(l*sd(fi?.density??ing.density,1.0)*1000);
        return g>=1000 ? `${(g/1000).toFixed(2)}<span class="unit-s">kg</span>` : `${g}<span class="unit-s">g</span>`;
      } catch(_) { return '—'; }
    },
    /** IR (0-100) basé sur ev.kind et ev.yield_g — jamais de calcul texte */
    calcIR(culture) {
      try {
        if (!culture.events || !culture.events.length) return null;
        let score = 0;
        culture.events.forEach(ev => {
          const kind = ev.kind || 'note';
          let s = 0;
          try { const ref = Stores.refs.data.eventTypes.find(r=>r.id===kind||r.kind===kind); s = ref ? ref.score : (PHASE_KINDS[kind]?.score||0); }
          catch(_) { s = PHASE_KINDS[kind]?.score||0; }
          score += s;
          if (kind==='recolte' && typeof ev.yield_g==='number') {
            if (ev.yield_g>=200) score+=15; else if (ev.yield_g>=100) score+=8; else if (ev.yield_g>=50) score+=4;
          }
        });
        return Math.max(0, Math.min(100, Math.round(score)));
      } catch(_) { return null; }
    },
    /** Snapshot figé : copie complète de la recette au moment de la création de la culture */
    createRecipeSnapshot(sectionIdx, recipesStore, ingredientsStore) {
      try {
        if (sectionIdx==null || sectionIdx<0 || sectionIdx>=recipesStore.length) return null;
        const section = recipesStore[sectionIdx];
        if (!section) return null;
        const ingredients = (section.i||[]).map(ing => {
          const fi = ing.ingId ? ingredientsStore.data.find(i=>i.id===ing.ingId) : null;
          return { name:ing.n, ingId:ing.ingId||null, percent:ing.r/10, unit:ing.u,
            density: fi?.density ?? ing.density ?? null,
            ph:      fi?.ph      ?? ing.ph      ?? null,
            notes:   fi?.notes   ?? '' };
        });
        return { sectionId:section.id||null, sectionName:section.t, groupName:section.t,
          volume:section.v, temp_c:section.temp_c||null, ingredients };
      } catch(_) { return null; }
    },
    // ── Migrations one-time ──────────────────────────────────────
    migrateRecipeIngIds() {
      let dirty = false;
      try {
        Stores.recipes.data.forEach(section => {
          if (!section.id) { section.id = Utils.uid(); dirty = true; }
          (section.i||[]).forEach(ing => {
            if (!ing.iid) { ing.iid = Utils.uid(); dirty = true; }
            const found = ing.ingId
              ? Stores.ingredients.data.find(i=>i.id===ing.ingId)
              : Stores.ingredients.data.find(i=>i.name.toLowerCase()===(ing.n||'').toLowerCase());
            if (found) {
              if (!ing.ingId) { ing.ingId=found.id; dirty=true; }
              if (ing.density==null && found.density!=null) { ing.density=found.density; dirty=true; }
            }
          });
        });
        if (dirty) Stores.recipes.save();
      } catch(e) { console.error('[MycoLab] migrateRecipeIngIds:', e); }
    },
    migrateEvents() {
      let dirty = false;
      try {
        Stores.cultures.data.forEach(c => {
          if (!c.created_at) { c.created_at = c.date_start||Date.now(); dirty=true; }
          if (c.notes==null) { c.notes=''; dirty=true; }
          if (!Array.isArray(c.events)) { c.events=[]; dirty=true; }
          c.events.forEach(ev => {
            if (!ev.kind) { ev.kind=detectKind(ev.type||''); dirty=true; }
            if (!ev.eid)  { ev.eid=`ev_${ev.date||Date.now()}_${Math.random().toString(36).slice(2,7)}`; dirty=true; }
            if (!ev.date||isNaN(ev.date)) { ev.date=Date.now(); dirty=true; }
            if (ev.temp_c!==undefined && ev.temperature===undefined) { ev.temperature=ev.temp_c; delete ev.temp_c; dirty=true; }
            if (ev.kind==='recolte' && ev.yield_g===undefined && ev.type) {
              const m=ev.type.match(/(\d+)\s*g\b/); if (m) { ev.yield_g=parseInt(m[1]); dirty=true; }
            }
            if (ev.recipeSnapshot!==undefined) { delete ev.recipeSnapshot; dirty=true; }
          });
          c.events = c.events.slice().sort((a,b)=>(a.date||0)-(b.date||0));
          if (!c.recipeSnapshot) {
            const leg = c.events.find(e=>e&&e._legacySnapshot);
            if (leg) { c.recipeSnapshot=leg._legacySnapshot; delete leg._legacySnapshot; dirty=true; }
          }
          Stores.cultures._updateState(c); dirty=true;
        });
        if (dirty) Stores.cultures.save();
      } catch(e) { console.error('[MycoLab] migrateEvents:', e); }
    }
  };

  // VALIDATION
  // ============================================================
  const Validate = {
    _strip(s) { return String(s).replace(/[<>&"'`]/g,''); },
    name(val) {
      const v = this._strip(val||'').trim();
      if (v.length<2) return {valid:false, error:State.lang==='fr'?'Nom trop court (min 2 car.)':'Name too short (min 2 chars)'};
      if (v.length>50) return {valid:false, error:State.lang==='fr'?'Nom trop long (max 50 car.)':'Name too long (max 50 chars)'};
      return {valid:true, value:v};
    },
    density(val) {
      const n = parseFloat(String(val).replace(',','.'));
      if (isNaN(n)||n<=0) return {valid:false, error:State.lang==='fr'?'Densité invalide (> 0)':'Invalid density (> 0)'};
      if (n>5) return {valid:false, error:State.lang==='fr'?'Densité trop élevée (max 5)':'Density too high (max 5)'};
      return {valid:true, value:n};
    },
    ph(val) {
      const n = parseFloat(String(val).replace(',','.'));
      if (isNaN(n)||n<0||n>14) return {valid:false, error:State.lang==='fr'?'pH invalide (0–14)':'Invalid pH (0–14)'};
      return {valid:true, value:n};
    }
  };

  // ============================================================
  // TOAST
  // ============================================================
  const Toast = {
    _el:null,
    _init() {
      if (this._el) return;
      this._el = document.createElement('div');
      this._el.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none';
      document.body.appendChild(this._el);
    },
    show(msg, type='info', dur=3000) {
      this._init();
      const bg = type==='success'?'#2ecc71':type==='error'?'#ff4d4d':'#666';
      const el = document.createElement('div');
      el.textContent = msg;
      el.style.cssText = `background:${bg};color:#fff;padding:10px 16px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:260px;box-shadow:0 4px 12px rgba(0,0,0,.2)`;
      this._el.appendChild(el);
      requestAnimationFrame(()=>el.style.opacity='1');
      setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),220); },dur);
    },
    success(m,d) { this.show(m,'success',d); },
    error(m,d)   { this.show(m,'error',d); },
    info(m,d)    { this.show(m,'info',d); }
  };

  function safeSet(key, value) {
    try { localStorage.setItem(key,value); return true; }
    catch(e) {
      if (e.name==='QuotaExceededError'||e.code===22)
        Toast.error(State.lang==='fr'?'Stockage plein — exporte tes données':'Storage full — export your data');
      return false;
    }
  }

  // ============================================================
  // ANALYTICS — module optionnel (jamais requis pour afficher)
  // ============================================================
  const Analytics = {
    getPhaseDurations(events) {
      try {
        if (!events||events.length<2) return {phases:[],dTotal:null};
        const D=86400000;
        const find  =(...k)=>events.find(e=>k.includes(e.kind));
        const findL =(...k)=>events.slice().reverse().find(e=>k.includes(e.kind));
        const days  =(a,b)=>(a&&b&&b.date>a.date)?Math.round((b.date-a.date)/D):null;
        const d1=days(find('inoculation'),find('colonisation'));
        const d2=days(find('colonisation')||find('inoculation'),find('pinning'));
        const d3=days(find('pinning')||find('colonisation')||find('inoculation'),findL('recolte'));
        const dTotal=days(find('inoculation'),findL('recolte'))??
          (events.length>=2?Math.round((events[events.length-1].date-events[0].date)/D):null);
        const phases=[];
        if(d1!==null)phases.push(`Incub. ${d1}j`);
        if(d2!==null)phases.push(`Culture ${d2}j`);
        if(d3!==null)phases.push(`Culture ${d3}j`);
        return {phases,dTotal};
      } catch(_) { return {phases:[],dTotal:null}; }
    },
    getCultureAge(culture, ref) {
      try { return culture.date_start ? Math.max(0,Math.round((ref-culture.date_start)/86400000)) : 0; }
      catch(_) { return 0; }
    },
    getSummary(culture) {
      const SAFE={ir:null,phases:[],dTotal:null,status:'note',current_temp:null};
      try {
        if (!culture) return SAFE;
        const {phases,dTotal}=this.getPhaseDurations(culture.events||[]);
        return {
          ir:    Utils.calcIR(culture),
          phases, dTotal,
          status:      culture.status||'note',
          current_temp:culture.current_temp!=null?culture.current_temp:null
        };
      } catch(e) { console.error('[MycoLab] getSummary:',e); return SAFE; }
    }
  };

        c.last_event_date = evs.slice().sort((a,b)=>(b.date||0)-(a.date||0))[0]?.date ?? null;
      },
      add(c) { this.data.push(c); this.save(); State.notify(); },
      update(id,newData) {
        const i=this.data.findIndex(c=>c.id===id);
        if(i!==-1){this.data[i]={...this.data[i],...newData};this.save();State.notify();}
      },
      delete(id) { this.data=this.data.filter(c=>c.id!==id); this.save(); State.notify(); },

      // ── Méthodes atomiques — jamais appelées directement, toujours via updateCulture ──
      _addEvent(c, event) {
        if (!Array.isArray(c.events)) c.events=[];
        if (!event.eid) event.eid=`ev_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
        if (event.temp_c!==undefined && event.temperature===undefined) { event.temperature=event.temp_c; delete event.temp_c; }
        delete event.recipeSnapshot; // jamais dans un event
        c.events.push(event);
        c.events.sort((a,b)=>(a.date||0)-(b.date||0));
        this._updateState(c);
      },
      _updateEvent(c, eid, newEv) {
        if (!Array.isArray(c.events)) return;
        const i = c.events.findIndex(e=>e.eid===eid);
        if (i<0) return;
        newEv.eid = eid;
        if (newEv.temp_c!==undefined && newEv.temperature===undefined) { newEv.temperature=newEv.temp_c; delete newEv.temp_c; }
        delete newEv.recipeSnapshot;
        c.events[i] = newEv;
        c.events.sort((a,b)=>(a.date||0)-(b.date||0));
        this._updateState(c);
      },
      _deleteEvent(c, eid) {
        if (!Array.isArray(c.events)) return;
        const i = c.events.findIndex(e=>e.eid===eid);
        if (i<0) return;
        c.events.splice(i,1);
        c.events.sort((a,b)=>(a.date||0)-(b.date||0));
        this._updateState(c);
      },

      /**
       * POINT UNIQUE DE MODIFICATION D'UNE CULTURE.
       * Toutes les mutations passent ici. Garantit : culture trouvée par ID,
       * _updateState appelé, save atomique.
       * @param {string} cultureId
       * @param {'addEvent'|'updateEvent'|'deleteEvent'} action
       * @param {object|string} payload  — event | {eid,ev} | eid
       * @returns {boolean}
       */
      updateCulture(cultureId, action, payload) {
        const c = this.data.find(c=>c.id===cultureId);
        if (!c) { console.warn('[MycoLab] updateCulture: introuvable',cultureId); return false; }
        switch(action) {
          case 'addEvent':    this._addEvent(c, payload);                        break;
          case 'updateEvent': this._updateEvent(c, payload.eid, payload.ev);     break;
          case 'deleteEvent': this._deleteEvent(c, payload);                     break;
          default: console.warn('[MycoLab] updateCulture: action inconnue',action); return false;
        }
        this.save();
        State.notify();
        return true;
      }
    },

    refs: {
      data:{eventTypes:[]},
      save() { safeSet('mycolab_refs_v1',JSON.stringify(this.data)); },
      load() {
        try { const raw=localStorage.getItem('mycolab_refs_v1'); if(raw){this.data=JSON.parse(raw);return;} } catch(_){}
        this.data=this.defaultData(); this.save();
      },
      defaultData() {
        return {eventTypes:Object.entries(PHASE_KINDS).map(([kind,def])=>({id:kind,label:def.label,kind,score:def.score}))};
      },
      addEventType(label) {
        const id=label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
        if(this.data.eventTypes.find(t=>t.id===id)) return id;
        const kind=detectKind(label);
        this.data.eventTypes.push({id,label,kind,score:PHASE_KINDS[kind]?.score||0});
        this.save(); return id;
      },
      deleteEventType(id) {
        if(PHASE_KINDS[id]) return;
        this.data.eventTypes=this.data.eventTypes.filter(t=>t.id!==id);
        this.save(); State.notify();
      }
    }
  };

      const nl = this.lang==='fr'?'en':'fr';
      Stores.ingredients.data.forEach(ing=>{
        const tr=Utils.translateIngredientName(ing.name,nl);
        if(tr!==ing.name){
          const nid=Utils.slugify(tr);
          Stores.recipes.data.forEach(s=>(s.i||[]).forEach(ri=>{if(ri.ingId===ing.id){ri.n=tr;ri.ingId=nid;}}));
          ing.name=tr; ing.id=nid;
        }
      });
      Stores.ingredients.save(); Stores.recipes.save();

      let html='<div class="cultures-list">';
      Stores.cultures.data.forEach(c=>{
        // Analytics — optionnel, try/catch
        let ir=null, phases=[], dTotal=null;
        try { if(typeof Analytics!=='undefined'&&Analytics.getSummary) ({ir,phases,dTotal}=Analytics.getSummary(c)); } catch(_){}
        const irLabel=ir===null?'—':`${ir}%`;

        // Recette — lue exclusivement depuis c.recipeSnapshot (figé à la création)
        const snap=c.recipeSnapshot||null;
        let recipeTag='';
        if(snap){
          const vol=snap.volume!=null?` · ${parseFloat(snap.volume).toFixed(1)}L`:'';
          const temp=snap.temp_c!=null?` · ${snap.temp_c}°C`:'';
          const ingList=(snap.ingredients||[]).length>0
            ?'<div style="margin-top:3px;display:flex;flex-wrap:wrap;gap:4px">'+
              (snap.ingredients||[]).map(ing=>`<span style="font-size:8px;color:var(--sub);font-family:monospace;background:var(--grey);padding:1px 5px">${ing.name} ${(ing.percent||0).toFixed(0)}%</span>`).join('')+'</div>'
            :'';
          recipeTag=`<div style="margin:4px 0"><div style="font-size:9px;color:var(--sub);font-family:monospace">↳ ${Utils.cleanSectionName(snap.sectionName)}${vol}${temp}</div>${ingList}</div>`;
        }

        // Durées de phases
        let dureeHtml='';
        if(dTotal!==null){
          const ps=phases.length?phases.join(' · ')+' — ':'';
          dureeHtml=`<div style="font-size:9px;color:var(--sub);font-style:italic;margin-bottom:4px">⏱ ${ps}Total : ${dTotal}j</div>`;
        }

        // Journal des events — boutons éditer/supprimer (dans Cultures, pas Suivi)
        let evHtml='';
        if(c.events&&c.events.length){
          evHtml='<div style="margin:8px 0 4px 0;border-left:1px solid var(--grey);padding-left:8px">'+dureeHtml+
            c.events.map(ev=>{
              const et=ev.temperature!=null?ev.temperature:ev.temp_c;
              return `<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;line-height:1.6">
                <span style="font-size:10px;color:var(--sub)">${Utils.toDDMMYYYY(ev.date)} : ${ev.type}${et!=null?`<span style="font-size:9px;font-family:monospace;margin-left:5px">(${et}°C)</span>`:''}</span>
                <span style="display:flex;gap:8px;flex-shrink:0;margin-left:8px">
                  <button style="background:none;border:none;padding:0;font-size:9px;font-weight:800;text-transform:uppercase;color:var(--sub);cursor:pointer;text-decoration:underline" onclick="APP.editEventPrompt('${c.id}','${ev.eid}')">éditer</button>
                  <button class="btn-delete" style="font-size:12px" onclick="APP.confirmDeleteEvent('${c.id}','${ev.eid}')">×</button>
                </span>
              </div>`;
            }).join('')+'</div>';
        }

        const age=(typeof Analytics!=='undefined'&&Analytics.getCultureAge)?Analytics.getCultureAge(c,State.getEffectiveDate()):0;
        html+=`<div class="culture-card" data-culture-id="${c.id}">
          <div class="culture-header">
            <div style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1" onclick="APP.editCulture('${c.id}')">
              <span class="culture-name">${c.strain} (${c.generation})</span>
              <span class="culture-id">${c.id}</span>
              ${irLabel!=='—'?`<span style="font-size:11px;font-weight:900;color:var(--danger)">${irLabel}</span>`:''}
            </div>
            <button class="btn-delete" onclick="APP.deleteCulture('${c.id}')" style="color:var(--danger);font-size:18px;line-height:1;flex-shrink:0" aria-label="Supprimer ${c.id}">×</button>
          </div>
          <div class="culture-dates">${L.startDate} : ${Utils.toDDMMYYYY(c.date_start)}</div>
          <div style="font-size:9px;color:var(--sub);margin:1px 0 4px 0;display:flex;gap:10px;flex-wrap:wrap">
            <span>Inoculé il y a ${age} jour(s)</span>
            ${c.status&&c.status!=='note'?`<span style="font-weight:700;text-transform:uppercase;letter-spacing:.3px">${c.status}</span>`:''}
            ${c.current_temp!=null?`<span style="font-family:monospace">${c.current_temp}°C</span>`:''}
          </div>
          ${recipeTag}
          ${evHtml}
          <div class="culture-footer">
            <button class="btn-small" onclick="APP.addQuickEvent('${c.id}')">+ EVENT</button>
            <button class="btn-small" onclick="APP.printCulture('${c.id}')">PDF</button>
          </div>
        </div>`;
      });
      html+=`<button class="btn-add" onclick="APP.addCulturePrompt()">${L.addCulture}</button></div>`;
      document.getElementById('content').innerHTML=html;
    },

    // ── Suivi — LECTURE SEULE — aucune saisie, aucune modification ──
    renderSuivi() {
      const L=LANGS[State.lang];
      if(Stores.cultures.data.length===0){
        document.getElementById('content').innerHTML=`<div style="text-align:center;padding:40px;color:var(--sub)">${L.noCulturesToDisplay}<button class="btn-add" onclick="APP.setView('cultures')">${L.createBatch}</button></div>`;
        return;
      }
      const D=86400000, PX=20;
      const todayTs=new Date().setHours(0,0,0,0);
      const sorted=Stores.cultures.data.slice().sort((a,b)=>a.date_start-b.date_start);
      let startTs=Infinity, endTs=-Infinity;
      sorted.forEach(c=>{
        const s=new Date(c.date_start).setHours(0,0,0,0);
        const led=c.last_event_date?new Date(c.last_event_date).setHours(0,0,0,0):s;
        startTs=Math.min(startTs,s); endTs=Math.max(endTs,led,todayTs);
      });
      startTs-=7*D; endTs+=90*D;
      if((endTs-startTs)/D<365) endTs=startTs+365*D;
      const totalDays=Math.ceil((endTs-startTs)/D), totalWidth=totalDays*PX;
      const days=Array.from({length:totalDays},(_,i)=>({ts:startTs+i*D,dt:new Date(startTs+i*D)}));
      const MA=State.lang==='fr'?['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const mm=[];
      days.forEach(({dt})=>{const k=`${dt.getFullYear()}-${dt.getMonth()}`;if(!mm.length||mm[mm.length-1].key!==k)mm.push({key:k,count:1,year:dt.getFullYear(),month:dt.getMonth()});else mm[mm.length-1].count++;});
      const monthsHTML=mm.map(m=>`<div class="gantt-month-cell" style="width:${m.count*PX}px;min-width:${m.count*PX}px">${MA[m.month]} ${m.year}</div>`).join('');
      const DN=State.lang==='fr'?['Di','Lu','Ma','Me','Je','Ve','Sa']:['Su','Mo','Tu','We','Th','Fr','Sa'];
      const daysHTML=days.map(({ts,dt})=>{
        const it=ts===todayTs, iw=dt.getDay()===0||dt.getDay()===6;
        return `<button class="gantt-day-cell${it?' today':''}${iw?' weekend':''}" style="width:${PX}px;min-width:${PX}px" onclick="APP.showDayLog('${dt.getFullYear()}','${dt.getMonth()}','${dt.getDate()}')"><span class="gantt-day-name">${DN[dt.getDay()]}</span><span class="gantt-day-num">${dt.getDate()}</span></button>`;
      }).join('');
      let namesCells='';
      sorted.forEach(c=>{
        let ir=null; try{ir=Utils.calcIR(c);}catch(_){}
        // Clic → navigateToCulture (lecture seule : aucune modification possible depuis Suivi)
        namesCells+=`<div class="gantt-name-cell" onclick="APP.navigateToCulture('${c.id}')">
          <div class="gantt-name-text">${c.strain}<br><span style="font-weight:400;color:var(--sub);font-size:7px">${c.generation}</span></div>
          ${ir!==null?`<div class="gantt-name-ir">${ir}%</div>`:''}
        </div>`;
      });
      const colGrid=days.map(({ts,dt})=>{const cls=dt.getDay()===1?' week-start':ts===todayTs?' today-col':'';return `<div class="gantt-col-cell${cls}" style="width:${PX}px;min-width:${PX}px"></div>`;}).join('');
      let bodyHTML='';
      sorted.forEach(c=>{
        // Lit c.status (stocké) et c.last_event_date (stocké) — aucun calcul
        const barClass=`ev-${c.status||'note'}`;
        const barStart=new Date(c.date_start).setHours(0,0,0,0);
        const ledTs=c.last_event_date?new Date(c.last_event_date).setHours(0,0,0,0):barStart;
        const barEnd=Math.min(ledTs,todayTs);
        const barLeft=((barStart-startTs)/D)*PX;
        const barW=Math.max(((barEnd-barStart)/D)*PX+PX,PX);
        // Markers : clic → navigateToCulture (pas editEventPrompt — Suivi = lecture seule)
        const markers=(c.events||[]).map(ev=>{
          const evX=((new Date(ev.date).setHours(0,0,0,0)-startTs)/D)*PX+PX/2;
          const kind=ev.kind||'note';
          const et=ev.temperature!=null?ev.temperature:ev.temp_c;
          const tip=`${Utils.toDDMMYYYY(ev.date)} · ${ev.type}${et!=null?' ('+et+'°C)':''}`;
          return `<button class="gantt-marker ${kind}" style="left:${evX}px" data-tip="${tip.replace(/"/g,'&quot;')}" aria-label="${tip.replace(/"/g,'')}" onclick="event.stopPropagation();APP.navigateToCulture('${c.id}')"></button>`;
        }).join('');
        bodyHTML+=`<div class="gantt-body-row">
          ${colGrid}
          <div class="gantt-bars-layer">
            ${barStart<=todayTs&&todayTs<=endTs?`<div class="gantt-today-line" style="left:${((todayTs-startTs)/D)*PX+PX/2}px"></div>`:''}
            <div class="gantt-bar ${barClass}" style="left:${barLeft}px;width:${barW}px" onclick="APP.navigateToCulture('${c.id}')"></div>
            ${markers}
          </div>
        </div>`;
      });
      // Mini-calendrier 28j — lecture seule, showDayLog affiche sans modifier
      const activeDays=new Set();
      Stores.cultures.data.forEach(c=>(c.events||[]).forEach(ev=>{const d=new Date(ev.date);activeDays.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);}));
      let calCells='';
      for(let i=27;i>=0;i--){
        const d=new Date(todayTs-i*D), key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        const act=activeDays.has(key), it=i===0;
        const lbl=d.getDate()===1?`<span style="font-size:7px;display:block;font-weight:900">${d.toLocaleString(State.lang==='fr'?'fr-CH':'en-GB',{month:'short'}).toUpperCase()}</span>${d.getDate()}`:d.getDate();
        calCells+=`<button style="border:${it?'2px solid var(--main)':'1px solid var(--grey)'};padding:4px 2px;text-align:center;font-size:10px;font-weight:700;background:${act?'var(--main)':'transparent'};color:${act?'var(--bg)':'var(--sub)'};line-height:1.3;cursor:${act?'pointer':'default'};width:100%;font-family:inherit" onclick="APP.showDayLog('${d.getFullYear()}','${d.getMonth()}','${d.getDate()}')" ${!act?'tabindex="-1"':''}>${lbl}</button>`;
      }
      document.getElementById('content').innerHTML=`
        <div class="gantt-tooltip" id="gantt-tip"></div>
        <div class="gantt-outer">
          <div class="gantt-names-col"><div class="gantt-names-header">Lots</div>${namesCells}</div>
          <div class="gantt-scroll" id="gantt-scroll">
            <div class="gantt-grid" style="min-width:${totalWidth}px">
              <div class="gantt-months-row">${monthsHTML}</div>
              <div class="gantt-days-row">${daysHTML}</div>
              <div class="gantt-body-rows">${bodyHTML}</div>
            </div>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--sub)">
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#fff;border:1px solid #ccc;display:inline-block"></span>Incubation</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#d1d1d1;display:inline-block"></span>Observation</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#666;display:inline-block"></span>Colonisation</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#2ecc71;display:inline-block"></span>Récolte</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block"></span>Contamination</span>
        </div>
        <div style="padding-top:15px;border-top:1px solid var(--grey)">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--sub);margin-bottom:10px;letter-spacing:.5px">Activité — 28 jours</div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">${['L','M','M','J','V','S','D'].map(x=>`<div style="text-align:center;font-size:8px;font-weight:800;color:var(--sub)">${x}</div>`).join('')}</div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${calCells}</div>
        </div>
        <div id="day-log" style="margin-top:12px"></div>
        <div id="suivi-temps" style="margin-top:0"></div>
      `;
      setTimeout(()=>{const gs=document.getElementById('gantt-scroll');if(gs)gs.scrollLeft=Math.max(0,((todayTs-startTs)/D)*PX-80);},60);
      // Affichage températures récentes — lecture seule depuis culture.events
      (()=>{
        const el=document.getElementById('suivi-temps');
        if(!el)return;
        const rows=[];
        Stores.cultures.data.forEach(cult=>{
          (cult.events||[]).filter(ev=>ev.temperature!=null).forEach(ev=>{
            rows.push({strain:cult.strain,date:ev.date,temp:ev.temperature,kind:ev.kind||'note'});
          });
        });
        rows.sort((a,b)=>b.date-a.date);
        if(!rows.length){el.innerHTML='';return;}
        const html=rows.slice(0,8).map(r=>{
          const pct=Math.max(4,Math.round((r.temp/42)*100));
          const col=r.temp>=28?'var(--danger)':r.temp>=23?'#e07a00':'var(--main)';
          return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0">'+
            '<span style="font-size:8px;color:var(--sub);width:44px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.strain+'</span>'+
            '<span style="font-size:8px;color:var(--sub);width:40px;flex-shrink:0;font-family:monospace">'+Utils.toDDMMYYYY(r.date)+'</span>'+
            '<div style="flex:1;background:var(--grey);height:4px;position:relative"><div style="position:absolute;left:0;top:0;height:4px;width:'+pct+'%;background:'+col+'"></div></div>'+
            '<span style="font-size:10px;font-weight:700;font-family:monospace;color:'+col+';width:36px;text-align:right;flex-shrink:0">'+r.temp+'°C</span>'+
          '</div>';
        }).join('');
        el.innerHTML='<div style="padding-top:12px;border-top:1px solid var(--grey);margin-top:12px">'+
          '<div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--sub);margin-bottom:8px;letter-spacing:.5px">Températures récentes</div>'+
          html+'</div>';
      })();
      const tip=document.getElementById('gantt-tip');
      if(tip){
        document.querySelectorAll('.gantt-marker').forEach(el=>{
          el.addEventListener('mouseenter',()=>{tip.textContent=el.dataset.tip;tip.classList.add('visible');});
          el.addEventListener('mousemove',e=>{tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-28)+'px';});
          el.addEventListener('mouseleave',()=>tip.classList.remove('visible'));
        });
      }
    },

    renderLib() {
      const L=LANGS[State.lang], lb=document.getElementById('lib-list');
      if(!lb) return;
      const u={};
      Stores.recipes.data.forEach(s=>(s.i||[]).forEach(ing=>{const id=ing.ingId||Utils.slugify(ing.n);u[id]=(u[id]||0)+1;}));
      const sorted=Stores.ingredients.data.slice().sort((a,b)=>(u[b.id]||0)-(u[a.id]||0));
      lb.innerHTML=sorted.map(ing=>`<div class="lib-btn" onclick="APP.addIng('${ing.name.replace(/'/g,"\\\'")}')">${ing.name}</div>`).join('')+
        `<div class="lib-btn" style="background:var(--main);color:var(--bg)" onclick="APP.prompt('Item:','',e=>APP.addIng(e))">${L.other}</div>`;
    }
  };

  // ============================================================
  // HELPERS SECTION/ITEM par UID (jamais par index tableau)
  // ============================================================
  function _section(sid)          { return Stores.recipes.data.find(s=>String(s.id)===String(sid))||null; }
  function _sectionIdx(sid)       { return Stores.recipes.data.findIndex(s=>String(s.id)===String(sid)); }
  function _itemByIid(sec,iid)    { return sec&&sec.i?sec.i.find(x=>x.iid===iid):null; }
  function _itemIdxByIid(sec,iid) { return sec&&sec.i?sec.i.findIndex(x=>x.iid===iid):-1; }

  // ============================================================
  // HANDLERS
  // ============================================================
  const Handlers = {

    // ── Recettes ──────────────────────────────────────────────────
    setV(sid,v) { const s=_section(sid);if(!s)return;s.v=v;Stores.recipes.save();State.notify(); },
    addV(sid,v) {
      const s=_section(sid);if(!s)return;
      const vn=parseFloat(String(v).replace(',','.'));
      if(!isFinite(vn)||vn<=0)return;
      s.cv.push(vn);s.v=vn;Stores.recipes.save();State.notify();
    },
    editN(sid,iid,name) { const s=_section(sid);if(!s||!name)return;const it=_itemByIid(s,iid);if(!it)return;it.n=name;Stores.recipes.save();State.notify(); },
    pickIngredient(sid,iid) {
      const s=_section(sid);if(!s)return;const it=_itemByIid(s,iid);if(!it)return;
      const opts=Stores.ingredients.data.map(ing=>`<option value="${ing.id}" ${ing.id===it.ingId?'selected':''}>${ing.name}</option>`).join('');
      Modal.show(`<div style="font-size:12px;font-weight:900;margin-bottom:15px">Choisir l'ingrédient</div><select id="ip-sel" class="modal-input" style="font-size:13px;padding:8px 0;background:transparent;border-bottom:2px solid var(--main);color:var(--main);appearance:none;cursor:pointer">${opts}</select><div class="modal-btn black" id="ip-ok">OK</div><div class="modal-btn" onclick="Modal.close()">ANNULER</div>`);
      document.getElementById('ip-ok').onclick=()=>{
        const nid=document.getElementById('ip-sel').value;
        if(nid){const f=Stores.ingredients.data.find(x=>x.id===nid);const sx=_section(sid);const item=_itemByIid(sx,iid);if(f&&sx&&item){item.ingId=f.id;item.n=f.name;Stores.recipes.save();State.notify();}}
        Modal.close();
      };
    },
    delI(sid,iid) { const s=_section(sid);if(!s)return;s.i=(s.i||[]).filter(x=>x.iid!==iid);Stores.recipes.save();State.notify(); },
    delV(sid,v)   { const s=_section(sid);if(!s)return;s.cv=s.cv.filter(x=>x!==v);if(s.v==v)s.v=s.cv[0]||0.5;Stores.recipes.save();State.notify(); },
    setUnit(u) { State.unitMode=u;State.notify(); },
    togglePct(){ State.unitMode=State.unitMode==='kg'?'L':'kg';State.notify(); },
    editSectionTitle(sid,cur) { Modal.prompt('Titre :',cur,v=>{if(v&&v.trim()){const s=_section(sid);if(s){s.t=v.trim();Stores.recipes.save();State.notify();}}}); },
    updateSectionNote(sid,val) { const s=_section(sid);if(s){s.note=val;Stores.recipes.save();} },
    setTemp(sid) {
      const s=_section(sid);if(!s)return;
      Modal.show(`<div style="font-size:12px;font-weight:900;margin-bottom:15px">Température cible (°C)</div><input type="number" id="ti" class="modal-input" value="${s.temp_c||''}" min="0" max="50" step="0.5" inputmode="decimal" placeholder="ex: 23" oninput="this.value=this.value.replace(',','.');"><div class="modal-btn black" id="ti-ok">OK</div><div class="modal-btn" onclick="Modal.close()">ANNULER</div>`);
      const inp=document.getElementById('ti');inp.focus();inp.select();
      document.getElementById('ti-ok').onclick=()=>{const v=parseFloat(inp.value);if(!isNaN(v)&&v>=0&&v<=40){const sx=_section(sid);if(sx){sx.temp_c=v;Stores.recipes.save();State.notify();}}Modal.close();};
    },
    openRatio(sid,iid) {
      const L=LANGS[State.lang];const s=_section(sid);if(!s)return;const it=_itemByIid(s,iid);if(!it)return;
      const others=(s.i||[]).reduce((a,x)=>a+(x.iid!==iid?x.r:0),0)/10;
      const avail=Math.max(0,100-others);
      Modal.show(`<div style="font-size:12px;font-weight:900;margin-bottom:15px">${it.n}</div><div class="modal-label">Pourcentage (%)</div><input type="number" id="ri" class="modal-input" value="${(it.r/10).toFixed(1)}" min="0" max="100" step="0.1" inputmode="decimal" style="margin-bottom:20px" oninput="this.value=this.value.replace(',','.');"><div class="modal-btn black" id="ri-ok">OK</div><div class="modal-btn" onclick="APP.setR('${sid}','${iid}',${avail}); Modal.close();">${L.equi} (${avail.toFixed(1)}%)</div><div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>`);
      const inp=document.getElementById('ri');inp.focus();inp.select();
      document.getElementById('ri-ok').onclick=()=>{const v=parseFloat(inp.value);if(!isNaN(v)&&v>=0&&v<=100)APP.setR(sid,iid,v);else Modal.close();};
    },
    setR(sid,iid,pct) {
      try{const v=parseFloat(pct);if(v==null||isNaN(v)||v<0||v>100){Modal.close();return;}const s=_section(sid);if(!s){Modal.close();return;}const it=_itemByIid(s,iid);if(!it){Modal.close();return;}it.r=Math.round(v*10);Stores.recipes.save();State.notify();}catch(_){}Modal.close();
    },
    addIng(name) {
      if(!name)return;
      const s=_section(State.activeCat);if(!s)return;
      if(!s.i)s.i=[];
      let ing=Stores.ingredients.findByName(name);
      if(!ing){const id=Utils.slugify(name);const ni={id,name,density:null,ph:null,notes:''};Stores.ingredients.data.push(ni);Stores.ingredients.save();ing=ni;}
      const isp=ing.density!=null&&ing.density>0.3;
      const u=name.toLowerCase().match(/meudon|gypse|chaux|chalk|lime|gypsum|malt|agar/)?'cs':isp?'cs':'vol';
      s.i.push({n:name,ingId:ing.id,iid:Utils.uid(),r:0,u});

    printCulture(id) {
      const c=Stores.cultures.data.find(c=>c.id===id);if(!c)return;
      const ir=Utils.calcIR(c), iw=State.unitMode==='kg', snap=c.recipeSnapshot||null;
      let ingRows='';
      if(snap){
        const vol=snap.volume||0;
        const vd=iw?(()=>{const g=Math.round(vol*1000);return g>=1000?`${(g/1000).toFixed(2)} kg`:`${g} g`;})():`${vol.toFixed(2)} L`;
        ingRows+=`<tr><td colspan="3" style="padding:8px 0 2px"><div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px">${Utils.cleanSectionName(snap.sectionName)}</div><div style="font-size:13px;font-weight:900;margin:3px 0 4px;border-bottom:1px solid #000;padding-bottom:4px">OBJECTIF : <span style="font-size:16px">${vd}</span></div></td></tr>`;

          const vi=(ing.percent||0)*(snap.volume||1)/100;
          let vs='';
          if(ing.unit==='cs'||ing.unit==='cc'){const ml=ing.unit==='cs'?15:5;const dn=(ing.density&&ing.density>0)?ing.density:1.2;vs=`${Math.round(vi*1000/ml*ml*dn)}g`;}
          else if(iw){const dn=(ing.density&&ing.density>0)?ing.density:1.0;const g=Math.round(vi*dn*1000);vs=g>=1000?`${(g/1000).toFixed(2)}kg`:`${g}g`;}
          else vs=`${vi.toFixed(2)}L`;
          ingRows+=`<tr><td style="padding:2px 0">${ing.name}</td><td style="text-align:center;color:#777">${(ing.percent||0).toFixed(1)}%</td><td style="text-align:right;font-weight:700">${vs}</td></tr>`;
        });
      }
      const evRows=(c.events||[]).map(ev=>{const et=ev.temperature!=null?ev.temperature:ev.temp_c;return `<tr><td style="padding:2px 0;color:#555">${Utils.toDDMMYYYY(ev.date)}</td><td colspan="2">${ev.type}${et!=null?` (${et}°C)`:''}</td></tr>`;}).join('');
      const age=((typeof Analytics!=='undefined'&&Analytics.getCultureAge)?Analytics.getCultureAge(c,new Date()):0)+'j';
      const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>MycoLab — ${c.id}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;color:#111;padding:12mm 14mm;line-height:1.4}h1{font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:2px;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:8px}.meta{display:flex;gap:16px;margin-bottom:10px;font-size:9px;color:#555;text-transform:uppercase}.meta strong{color:#000}table{width:100%;border-collapse:collapse;margin-bottom:10px}th{font-size:8px;text-transform:uppercase;color:#777;border-bottom:1px solid #ccc;padding:2px 0;text-align:left}th:nth-child(2){text-align:center}th:nth-child(3){text-align:right}.notes{border-left:2px solid #ddd;padding:4px 8px;font-size:9px;color:#555;margin-top:8px;white-space:pre-wrap}.footer{margin-top:12px;font-size:8px;color:#bbb;text-align:right}@page{size:A4;margin:0}@media print{body{padding:12mm 14mm}}</style></head><body><h1>MycoLab</h1><div class="meta"><span><strong>${c.strain}</strong> (${c.generation})</span><span>Lot : <strong>${c.id}</strong></span><span>Début : <strong>${Utils.toDDMMYYYY(c.date_start)}</strong></span><span>Âge : <strong>${age}</strong></span>${ir!==null?`<span>IR : <strong style="color:#c00">${ir}%</strong></span>`:''}<span>Unité : <strong>${iw?'Poids':'Volume'}</strong></span></div>${ingRows?`<div style="margin-bottom:8px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:3px">Recette</div><table><thead><tr><th>Ingrédient</th><th>%</th><th>${iw?'Poids':'Volume'}</th></tr></thead><tbody>${ingRows}</tbody></table></div>`:''}${evRows?`<div style="margin-bottom:8px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:3px">Journal</div><table><thead><tr><th>Date</th><th colspan="2">Événement</th></tr></thead><tbody>${evRows}</tbody></table></div>`:''}${c.notes?`<div class="notes">${c.notes}</div>`:''}<div class="footer">MycoLab v${APP_VERSION} — ${new Date().toLocaleDateString('fr-CH')}</div></body></html>`;
      const w=window.open('','_blank','width=800,height=600');w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),400);
    },

    // ── Sauvegarde ────────────────────────────────────────────────
    openSaveModal() {
      const L=LANGS[State.lang],snap=!!localStorage.getItem('mycolab_snapshot');
      Modal.show(`<div class="modal-btn black" onclick="APP.downloadBackup()">${L.save}</div><div class="modal-btn" onclick="APP.uploadBackup()">${L.restore}</div><div class="modal-btn" onclick="window.print()">${L.pdf}</div><div class="modal-btn" onclick="APP.copyRawJSON()">Copier les données</div><div class="modal-btn" onclick="Modal.close()">${L.cancel}</div><div style="font-size:8px;color:var(--sub);margin-top:8px;line-height:1.5">Format : <code style="font-family:monospace">{cultures:[],recipes:[],ingredients[]}</code></div><div style="font-size:9px;color:var(--sub);text-align:center;margin-top:6px;text-transform:uppercase">Snapshot : ${snap?'● Actif':'○ Inactif'}</div>`);
    },
    copyRawJSON() {
      try {
        const data={cultures:JSON.parse(localStorage.getItem('mycolab_cultures_v1')||'[]'),recipes:JSON.parse(localStorage.getItem('mycolab_recipes_v1')||'[]'),ingredients:JSON.parse(localStorage.getItem('mycolab_ingredients_v1')||'[]'),refs:JSON.parse(localStorage.getItem('mycolab_refs_v1')||'{}'),exportedAt:new Date().toISOString(),version:APP_VERSION};
        navigator.clipboard.writeText(JSON.stringify(data,null,2)).then(()=>Toast.success(State.lang==='fr'?'Données copiées':'Data copied'));
      } catch(e){Modal.show(`<div style="font-weight:900;margin-bottom:10px">Erreur</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">${e.message}</div><div class="modal-btn" onclick="Modal.close()">OK</div>`);}
    },
    downloadBackup() {
      try {
        const b={version:APP_VERSION,exportedAt:new Date().toISOString(),recipes:Stores.recipes.data,ingredients:Stores.ingredients.data,cultures:Stores.cultures.data,refs:Stores.refs.data};
        const url=URL.createObjectURL(new Blob([JSON.stringify(b,null,2)],{type:'application/json'}));
        const a=document.createElement('a');a.href=url;a.download=`mycolab_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
        Toast.success(State.lang==='fr'?'Sauvegarde téléchargée':'Backup downloaded');
      } catch(e){Modal.show(`<div style="font-weight:900;margin-bottom:10px">Erreur d'export</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">${e.message}</div><div class="modal-btn" onclick="Modal.close()">FERMER</div>`);}
      Modal.close();
    },
    uploadBackup() {
      const inp=document.createElement('input');inp.type='file';inp.accept='.json';
      inp.onchange=e=>{
        const file=e.target.files[0];if(!file)return;
        const r=new FileReader();
        r.onload=ev=>{
          try {
            const data=JSON.parse(ev.target.result);
            if(!['recipes','ingredients','cultures'].every(k=>!(k in data)||Array.isArray(data[k])))throw new Error('Structure invalide');
            if(Array.isArray(data.recipes)){Stores.recipes.data=data.recipes;Stores.recipes.save();}
            if(Array.isArray(data.ingredients)){Stores.ingredients.data=data.ingredients;Stores.ingredients.save();}
            if(Array.isArray(data.cultures)){Stores.cultures.data=data.cultures;Stores.cultures.save();}
            if(data.refs&&data.refs.eventTypes){Stores.refs.data=data.refs;Stores.refs.save();}
            Utils.migrateRecipeIngIds();Utils.migrateEvents();State.notify();Modal.close();
            Toast.success(State.lang==='fr'?'Restauration réussie':'Backup restored');
          } catch(err){Modal.show(`<div style="font-weight:900;margin-bottom:10px">Restauration impossible</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">${err.message}</div><div class="modal-btn" onclick="Modal.close()">FERMER</div>`);}
        };
        r.readAsText(file);
      };
      inp.click();
    },

    setTemp:Handlers.setTemp, openRatio:Handlers.openRatio, setR:Handlers.setR,
    addIng:Handlers.addIng, addRecipeSection:Handlers.addRecipeSection, confirmDelSection:Handlers.confirmDelSection,
    startP:Handlers.startP, endP:Handlers.endP, confirmDel:Handlers.confirmDel, delV:Handlers.delV,
    addIngredientPrompt:Handlers.addIngredientPrompt, editIngredient:Handlers.editIngredient, deleteIngredient:Handlers.deleteIngredient,
    addCulturePrompt:Handlers.addCulturePrompt, editCulture:Handlers.editCulture, deleteCulture:Handlers.deleteCulture,
    addQuickEvent:Handlers.addQuickEvent, addEventToCulture:Handlers.addEventToCulture,
    editEventPrompt:Handlers.editEventPrompt, deleteEvent:Handlers.deleteEvent, confirmDeleteEvent:Handlers.confirmDeleteEvent,
    promptAddEvent:Handlers.promptAddEvent, showCultureDetails:Handlers.showCultureDetails,
    showDayLog:Handlers.showDayLog, printCulture:Handlers.printCulture, addRefEventType:Handlers.addRefEventType,
    openSaveModal:Handlers.openSaveModal, copyRawJSON:Handlers.copyRawJSON,
    downloadBackup:Handlers.downloadBackup, uploadBackup:Handlers.uploadBackup,
    navigateToCulture:Handlers.navigateToCulture, setView:Handlers.setView,
    toggleDarkMode:Handlers.toggleDarkMode, toggleLang:Handlers.toggleLang,
    setAuthor:Handlers.setAuthor, pickDate:Handlers.pickDate,
    openDrawer:Handlers.openDrawer, toggleDrawer:Handlers.toggleDrawer,
    prompt:Handlers.prompt, saveRecipes:Handlers.saveRecipes,
    render:()=>Renderer.render(),
    get recipes() { return Stores.recipes.data; },
    get state() {
      return {
        get activeCat(){return State.activeCat;}, set activeCat(v){State.activeCat=v;},
        get author(){return State.author;}, set author(v){State.author=v;}
      };
    }
  };

  // ============================================================
  // INITIALISATION
  // ============================================================
  function init() {
    try {
      State.load();
      Stores.recipes.load();
      Stores.ingredients.load();
      Stores.cultures.load();
      Stores.refs.load();
      Utils.migrateRecipeIngIds();
      Utils.migrateEvents();
      State.subscribe(()=>Renderer.render());
      const nav=document.querySelector('.tabs-nav');
      if(nav)nav.addEventListener('click',e=>{
        const tab=e.target.closest('.tab-view');
        if(tab&&tab.dataset.view){e.preventDefault();e.stopPropagation();State.setView(tab.dataset.view);}
      });
      if(State.dark)document.body.classList.add('dark-mode');
      Renderer.render();
    } catch(e) {
      console.error('[MycoLab] init:',e);
      const rc=localStorage.getItem('mycolab_cultures_v1')||localStorage.getItem('mycolab_snapshot')||'[]';
      const rr=localStorage.getItem('mycolab_recipes_v1')||'[]';
      const ri=localStorage.getItem('mycolab_ingredients_v1')||'[]';
      window._emergencyData=JSON.stringify({cultures:rc,recipes:rr,ingredients:ri},null,2);
      document.getElementById('content').innerHTML=`
        <div style="padding:30px;text-align:center">
          <div style="font-size:14px;font-weight:900;color:var(--danger);margin-bottom:8px">Erreur de démarrage</div>
          <div style="font-size:11px;color:var(--sub);margin-bottom:24px">Tes données sont intactes. Télécharge-les avant de réinitialiser.</div>
          <button class="btn-add" style="margin-bottom:10px" onclick="const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(window._emergencyData);a.download='mycolab_rescue_'+new Date().toISOString().slice(0,10)+'.json';a.click()">⬇ Télécharger mes données</button>
          <button class="btn-add" style="margin-bottom:10px" onclick="const s=localStorage.getItem('mycolab_snapshot');if(s){localStorage.setItem('mycolab_cultures_v1',s);location.reload();}else{document.getElementById('snap-msg').style.display='block';}">↩ Restaurer depuis snapshot</button>
          <div id="snap-msg" style="display:none;font-size:10px;color:var(--danger);margin-bottom:10px">Aucun snapshot disponible.</div>
          <button class="btn-add" style="color:var(--danger);border-color:var(--danger)" onclick="if(confirm('Effacer toutes les données ?')){localStorage.clear();location.reload()}">Réinitialiser</button>
        </div>`;
    }
  }

  init();
})();
</script>
</body>
</html>

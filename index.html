              <span class="culture-id">${c.id}</span>
              ${irLabel !== '—' ? `<span style="font-size:11px;font-weight:900;color:var(--danger)">${irLabel}</span>` : ''}
            </div>
            <button class="btn-delete" onclick="APP.deleteCulture('${c.id}')" style="color:var(--danger);font-size:18px;line-height:1;flex-shrink:0" aria-label="Supprimer la culture ${c.id}">×</button>
          </div>
          <div class="culture-dates">${L.startDate} : ${Utils.toDDMMYYYY(c.date_start)}</div>
          <div style="font-size:9px;color:var(--sub);margin:1px 0 4px 0">
            Inoculé il y a ${Analytics.getCultureAge(c, State.getEffectiveDate())} jour(s)
          </div>
          ${recipeTag}
          ${evHtml}
          <div class="culture-footer">
            <button class="btn-small" onclick="APP.addQuickEvent('${c.id}')">+ EVENT</button>
            <button class="btn-small" onclick="APP.printCulture('${c.id}')">PDF</button>
          </div>
        </div>`;
      });
      html += `<button class="btn-add" onclick="APP.addCulturePrompt()">${L.addCulture}</button></div>`;
      document.getElementById('content').innerHTML = html;
    },
    renderSuivi() {
      const L   = LANGS[State.lang];
      if(Stores.cultures.data.length === 0) {
        document.getElementById('content').innerHTML = `<div style="text-align:center;padding:40px;color:var(--sub)">${L.noCulturesToDisplay}<button class="btn-add" onclick="APP.setView('cultures')">${L.createBatch}</button></div>`;
        return;
      }

      const D      = 86400000;
      const PX     = 20;   // px per day — ~14 jours visibles
      const loc    = State.lang === 'fr' ? 'fr-CH' : 'en-GB';
      const todayTs = new Date().setHours(0,0,0,0);
      const sorted  = [...Stores.cultures.data].sort((a,b) => a.date_start - b.date_start);

      // ── Plage : 7j avant le plus ancien lot, min 365j, 90j après le dernier ──
      let startTs = Infinity, endTs = -Infinity;
      sorted.forEach(c => {
        const s = new Date(c.date_start).setHours(0,0,0,0);
        const lastEvTs = c.events.length
          ? new Date(c.events[c.events.length-1].date).setHours(0,0,0,0)
          : s;
        startTs = Math.min(startTs, s);
        endTs   = Math.max(endTs, lastEvTs, todayTs);
      });
      startTs -= 7 * D;            // 7 jours de marge à gauche
      endTs   += 90 * D;           // 90 jours après le dernier événement
      // Minimum 365 jours pour pouvoir défiler sur l'année
      if((endTs - startTs) / D < 365) endTs = startTs + 365 * D;
      const totalDays  = Math.ceil((endTs - startTs) / D);
      const totalWidth = totalDays * PX;

      // ── Tableau des jours ──────────────────────────────────────────
      const days = Array.from({ length: totalDays }, (_, i) => {
        const ts = startTs + i * D;
        return { ts, dt: new Date(ts) };
      });

      // ── Ligne des mois : libellés abrégés, fond blanc ─────────────
      const MONTH_ABBR = State.lang === 'fr'
        ? ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']
        : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const monthMap = [];
      days.forEach(({ dt }) => {
        const mk = `${dt.getFullYear()}-${dt.getMonth()}`;
        if(!monthMap.length || monthMap[monthMap.length-1].key !== mk)
          monthMap.push({ key: mk, count: 1, year: dt.getFullYear(), month: dt.getMonth() });
        else
          monthMap[monthMap.length-1].count++;
      });
      const monthsHTML = monthMap.map(m => {
        const lbl = `${MONTH_ABBR[m.month]} ${m.year}`;
        return `<div class="gantt-month-cell" style="width:${m.count*PX}px;min-width:${m.count*PX}px">${lbl}</div>`;
      }).join('');

      // ── Ligne des jours : numéro + abréviation jour ───────────────
      const DAY_NAMES = State.lang === 'fr'
        ? ['Di','Lu','Ma','Me','Je','Ve','Sa']
        : ['Su','Mo','Tu','We','Th','Fr','Sa'];
      const daysHTML = days.map(({ ts, dt }) => {
        const isToday   = ts === todayTs;
        const isWeekend = dt.getDay() === 0 || dt.getDay() === 6;
        return `<button class="gantt-day-cell${isToday?' today':''}${isWeekend?' weekend':''}"
          style="width:${PX}px;min-width:${PX}px"
          onclick="APP.showDayLog('${dt.getFullYear()}','${dt.getMonth()}','${dt.getDate()}')"
        ><span class="gantt-day-name">${DAY_NAMES[dt.getDay()]}</span><span class="gantt-day-num">${dt.getDate()}</span></button>`;
      }).join('');

      // ── Colonne des noms (fixe gauche) ────────────────────────────
      let namesCells = '';
      sorted.forEach(c => {
        const ir = Utils.calcIR(c);
        namesCells += `<div class="gantt-name-cell" onclick="APP.showCultureDetails('${c.id}')">
          <div class="gantt-name-text">${c.strain}<br><span style="font-weight:400;color:var(--sub);font-size:7px">${c.generation}</span></div>
          ${ir !== null ? `<div class="gantt-name-ir">${ir}%</div>` : ''}
        </div>`;
      });

      // ── Rangées des lots ──────────────────────────────────────────
      // Grille de fond partagée (générée une seule fois)
      const colGrid = days.map(({ ts, dt }) => {
        const cls = dt.getDay() === 1 ? ' week-start' : ts === todayTs ? ' today-col' : '';
        return `<div class="gantt-col-cell${cls}" style="width:${PX}px;min-width:${PX}px"></div>`;
      }).join('');

      let bodyHTML = '';
      sorted.forEach(c => {
        const ir       = Utils.calcIR(c);
        // Couleur de barre = dernier état enregistré
        const lastKind = c.events.length ? (c.events[c.events.length-1].kind || 'note') : 'note';
        const barClass = `ev-${lastKind}`;
        const barStart = new Date(c.date_start).setHours(0,0,0,0);
        const lastEv   = c.events.length
          ? new Date(c.events[c.events.length-1].date).setHours(0,0,0,0)
          : barStart;
        const barEnd   = Math.min(lastEv, todayTs);
        const barLeft  = ((barStart - startTs) / D) * PX;
        const barW     = Math.max(((barEnd - barStart) / D) * PX + PX, PX);

        const markers = c.events.map((ev, evi) => {
          const evX    = ((new Date(ev.date).setHours(0,0,0,0) - startTs) / D) * PX + PX/2;
          const kind   = ev.kind || 'note';
          const tipTxt = `${Utils.toDDMMYYYY(ev.date)} · ${ev.type}${ev.temp_c != null ? ' ('+ev.temp_c+'°C)' : ''}`;
          return `<button class="gantt-marker ${kind}"
            style="left:${evX}px"
            data-tip="${tipTxt.replace(/"/g,'&quot;')}"
            aria-label="${tipTxt.replace(/"/g,'')}"
            onclick="event.stopPropagation();APP.editEventPrompt('${c.id}',${evi})"
          ></button>`;
        }).join('');

        bodyHTML += `<div class="gantt-body-row">
          ${colGrid}
          <div class="gantt-bars-layer">
            ${((barStart <= todayTs && todayTs <= endTs) ? `<div class="gantt-today-line" style="left:${((todayTs - startTs)/D)*PX + PX/2}px"></div>` : '')}
            <div class="gantt-bar ${barClass}" style="left:${barLeft}px;width:${barW}px"
              onclick="APP.showCultureDetails('${c.id}')"></div>
            ${markers}
          </div>
        </div>`;
      });

      // ── Calendrier d'activité 28j ─────────────────────────────────
      const activeDays = new Set();
      Stores.cultures.data.forEach(c =>
        (c.events||[]).forEach(ev => {
          const d = new Date(ev.date);
          activeDays.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
        })
      );
      let calCells = '';
      for(let i = 27; i >= 0; i--) {
        const d   = new Date(todayTs - i*D);
        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        const active = activeDays.has(key);
        const isToday = i === 0;
        const lbl = d.getDate() === 1
          ? `<span style="font-size:7px;display:block;font-weight:900">${d.toLocaleString(loc,{month:'short'}).toUpperCase()}</span>${d.getDate()}`
          : d.getDate();
        calCells += `<button
          style="border:${isToday?'2px solid var(--main)':'1px solid var(--grey)'};padding:4px 2px;text-align:center;font-size:10px;font-weight:700;background:${active?'var(--main)':'transparent'};color:${active?'var(--bg)':'var(--sub)'};line-height:1.3;cursor:${active?'pointer':'default'};width:100%;font-family:inherit"
          onclick="APP.showDayLog('${d.getFullYear()}','${d.getMonth()}','${d.getDate()}')"
          ${!active ? 'tabindex="-1"' : ''}
        >${lbl}</button>`;
      }

      document.getElementById('content').innerHTML = `
        <div class="gantt-tooltip" id="gantt-tip"></div>
        <div class="gantt-outer">
          <div class="gantt-names-col">
            <div class="gantt-names-header">Lots</div>
            ${namesCells}
          </div>
          <div class="gantt-scroll" id="gantt-scroll">
            <div class="gantt-grid" style="min-width:${totalWidth}px">
              <div class="gantt-months-row">${monthsHTML}</div>
              <div class="gantt-days-row">${daysHTML}</div>
              <div class="gantt-body-rows">${bodyHTML}</div>
            </div>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--sub)">
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#fff;border:1px solid #ccc;display:inline-block"></span>Incubation</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#d1d1d1;display:inline-block"></span>Observation</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#666;display:inline-block"></span>Colonisation</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#2ecc71;display:inline-block"></span>Récolte</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block"></span>Contamination</span>
        </div>
        <div style="padding-top:15px;border-top:1px solid var(--grey)">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--sub);margin-bottom:10px;letter-spacing:.5px">Activité — 28 jours</div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
            ${['L','M','M','J','V','S','D'].map(d=>`<div style="text-align:center;font-size:8px;font-weight:800;color:var(--sub)">${d}</div>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${calCells}</div>
        </div>
        <button class="btn-add" style="margin-top:16px" onclick="APP.promptAddEvent()">${L.addEvent}</button>
        <div id="day-log" style="margin-top:12px"></div>
      `;

      // Auto-scroll vers aujourd'hui — délai pour laisser le navigateur rendre la grille
      setTimeout(() => {
        const gs = document.getElementById('gantt-scroll');
        if(gs) gs.scrollLeft = Math.max(0, ((todayTs - startTs)/D)*PX - 80);
      }, 60);

      // Tooltips
      const tip = document.getElementById('gantt-tip');
      if(tip) {
        document.querySelectorAll('.gantt-marker').forEach(el => {
          el.addEventListener('mouseenter', () => { tip.textContent = el.dataset.tip; tip.classList.add('visible'); });
          el.addEventListener('mousemove', e => { tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-28)+'px'; });
          el.addEventListener('mouseleave', () => tip.classList.remove('visible'));
        });
      }
    },
        renderLib() {
      const L = LANGS[State.lang];
      const libDiv = document.getElementById('lib-list');
      const usage = this.getIngredientUsage();
      const sorted = [...Stores.ingredients.data].sort((a,b) => {
        const ua = usage[a.id] || 0;
        const ub = usage[b.id] || 0;
        return ub - ua;
      });
      libDiv.innerHTML = sorted.map(ing => `<div class="lib-btn" onclick="APP.addIng('${ing.name}')">${ing.name}</div>`).join('') +
        `<div class="lib-btn" style="background:var(--main);color:var(--bg)" onclick="APP.prompt('Item:','',e=>APP.addIng(e))">${L.other}</div>`;
    },
    getIngredientUsage() {
      const usage = {};
      Stores.recipes.data.forEach(section => {
        section.g.forEach(group => {
          group.i.forEach(ing => {
            const id = Utils.slugify(ing.n);
            usage[id] = (usage[id] || 0) + 1;
          });
        });
      });
      return usage;
    }
  };

  // ============================================================
  // SECTION 7 — EVENT HANDLERS
  // All user-triggered actions. Handlers mutate Stores or State,
  // never the DOM directly. DOM updates flow via State.notify()
  // → Renderer.render().
  // ============================================================

  // ---------- 7. HANDLERS (appelés depuis le HTML) ----------
  const Handlers = {
    setV(s, v) { Stores.recipes.data[s].v = v; Stores.recipes.save(); State.notify(); },
    addV(s, v) { if(v && !isNaN(v)){ Stores.recipes.data[s].cv.push(parseFloat(v)); Stores.recipes.data[s].v=parseFloat(v); Stores.recipes.save(); State.notify(); } },
    setT(s, g) { State.gIdx[s] = g; State.notify(); },
    addT(s, name) { if(name){ Stores.recipes.data[s].g.push({n:name,i:[]}); State.gIdx[s]=Stores.recipes.data[s].g.length-1; Stores.recipes.save(); State.notify(); } },
    delT(s, g) { if(Stores.recipes.data[s].g.length>1){ Stores.recipes.data[s].g.splice(g,1); State.gIdx[s]=0; Stores.recipes.save(); State.notify(); } },
    editN(s, i, name) { if(name){ Stores.recipes.data[s].g[State.gIdx[s]].i[i].n = name; Stores.recipes.save(); State.notify(); } },
    /** Open an ingredient picker modal — locked to existing Stores.ingredients entries */
    pickIngredient(s, i) {
      const current = Stores.recipes.data[s].g[State.gIdx[s]].i[i].n;
      const opts = Stores.ingredients.data.map(ing =>
        `<option value="${ing.name}" ${ing.name===current?'selected':''}>${ing.name}</option>`
      ).join('');
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">Choisir l'ingrédient</div>
        <select id="ing-pick" class="modal-input" style="font-size:13px;padding:8px 0;background:transparent;border-bottom:2px solid var(--main);color:var(--main);appearance:none;cursor:pointer">${opts}</select>
        <div class="modal-btn black" id="ing-pick-ok">OK</div>
        <div class="modal-btn" onclick="Modal.close()">ANNULER</div>
      `);
      document.getElementById('ing-pick-ok').onclick = () => {
        const newName = document.getElementById('ing-pick').value;
        if(newName) Handlers.editN(s, i, newName);
        Modal.close();
      };
    },
    /** Création d'un nouveau type d'événement dans le référentiel, depuis la modale événement */
    addRefEventType() {
      Modal.prompt('Nouveau type :', '', label => {
        const trimmed = label.trim();
        if(!trimmed) return;
        Stores.refs.addEventType(trimmed);
        // Re-ouvre la modale eventForm pour refléter le nouveau chip
        // On déclenche simplement un re-render de la modale courante
        State.notify();
      });
    },
    /** Affiche les logs d'un jour sélectionné dans le calendrier */
    showDayLog(year, month, day) {
      const el = document.getElementById('day-log');
      if(!el) return;
      const events = [];
      Stores.cultures.data.forEach(c => {
        (c.events || []).forEach((ev, idx) => {
          const d = new Date(ev.date);
          if(String(d.getFullYear())===String(year) && String(d.getMonth())===String(month) && String(d.getDate())===String(day)) {
            events.push({ c, ev, idx });
          }
        });
      });
      if(!events.length) { el.innerHTML = ''; return; }
      const rows = events.map(({c, ev, idx}) =>
        `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--grey)">
          <div>
            <span style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--sub);margin-right:6px">${c.strain}</span>
            <span style="font-size:11px">${ev.type}</span>
            ${ev.temp_c != null ? `<span style="font-size:9px;color:var(--sub);margin-left:6px">${ev.temp_c}°C</span>` : ''}
          </div>
          <button style="background:none;border:none;font-size:9px;font-weight:800;color:var(--sub);cursor:pointer;text-decoration:underline" onclick="APP.editEventPrompt('${c.id}',${idx})">éditer</button>
        </div>`
      ).join('');
      const d = new Date(parseInt(year), parseInt(month), parseInt(day));
      el.innerHTML = `<div style="border-top:1px solid var(--grey);padding-top:10px;margin-top:4px"><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--sub);margin-bottom:6px">${Utils.toDDMMYYYY(d.getTime())} — ${events.length} événement(s)</div>${rows}</div>`;
    },
    /** Bascule globale L ↔ kg — même logique que toggleLang */
    setUnit(unit) { State.unitMode = unit; State.notify(); },
    /** Legacy */
    togglePct() { State.unitMode = State.unitMode === 'kg' ? 'L' : 'kg'; State.notify(); },
    /** Edit température cible d'une section de recette */
    setTemp(s) {
      const current = Stores.recipes.data[s].temp_c || '';
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">Température cible (°C)</div>
        <input type="number" id="temp-input" class="modal-input" value="${current}" min="0" max="50" step="0.5" inputmode="decimal" placeholder="ex: 23">
        <div class="modal-btn black" id="temp-ok">OK</div>
        <div class="modal-btn" onclick="Modal.close()">ANNULER</div>
      `);
      const inp = document.getElementById('temp-input');
      inp.focus(); inp.select();
      document.getElementById('temp-ok').onclick = () => {
        const val = parseFloat(inp.value);
        try {
          if(!isNaN(val) && val >= 0 && val <= 40) {
            Stores.recipes.data[s].temp_c = val;
            Stores.recipes.save();
            State.notify();
          }
        } catch(e) { console.error('[MycoLab] setTemp failed:', e); }
        Modal.close();
      };
    },
    delI(s, i) { Stores.recipes.data[s].g[State.gIdx[s]].i.splice(i,1); Stores.recipes.save(); State.notify(); },
    openRatio(s, i) {
      const L = LANGS[State.lang];
      const group = Stores.recipes.data[s].g[State.gIdx[s]];
      const ing = group.i[i];
      const others = group.i.reduce((a,it,idx)=>a+(idx!==i?it.r:0),0)/10;
      const avail = Math.max(0, 100-others);
      const current = (ing.r/10).toFixed(1);
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">${ing.n}</div>
        <div class="modal-label">Pourcentage (%)</div>
        <input type="number" id="ratio-input" class="modal-input" value="${current}" min="0" max="100" step="0.1" style="margin-bottom:20px">
        <div class="modal-btn black" id="ratio-ok">OK</div>
        <div class="modal-btn" onclick="APP.setR(${s},${i},${avail}); Modal.close();">${L.equi} (${avail.toFixed(1)}%)</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);
      const input = document.getElementById('ratio-input');
      input.focus(); input.select();
      document.getElementById('ratio-ok').onclick = () => {
        const val = parseFloat(input.value);
        if(!isNaN(val) && val >= 0 && val <= 100) APP.setR(s, i, val);
        else Modal.close();
      };
    },
    // LOGIQUE MÉTIER — Mise à jour du ratio d'un ingrédient (0-100%)
    setR(s, i, percent) {
      try {
        const val = parseFloat(percent);
        if(val == null || isNaN(val) || val < 0 || val > 100) { Modal.close(); return; }
        Stores.recipes.data[s].g[State.gIdx[s]].i[i].r = Math.round(val * 10);
        Stores.recipes.save();
        State.notify();
      } catch(e) {
        console.error('[MycoLab] setR failed:', e);
      }
      Modal.close();
    },
    addIng(name) {
      if(!name) return;
      // Guard : activeCat doit pointer sur une section valide
      const catIdx = State.activeCat;
      if(catIdx < 0 || catIdx >= Stores.recipes.data.length) return;
      const section = Stores.recipes.data[catIdx];
      const grpIdx  = State.gIdx[catIdx] || 0;
      if(!section.g[grpIdx]) return;

      let ing = Stores.ingredients.findByName(name);
      if(!ing) {
        const id = Utils.slugify(name);
        const newIng = { id, name, density: null, ph: null, notes: '' };
        Stores.ingredients.data.push(newIng);
        Stores.ingredients.save();
        ing = newIng;
      }
      const isPowder = ing.density != null && ing.density > 0.3;
      const type = name.toLowerCase().match(/meudon|gypse|chaux|chalk|lime|gypsum|malt|agar/) ? 'cs'
                  : isPowder ? 'cs' : 'vol';
      section.g[grpIdx].i.push({ n: name, ingId: ing.id, r: 0, u: type });
      Stores.recipes.save();
      State.notify();
      document.getElementById('drawer').classList.remove('open');
    },
    startP(e, type, data) {
      if(State.pressTimer) clearTimeout(State.pressTimer);
      State.pressTimer = setTimeout(() => {
        if(type === 'tab') Handlers.openTabMenu(data[0], data[1]);
        else Handlers.confirmDel(type, data);
      }, 450);
    },
    endP() { if(State.pressTimer) clearTimeout(State.pressTimer); },
    openTabMenu(s, g) {
      const L = LANGS[State.lang];
      Modal.show(`
        <div style="font-weight:900;font-size:11px;margin-bottom:15px;text-transform:uppercase">${Stores.recipes.data[s].g[g].n}</div>
        <div class="modal-btn black" id="m-rename">${L.rename}</div>
        <div class="modal-btn danger" id="m-del">${L.del}</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
      `);
      document.getElementById('m-rename').onclick = () => {
        Modal.close();
        Modal.prompt(L.rename+':', Stores.recipes.data[s].g[g].n, n => { if(n){ Stores.recipes.data[s].g[g].n = n; Stores.recipes.save(); State.notify(); } });
      };
      document.getElementById('m-del').onclick = () => { Handlers.delT(s,g); Modal.close(); };
    },
    confirmDel(type, data) {
      const L = LANGS[State.lang];
      Modal.show(`
        <div style="height:15px"></div>
        <div class="modal-btn black" onclick="Modal.close()">${L.cancel}</div>
        <div class="modal-btn danger" id="del-btn">${L.del}</div>
      `);
      document.getElementById('del-btn').onclick = () => {
        if(type === 'vol') Handlers.delV(data[0], data[1]);
        if(type === 'ing') Handlers.delI(data[0], data[1]);
        Modal.close();
      };
    },
    delV(s, v) {
      Stores.recipes.data[s].cv = Stores.recipes.data[s].cv.filter(x=>x!==v);
      if(Stores.recipes.data[s].v == v) Stores.recipes.data[s].v = Stores.recipes.data[s].cv[0]||0.5;
      Stores.recipes.save();
      State.notify();
    },
    addIngredientPrompt() {
      Modal.ingredientForm(null, ing => {
        const id = Utils.slugify(ing.name);
        if(Stores.ingredients.data.find(i=>i.id===id)) {
          Modal.show(`<div style="font-weight:900;margin-bottom:10px">Déjà existant</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">Un ingrédient avec ce nom existe déjà.</div><div class="modal-btn" onclick="Modal.close()">OK</div>`);
          return;
        }
        Stores.ingredients.add({id, ...ing});
      });
    },
    editIngredient(id) {
      const ing = Stores.ingredients.data.find(i=>i.id===id);
      if(ing) Modal.ingredientForm(ing, newData => {
        const newId = Utils.slugify(newData.name);
        if(newId !== id && Stores.ingredients.data.find(i=>i.id===newId)) {
          Modal.show(`<div style="font-weight:900;margin-bottom:10px">Nom déjà utilisé</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">Un ingrédient avec ce nom existe déjà.</div><div class="modal-btn" onclick="Modal.close()">OK</div>`);
          return;
        }
        // Propagation : renommer dans toutes les recettes si le nom change
        if(newData.name !== ing.name) {
          Stores.recipes.data.forEach(section => {
            section.g.forEach(group => {
              group.i.forEach(ri => {
                if(ri.n.toLowerCase() === ing.name.toLowerCase()) ri.n = newData.name;
              });
            });
          });
          Stores.recipes.save();
        }
        Stores.ingredients.update(id, {...newData, id: newId});
      });
    },
    deleteIngredient(id) {
      const ing = Stores.ingredients.data.find(i=>i.id===id);
      const name = ing ? ing.name : id;
      const msg  = State.lang==='fr' ? `Supprimer "${name}" définitivement ?` : `Delete "${name}" permanently?`;
      Modal.confirm(State.lang==='fr' ? 'Supprimer l\'ingrédient' : 'Delete ingredient', msg, () => {
        Stores.ingredients.delete(id);
        Toast.success(State.lang==='fr' ? 'Ingrédient supprimé' : 'Ingredient deleted');
      });
    },
    addCulturePrompt() {
      Modal.cultureForm(null, data => {
        const id = Utils.generateCultureId(data.strain, data.generation);
        Stores.cultures.add({
          id,
          strain: data.strain,
          generation: data.generation,
          date_start: data.date_start,
          events: [],
          notes: data.notes
        });
        // Immediately open event form so first event (inoculation) can be logged with a recipe
        setTimeout(() => {
          Modal.eventForm(null, ev => Stores.cultures.addEvent(id, ev));
        }, 100);
      });
    },
    editCulture(id) {
      const c = Stores.cultures.data.find(c=>c.id===id);
      if(c) Modal.cultureForm(c, data => Stores.cultures.update(id, data));
    },
    deleteCulture(id) {
      const cult = Stores.cultures.data.find(c=>c.id===id);
      const name = cult ? `${cult.strain} (${cult.generation})` : id;
      const msg  = State.lang==='fr' ? `Supprimer le lot "${name}" et tous ses événements ?` : `Delete batch "${name}" and all its events?`;
      Modal.confirm(State.lang==='fr' ? 'Supprimer le lot' : 'Delete batch', msg, () => {
        Stores.cultures.delete(id);
        Toast.success(State.lang==='fr' ? 'Lot supprimé' : 'Batch deleted');
      });
    },
    addQuickEvent(id) {
      Modal.eventForm(null, ev => Stores.cultures.addEvent(id, ev));
    },
    addEventToCulture(id) {
      Modal.eventForm(null, ev => Stores.cultures.addEvent(id, ev));
    },
    editEventPrompt(id, idx) {
      const c = Stores.cultures.data.find(c=>c.id===id);
      if(c && c.events[idx]) {
        Modal.eventForm(c.events[idx], newEv => Stores.cultures.updateEvent(id, idx, newEv));
      }
    },
    deleteEvent(id, idx) {
      const c = Stores.cultures.data.find(c=>c.id===id);
      const evLabel = c && c.events[idx] ? c.events[idx].type : '';
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:5px">Supprimer l'événement ?</div>
        <div style="font-size:11px;color:var(--sub);margin-bottom:20px">${evLabel}</div>
        <div class="modal-btn danger" id="del-ev-ok">SUPPRIMER</div>
        <div class="modal-btn" onclick="Modal.close()">ANNULER</div>
      `);
      document.getElementById('del-ev-ok').onclick = () => { Stores.cultures.deleteEvent(id, idx); Modal.close(); };
    },
    confirmDeleteEvent(id, idx) { Handlers.deleteEvent(id, idx); },
    promptAddEvent() {
      const opts = Stores.cultures.data.map(c=>`<option value="${c.id}">${c.id} - ${c.strain}</option>`).join('');
      const todayISO = new Date().toISOString().split('T')[0];
      Modal.show(`
        <div style="font-size:12px;font-weight:900;margin-bottom:15px">${LANGS[State.lang].addEvent}</div>
        <select id="modal-culture-select" class="modal-input">${opts}</select>
        <input type="date" id="modal-event-date" class="modal-input" value="${todayISO}" max="${todayISO}">
        <input type="text" id="modal-event-type" class="modal-input" placeholder="${LANGS[State.lang].type}">
        <div class="modal-label" style="margin-top:4px">Température réelle (°C) — optionnel</div>
        <input type="text" id="modal-event-temp-global" class="modal-input small" placeholder="ex: 23.5" inputmode="decimal">
        <div class="modal-btn black" id="global-event-ok">OK</div>
        <div class="modal-btn" onclick="Modal.close()">${LANGS[State.lang].cancel}</div>
      `);
      document.getElementById('global-event-ok').onclick = () => {
        const id   = document.getElementById('modal-culture-select').value;
        const date = document.getElementById('modal-event-date').value;
        const type = document.getElementById('modal-event-type').value.trim();
        // Validation date — pas dans le futur
        if(!id || !date || !type) {
          Modal.show(`<div style="font-weight:900;margin-bottom:10px">Champs requis</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">Lot, date et note obligatoires.</div><div class="modal-btn" onclick="Modal.close()">OK</div>`);
          return;
        }
        if(date > todayISO) {
          Modal.show(`<div style="font-weight:900;margin-bottom:10px">Date invalide</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">Un événement ne peut pas être dans le futur.</div><div class="modal-btn" onclick="Modal.close()">OK</div>`);
          return;
        }
        // Température : virgule→point, validation [-10, 50]
        let temp_c = null;
        const rawTemp = document.getElementById('modal-event-temp-global').value.trim().replace(',', '.');
        if(rawTemp !== '') {
          const t = parseFloat(rawTemp);
          if(isNaN(t) || t < 0 || t > 50) {
            Modal.show(`<div style="font-weight:900;margin-bottom:10px">Température invalide</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">Plage acceptée : 0 à 50 °C.</div><div class="modal-btn" onclick="Modal.close()">OK</div>`);
            return;
          }
          temp_c = t;
        }
        const kind = detectKind(type);
        Stores.cultures.addEvent(id, { date: new Date(date+'T12:00:00').getTime(), type, kind, temp_c });
        Modal.close();
      };
    },
    showCultureDetails(id) {
      const c = Stores.cultures.data.find(c=>c.id===id);
      if(!c) return;
      const L = LANGS[State.lang];
      let evHtml = '';
      c.events.forEach((ev,idx)=>{
        evHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--grey);"><span><strong>${ev.type}</strong> - ${new Date(ev.date).toLocaleDateString()}</span><div><button class="btn-small" onclick="APP.editEventPrompt('${id}',${idx})">éditer</button><button class="btn-delete" onclick="APP.deleteEvent('${id}',${idx})">×</button></div></div>`;

      Modal.show(`

          Compatible Excel / Python / analyse externe.
        </div>
        <div style="font-size:9px;color:var(--sub);text-align:center;margin-top:6px;text-transform:uppercase">
          Snapshot system : ${snapExists ? '● Actif' : '○ Inactif'}
        </div>
      `);
    },
    copyRawJSON() {
      try {
        const data = {
          cultures:    JSON.parse(localStorage.getItem('mycolab_cultures_v1')    || '[]'),

        };

      } catch(e) {
        Modal.show(`<div style="font-weight:900;margin-bottom:10px">Erreur</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">${e.message}</div><div class="modal-btn" onclick="Modal.close()">OK</div>`);

    },
    /** Export PDF Eco-Smart d'une fiche de culture individuelle */
    printCulture(id) {
      const c = Stores.cultures.data.find(c => c.id === id);
      if(!c) return;
      const ir = Utils.calcIR(c);
      const irLabel = ir !== null ? `IR: ${ir}%` : '';
      const recipeLinks = Analytics.getRecipeLinks(c);
      const unitMode = State.unitMode;
      const isWeight = unitMode === 'kg';

      // Ingrédients depuis le snapshot le plus récent lié à un événement
      const evWithSnap = (c.events || []).filter(e => e?.recipeSnapshot);
      let ingRows = '';
      evWithSnap.forEach(ev => {
        const snap = ev.recipeSnapshot;
        const vol = snap.volume || 0;
        const volDisplay = isWeight
          ? (() => { const g = Math.round(vol * 1000); return g >= 1000 ? `${(g/1000).toFixed(2)} kg` : `${g} g`; })()
          : `${vol.toFixed(2)} L`;
        ingRows += `<tr><td colspan="3" style="padding:8px 0 2px">
          <div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px">${Utils.cleanSectionName(snap.sectionName)} — ${snap.groupName}</div>
          <div style="font-size:13px;font-weight:900;margin:3px 0 4px;border-bottom:1px solid #000;padding-bottom:4px">OBJECTIF : <span style="font-size:16px">${volDisplay}</span></div>
        </td></tr>`;
        (snap.ingredients || []).forEach(ing => {
          const vol = (ing.percent || 0) * (snap.volume || 1) / 100;
          let valStr = '';
          if(ing.unit === 'cs' || ing.unit === 'cc') {
            const ml = ing.unit === 'cs' ? 15 : 5;
            const units = vol * 1000 / ml;
            const density = (ing.density && ing.density > 0) ? ing.density : 1.2;
            valStr = `${Math.round(units * ml * density)}g`;
          } else if(isWeight) {
            const density = (ing.density && ing.density > 0) ? ing.density : 1.0;
            const g = Math.round(vol * density * 1000);
            valStr = g >= 1000 ? `${(g/1000).toFixed(2)}kg` : `${g}g`;
          } else {
            valStr = `${vol.toFixed(2)}L`;
          }
          ingRows += `<tr><td style="padding:2px 0">${ing.name}</td><td style="text-align:center;color:#777">${(ing.percent||0).toFixed(1)}%</td><td style="text-align:right;font-weight:700">${valStr}</td></tr>`;
        });
      });

      // Événements
      const evRows = (c.events || []).map(ev =>
        `<tr><td style="padding:2px 0;color:#555">${Utils.toDDMMYYYY(ev.date)}</td><td colspan="2">${ev.type}${ev.temp_c != null ? ` (${ev.temp_c}°C)` : ''}</td></tr>`
      ).join('');

      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>MycoLab — ${c.id}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;color:#111;padding:12mm 14mm;line-height:1.4}
  h1{font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:2px;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:8px}
  .meta{display:flex;gap:16px;margin-bottom:10px;font-size:9px;color:#555;text-transform:uppercase}
  .meta strong{color:#000}
  table{width:100%;border-collapse:collapse;margin-bottom:10px}
  th{font-size:8px;text-transform:uppercase;color:#777;border-bottom:1px solid #ccc;padding:2px 0;text-align:left}
  th:nth-child(2){text-align:center}th:nth-child(3){text-align:right}
  .section{margin-bottom:8px}
  .section-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:3px}
  .notes{border-left:2px solid #ddd;padding:4px 8px;font-size:9px;color:#555;margin-top:8px;white-space:pre-wrap}
  .footer{margin-top:12px;font-size:8px;color:#bbb;text-align:right}
  @page{size:A4;margin:0}
  @media print{body{padding:12mm 14mm}html{orphans:3;widows:3}}
</style>
</head><body>
<h1>MycoLab</h1>
<div class="meta">
  <span><strong>${c.strain}</strong> (${c.generation})</span>
  <span>Lot : <strong>${c.id}</strong></span>
  <span>Début : <strong>${Utils.toDDMMYYYY(c.date_start)}</strong></span>
  <span>Âge : <strong>${Analytics.getCultureAge(c, new Date())}j</strong></span>
  ${irLabel ? `<span>IR : <strong style="color:#c00">${irLabel}</strong></span>` : ''}
  <span>Unité : <strong>${isWeight ? 'Poids' : 'Volume'}</strong></span>
</div>
${ingRows ? `<div class="section"><div class="section-title">Recettes</div>
<table><thead><tr><th>Ingrédient</th><th>%</th><th>${isWeight?'Poids':'Volume'}</th></tr></thead><tbody>${ingRows}</tbody></table></div>` : ''}
${evRows ? `<div class="section"><div class="section-title">Journal</div>
<table><thead><tr><th>Date</th><th colspan="2">Événement</th></tr></thead><tbody>${evRows}</tbody></table></div>` : ''}
${c.notes ? `<div class="notes">${c.notes}</div>` : ''}
<div class="footer">MycoLab v5.0.0 — ${new Date().toLocaleDateString('fr-CH')}</div>
</body></html>`;

      const w = window.open('', '_blank', 'width=800,height=600');
      w.document.write(html);
      w.document.close();
      w.focus();
      setTimeout(() => { w.print(); }, 400);
    },
    downloadBackup() {
      try {
        const backup = {
          version: APP_VERSION,
          exportedAt: new Date().toISOString(),
          recipes: Stores.recipes.data,
          ingredients: Stores.ingredients.data,
          cultures: Stores.cultures.data,
          refs: Stores.refs.data
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `mycolab_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        Toast.success(State.lang==='fr' ? 'Sauvegarde téléchargée' : 'Backup downloaded');
      } catch(e) {
        console.error('[MycoLab] backup failed:', e);
        Modal.show(`
          <div style="font-weight:900;margin-bottom:10px">Erreur d'export</div>
          <div style="font-size:11px;color:var(--sub);margin-bottom:20px">${e.message}</div>
          <div class="modal-btn" onclick="Modal.close()">FERMER</div>
        `);
        return;
      }
      Modal.close();
    },
    uploadBackup() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            // Validate: each key must be an array if present
            const ok = ['recipes','ingredients','cultures'].every(k =>
              !(k in data) || Array.isArray(data[k])
            );
            if(!ok) throw new Error('Structure de fichier invalide');
            if(Array.isArray(data.recipes))     { Stores.recipes.data = data.recipes; Stores.recipes.save(); }
            if(Array.isArray(data.ingredients)) { Stores.ingredients.data = data.ingredients; Stores.ingredients.save(); }
            if(Array.isArray(data.cultures))    { Stores.cultures.data = data.cultures; Stores.cultures.save(); }
            if(data.refs && data.refs.eventTypes) { Stores.refs.data = data.refs; Stores.refs.save(); }
            Utils.migrateEvents();
            State.notify();
            Modal.close();
          } catch(err) {
            console.error('[MycoLab] restore failed:', err);
            Modal.show(`
              <div style="font-weight:900;margin-bottom:10px">Restauration impossible</div>
              <div style="font-size:11px;color:var(--sub);margin-bottom:20px">${err.message}</div>
              <div class="modal-btn" onclick="Modal.close()">FERMER</div>
            `);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    },
    /**
     * openDrawer(sectionIdx) — ouvre le tiroir d'ingrédients scopé sur une section.
     * Verrouille State.activeCat au moment de l'ouverture pour éviter les conflits
     * si l'utilisateur scrolle entre les sections avant de choisir un ingrédient.
     */
    openDrawer(sectionIdx) {
      if(sectionIdx == null || sectionIdx < 0 || sectionIdx >= Stores.recipes.data.length) return;
      State.activeCat = sectionIdx;
      const section = Stores.recipes.data[sectionIdx];
      const label = document.getElementById('cat-label');
      if(label) label.textContent = section.t.toUpperCase();
      document.getElementById('drawer').classList.add('open');
    },
    toggleDrawer(show) { document.getElementById('drawer').classList.toggle('open', show); },
    prompt(title, defaultValue, callback) { Modal.prompt(title, defaultValue, callback); },
    saveRecipes() { Stores.recipes.save(); }
  };

  // ============================================================
  // SECTION 8 — PUBLIC API & INITIALISATION
  // window.APP exposes Handlers to inline onclick attributes.
  // init() is the single entry point: loads persisted state,
  // wires the observer, then triggers first render.
  // ============================================================

  // Exposer l'objet APP global (inchangé)
  window.APP = {
    setV: Handlers.setV,
    addV: Handlers.addV,
    setT: Handlers.setT,
    addT: Handlers.addT,
    delT: Handlers.delT,
    editN: Handlers.editN,
    delI: Handlers.delI,
    pickIngredient: Handlers.pickIngredient,
    togglePct: Handlers.togglePct,
    setUnit: Handlers.setUnit,
    setTemp: Handlers.setTemp,
    openRatio: Handlers.openRatio,
    setR: Handlers.setR,
    addIng: Handlers.addIng,
    startP: Handlers.startP,
    endP: Handlers.endP,
    openTabMenu: Handlers.openTabMenu,
    confirmDel: Handlers.confirmDel,
    delV: Handlers.delV,
    addIngredientPrompt: Handlers.addIngredientPrompt,
    editIngredient: Handlers.editIngredient,
    deleteIngredient: Handlers.deleteIngredient,
    addCulturePrompt: Handlers.addCulturePrompt,
    editCulture: Handlers.editCulture,
    deleteCulture: Handlers.deleteCulture,
    addQuickEvent: Handlers.addQuickEvent,
    addEventToCulture: Handlers.addEventToCulture,
    printCulture: Handlers.printCulture,
    addRefEventType: Handlers.addRefEventType,
    editEventPrompt: Handlers.editEventPrompt,
    deleteEvent: Handlers.deleteEvent,
    confirmDeleteEvent: Handlers.confirmDeleteEvent,
    promptAddEvent: Handlers.promptAddEvent,
    showCultureDetails: Handlers.showCultureDetails,
    showDayLog: Handlers.showDayLog,
    setView: Handlers.setView,
    toggleDarkMode: Handlers.toggleDarkMode,
    toggleLang: Handlers.toggleLang,
    setAuthor: Handlers.setAuthor,
    pickDate: Handlers.pickDate,
    openSaveModal: Handlers.openSaveModal,
    copyRawJSON: Handlers.copyRawJSON,
    downloadBackup: Handlers.downloadBackup,
    uploadBackup: Handlers.uploadBackup,
    toggleDrawer: Handlers.toggleDrawer,
    openDrawer: Handlers.openDrawer,
    prompt: Handlers.prompt,
    saveRecipes: Handlers.saveRecipes,
    render: () => { Renderer.render(); },
    recipes: Stores.recipes.data,
    state: {
      gIdx: State.gIdx,
      activeCat: State.activeCat,
      author: State.author
    }
  };

  // ---------- 8. INITIALISATION ----------
  function init() {
    try {
      State.load();
      Stores.recipes.load();
      Stores.ingredients.load();
      Stores.cultures.load();
      Stores.refs.load();
      Utils.migrateRecipeIngIds();
      Utils.migrateEvents();
      State.subscribe(() => Renderer.render());
      Renderer.render();
    } catch(e) {
      console.error('[MycoLab] init failed:', e);
      // Récupère les données brutes pour export de secours
      const rawCultures  = localStorage.getItem('mycolab_cultures_v1') || localStorage.getItem('mycolab_snapshot') || '[]';
      const rawRecipes   = localStorage.getItem('mycolab_recipes_v1')  || '[]';
      const rawIngr      = localStorage.getItem('mycolab_ingredients_v1') || '[]';
      const emergencyJSON = JSON.stringify({ cultures: rawCultures, recipes: rawRecipes, ingredients: rawIngr }, null, 2);
      window._emergencyData = emergencyJSON;

      document.getElementById('content').innerHTML = `
        <div style="padding:30px;text-align:center">
          <div style="font-size:14px;font-weight:900;color:var(--danger);margin-bottom:8px">Erreur de démarrage</div>
          <div style="font-size:11px;color:var(--sub);margin-bottom:24px">Tes données sont intactes. Télécharge-les avant de réinitialiser.</div>
          <button class="btn-add" style="margin-bottom:10px" onclick="
            const a=document.createElement('a');
            a.href='data:application/json,'+encodeURIComponent(window._emergencyData);
            a.download='mycolab_rescue_'+new Date().toISOString().slice(0,10)+'.json';
            a.click()
          ">⬇ Télécharger mes données</button>
          <button class="btn-add" style="margin-bottom:10px" onclick="
            const snap=localStorage.getItem('mycolab_snapshot');
            if(snap){localStorage.setItem('mycolab_cultures_v1',snap);location.reload();}
            else{document.getElementById('snap-msg').style.display='block';}
          ">↩ Restaurer depuis snapshot</button>
          <div id="snap-msg" style="display:none;font-size:10px;color:var(--danger);margin-bottom:10px">Aucun snapshot disponible.</div>
          <button class="btn-add" style="color:var(--danger);border-color:var(--danger)" onclick="if(confirm('Effacer toutes les données ?')){localStorage.clear();location.reload()}">Réinitialiser</button>
        </div>`;
    }
  }
  init();
})();
</script>
</body>
</html>

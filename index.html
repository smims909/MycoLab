          else if (isWeight) { const dens = (ing.density && ing.density > 0) ? ing.density : 1.0; const g = Math.round(volIng * dens * 1000); valStr = g >= 1000 ? `${(g / 1000).toFixed(2)}kg` : `${g}g`; }
          else { valStr = `${volIng.toFixed(2)}L`; }
          ingRows += `<tr><td style="padding:2px 0">${ing.name}</td><td style="text-align:center;color:#777">${(ing.percent || 0).toFixed(1)}%</td><td style="text-align:right;font-weight:700">${valStr}</td></tr>`;
        });
      }
      const evRows = (c.events || []).map(ev => {
        const eTemp = ev.temperature != null ? ev.temperature : ev.temp_c;
        return `<tr><td style="padding:2px 0;color:#555">${Utils.toDDMMYYYY(ev.date)}</td><td colspan="2">${ev.type}${eTemp != null ? ` (${eTemp}°C)` : ''}</td></tr>`;
      }).join('');
      const ageStr = ((typeof Analytics!=='undefined' && Analytics.getCultureAge) ? Analytics.getCultureAge(c, new Date()) : 0) + 'j';
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0"><title>MycoLab — ${c.id}</title>

</div>
${ingRows ? `<div class="section"><div class="section-title">Recette</div><table><thead><tr><th>Ingrédient</th><th>%</th><th>${isWeight ? 'Poids' : 'Volume'}</th></tr></thead><tbody>${ingRows}</tbody></table></div>` : ''}
${evRows  ? `<div class="section"><div class="section-title">Journal</div><table><thead><tr><th>Date</th><th colspan="2">Événement</th></tr></thead><tbody>${evRows}</tbody></table></div>` : ''}
${c.notes ? `<div class="notes">${c.notes}</div>` : ''}
<div class="footer">MycoLab v${APP_VERSION} — ${new Date().toLocaleDateString('fr-CH')}</div>
</body></html>`;
      const w = window.open('', '_blank', 'width=800,height=600');
      w.document.write(html); w.document.close(); w.focus();
      setTimeout(() => w.print(), 400);
    },

    // ── Sauvegarde / Restauration ────────────────────────────────
    openSaveModal() {
      const L = LANGS[State.lang];
      const snapExists = !!localStorage.getItem('mycolab_snapshot');
      Modal.show(`
        <div class="modal-btn black" onclick="APP.downloadBackup()">${L.save}</div>
        <div class="modal-btn" onclick="APP.uploadBackup()">${L.restore}</div>
        <div class="modal-btn" onclick="window.print()">${L.pdf}</div>
        <div class="modal-btn" onclick="APP.copyRawJSON()">Copier les données</div>
        <div class="modal-btn" onclick="Modal.close()">${L.cancel}</div>
        <div style="font-size:8px;color:var(--sub);margin-top:8px;line-height:1.5">Format : <code style="font-family:monospace">{cultures:[],recipes:[],ingredients[]}</code><br>Compatible Excel / Python / analyse externe.</div>
        <div style="font-size:9px;color:var(--sub);text-align:center;margin-top:6px;text-transform:uppercase">Snapshot : ${snapExists ? '● Actif' : '○ Inactif'}</div>
      `);
    },
    copyRawJSON() {
      try {
        const data = {
          cultures:    JSON.parse(localStorage.getItem('mycolab_cultures_v1') || '[]'),
          recipes:     JSON.parse(localStorage.getItem('mycolab_recipes_v1')  || '[]'),
          ingredients: JSON.parse(localStorage.getItem('mycolab_ingredients_v1') || '[]'),
          refs:        JSON.parse(localStorage.getItem('mycolab_refs_v1')     || '{}'),
          exportedAt:  new Date().toISOString(), version: APP_VERSION
        };
        navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(() => Toast.success(State.lang === 'fr' ? 'Données copiées' : 'Data copied'));
      } catch (e) { Modal.show(`<div style="font-weight:900;margin-bottom:10px">Erreur</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">${e.message}</div><div class="modal-btn" onclick="Modal.close()">OK</div>`); }
    },
    downloadBackup() {
      try {
        const backup = { version: APP_VERSION, exportedAt: new Date().toISOString(), recipes: Stores.recipes.data, ingredients: Stores.ingredients.data, cultures: Stores.cultures.data, refs: Stores.refs.data };
        const url = URL.createObjectURL(new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' }));
        const a = document.createElement('a'); a.href = url; a.download = `mycolab_backup_${new Date().toISOString().slice(0, 10)}.json`; a.click();
        URL.revokeObjectURL(url);
        Toast.success(State.lang === 'fr' ? 'Sauvegarde téléchargée' : 'Backup downloaded');
      } catch (e) { Modal.show(`<div style="font-weight:900;margin-bottom:10px">Erreur d'export</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">${e.message}</div><div class="modal-btn" onclick="Modal.close()">FERMER</div>`); }
      Modal.close();
    },
    uploadBackup() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!['recipes', 'ingredients', 'cultures'].every(k => !(k in data) || Array.isArray(data[k]))) throw new Error('Structure de fichier invalide');
            if (Array.isArray(data.recipes))     { Stores.recipes.data     = data.recipes;     Stores.recipes.save(); }
            if (Array.isArray(data.ingredients)) { Stores.ingredients.data = data.ingredients; Stores.ingredients.save(); }
            if (Array.isArray(data.cultures))    { Stores.cultures.data    = data.cultures;    Stores.cultures.save(); }
            if (data.refs && data.refs.eventTypes) { Stores.refs.data = data.refs; Stores.refs.save(); }
            Utils.migrateRecipeIngIds();
            Utils.migrateEvents();
            State.notify();
            Modal.close();
            Toast.success(State.lang === 'fr' ? 'Restauration réussie' : 'Backup restored');
          } catch (err) { Modal.show(`<div style="font-weight:900;margin-bottom:10px">Restauration impossible</div><div style="font-size:11px;color:var(--sub);margin-bottom:20px">${err.message}</div><div class="modal-btn" onclick="Modal.close()">FERMER</div>`); }
        };
        reader.readAsText(file);
      };
      input.click();
    },

    // ── Divers ──────────────────────────────────────────────────
    /**
     * Depuis l'onglet Suivi : bascule vers "Cultures" et scroll vers la culture ciblée.
     * Le scroll est différé pour laisser le DOM se construire.
     */
    navigateToCulture(cultureId) {
      State.setView('cultures');
      setTimeout(() => {
        const card = document.querySelector(`[data-culture-id="${cultureId}"]`);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          // Flash visuel léger pour signaler la carte ciblée
          card.style.transition = 'box-shadow .25s';
          card.style.boxShadow = '0 0 0 2px var(--main)';
          setTimeout(() => { card.style.boxShadow = ''; }, 1200);
        }
      }, 80);
    },
    setView(view)          { State.setView(view); },
    toggleDarkMode()       { State.toggleDarkMode(); },
    toggleLang()           { State.toggleLang(); },
    setAuthor(author)      { State.setAuthor(author); },
    pickDate()             { const cur = State.getEffectiveDate(); Modal.datePicker(cur.toISOString().split('T')[0], d => State.setCustomDate(d ? new Date(d + 'T12:00:00').getTime() : null)); },
    openDrawer(sectionId) {
      // sectionId = section.id (UID string) — jamais un index numérique
      const s = _section(sectionId); if (!s) return;
      State.activeCat = String(sectionId);
      const lbl = document.getElementById('cat-label'); if (lbl) lbl.textContent = s.t.toUpperCase();
      document.getElementById('drawer').classList.add('open');
    },
    toggleDrawer(show)     { document.getElementById('drawer').classList.toggle('open', show); },
    prompt(title, def, cb) { Modal.prompt(title, def, cb); },
    saveRecipes()          { Stores.recipes.save(); }
  };

  // ============================================================
  // API PUBLIQUE (window.APP)
  // ============================================================
  window.APP = {
    // Recettes
    setV:              Handlers.setV,
    addV:              Handlers.addV,
    editN:             Handlers.editN,
    delI:              Handlers.delI,
    pickIngredient:    Handlers.pickIngredient,
    togglePct:         Handlers.togglePct,
    setUnit:           Handlers.setUnit,
    editSectionTitle:  Handlers.editSectionTitle,
    updateSectionNote: Handlers.updateSectionNote,
    setTemp:           Handlers.setTemp,
    openRatio:         Handlers.openRatio,
    setR:              Handlers.setR,
    addIng:            Handlers.addIng,
    addRecipeSection:  Handlers.addRecipeSection,
    confirmDelSection: Handlers.confirmDelSection,
    startP:            Handlers.startP,
    endP:              Handlers.endP,
    confirmDel:        Handlers.confirmDel,
    delV:              Handlers.delV,
    // Ingrédients
    addIngredientPrompt: Handlers.addIngredientPrompt,
    editIngredient:      Handlers.editIngredient,
    deleteIngredient:    Handlers.deleteIngredient,
    // Cultures
    addCulturePrompt:    Handlers.addCulturePrompt,
    editCulture:         Handlers.editCulture,
    deleteCulture:       Handlers.deleteCulture,
    addQuickEvent:       Handlers.addQuickEvent,
    addEventToCulture:   Handlers.addEventToCulture,
    editEventPrompt:     Handlers.editEventPrompt,
    deleteEvent:         Handlers.deleteEvent,
    confirmDeleteEvent:  Handlers.confirmDeleteEvent,
    promptAddEvent:      Handlers.promptAddEvent,
    showCultureDetails:  Handlers.showCultureDetails,
    showDayLog:          Handlers.showDayLog,
    printCulture:        Handlers.printCulture,
    addRefEventType:     Handlers.addRefEventType,
    // Sauvegarde
    openSaveModal:   Handlers.openSaveModal,
    copyRawJSON:     Handlers.copyRawJSON,
    downloadBackup:  Handlers.downloadBackup,
    uploadBackup:    Handlers.uploadBackup,
    // UI
    navigateToCulture: Handlers.navigateToCulture,
    setView:        Handlers.setView,
    toggleDarkMode: Handlers.toggleDarkMode,
    toggleLang:     Handlers.toggleLang,
    setAuthor:      Handlers.setAuthor,
    pickDate:       Handlers.pickDate,
    openDrawer:     Handlers.openDrawer,
    toggleDrawer:   Handlers.toggleDrawer,
    prompt:         Handlers.prompt,
    saveRecipes:    Handlers.saveRecipes,
    render: () => Renderer.render(),
    get recipes() { return Stores.recipes.data; },
    get state() {
      return {
        get activeCat() { return State.activeCat; },
        set activeCat(v) { State.activeCat = v; },
        get author() { return State.author; },
        set author(v) { State.author = v; }
      };
    }
  };

  // ============================================================
  // INITIALISATION
  // ============================================================
  function init() {
    try {
      State.load();
      Stores.recipes.load();
      Stores.ingredients.load();
      Stores.cultures.load();
      Stores.refs.load();

      // Migrations one-time
      Utils.migrateRecipeIngIds();
      Utils.migrateEvents();

      // Abonnement rendu — une seule source d'état
      State.subscribe(() => Renderer.render());

      // Navigation — source unique, un seul écouteur
      const tabsNav = document.querySelector('.tabs-nav');
      if (tabsNav) {
        tabsNav.addEventListener('click', e => {
          const tab = e.target.closest('.tab-view');
          if (tab && tab.dataset.view) { e.preventDefault(); e.stopPropagation(); State.setView(tab.dataset.view); }
        });
      }

      // Mode sombre initial
      if (State.dark) document.body.classList.add('dark-mode');

      Renderer.render();
    } catch (e) {
      console.error('[MycoLab] init failed:', e);
      const rawCultures = localStorage.getItem('mycolab_cultures_v1') || localStorage.getItem('mycolab_snapshot') || '[]';
      const rawRecipes  = localStorage.getItem('mycolab_recipes_v1')  || '[]';
      const rawIngr     = localStorage.getItem('mycolab_ingredients_v1') || '[]';
      window._emergencyData = JSON.stringify({ cultures: rawCultures, recipes: rawRecipes, ingredients: rawIngr }, null, 2);
      document.getElementById('content').innerHTML = `
        <div style="padding:30px;text-align:center">
          <div style="font-size:14px;font-weight:900;color:var(--danger);margin-bottom:8px">Erreur de démarrage</div>
          <div style="font-size:11px;color:var(--sub);margin-bottom:24px">Tes données sont intactes. Télécharge-les avant de réinitialiser.</div>
          <button class="btn-add" style="margin-bottom:10px" onclick="const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(window._emergencyData);a.download='mycolab_rescue_'+new Date().toISOString().slice(0,10)+'.json';a.click()">⬇ Télécharger mes données</button>
          <button class="btn-add" style="margin-bottom:10px" onclick="const snap=localStorage.getItem('mycolab_snapshot');if(snap){localStorage.setItem('mycolab_cultures_v1',snap);location.reload();}else{document.getElementById('snap-msg').style.display='block';}">↩ Restaurer depuis snapshot</button>
          <div id="snap-msg" style="display:none;font-size:10px;color:var(--danger);margin-bottom:10px">Aucun snapshot disponible.</div>
          <button class="btn-add" style="color:var(--danger);border-color:var(--danger)" onclick="if(confirm('Effacer toutes les données ?')){localStorage.clear();location.reload()}">Réinitialiser</button>
        </div>`;
    }
  }

  init();
})();
</script>
</body>
</html>
